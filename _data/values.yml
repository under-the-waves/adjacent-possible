# _data/values.yml
# Defines all value domains and their logarithmic scale interpretations

fitness:
  health:
    name: "Health & Longevity"
    anchor_type: "linear"
    anchor_max: 15
    anchor_unit: "years"
    anchor_description: "Additional healthy lifespan"
    baseline_percentile: 35
    scale_levels:
      10: "15+ years additional healthy lifespan"
      8: "3-4 years additional healthy lifespan"
      6: "1 year additional healthy lifespan" 
      4: "3-6 months additional healthy lifespan"
      2: "1-2 months additional healthy lifespan"

      -2: "1-2 months of healthy lifespan lost"
      -4: "3-6 months of healthy lifespan lost"
      -6: "1 year of healthy lifespan lost"
      -8: "3-4 years of healthy lifespan lost"
      -10: "15+ years of healthy lifespan lost"
  performance:
    name: "Performance"
    anchor_type: "linear"
    anchor_max: 100
    anchor_unit: "fitness test percentile"
    anchor_description: "Fitness test percentile ranking among age-matched population"
    baseline_percentile: 35
    scale_levels:
      10: "99th+ fitness test percentile"
      8: "25th fitness test percentile"
      6: "6th fitness test percentile"
      4: "2nd fitness test percentile"
      2: "Below 1st fitness test percentile"

      -2: "Below 1st percentile drop in fitness test ranking"
      -4: "~2 percentile point drop in fitness test ranking"
      -6: "~6 percentile point drop in fitness test ranking"
      -8: "~25 percentile point drop in fitness test ranking"
      -10: "Near-total loss of fitness test ranking"
  enjoyment:
    name: "Enjoyment"
    anchor_type: "subjective"
    anchor_description: "Change in how much physical activity is experienced as a source of satisfaction"
    baseline_percentile: 35
    scale_levels:
      10: "Transformative gain in enjoyment of physical activity"
      8: "Major gain in enjoyment of physical activity"
      6: "Meaningful gain in enjoyment of physical activity"
      4: "Modest gain in enjoyment of physical activity"
      2: "Slight, barely noticeable gain in enjoyment of physical activity"
      -2: "Slight, barely noticeable reduction in enjoyment of physical activity"
      -4: "Modest reduction in enjoyment of physical activity"
      -6: "Meaningful reduction in enjoyment of physical activity"
      -8: "Major reduction in enjoyment of physical activity"
      -10: "Severe damage to enjoyment of physical activity"
