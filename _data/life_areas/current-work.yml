slug: current-work
name: Current Work
domain: Career
pillar: Create & Contribute
domain_representative: true
values:
- key: rewards
  name: Rewards
  weight: 30
  description:
  - The tangible returns you receive for your work -- compensation, recognition, status, and career advancement.
  - |-
    Salary, bonuses, promotions, public acknowledgement, and the sense that your contribution is valued and rewarded proportionally.
  - People who prioritise this value ensure their work delivers fair returns for the effort invested.
  benchmarks:
    level_1:
      text: |-
        Compensation is at or near market rate for your role and experience level; you receive standard feedback but no particular recognition beyond the norm
      reasoning: |-
        Market-rate compensation with standard feedback represents the baseline. Most employees receive pay roughly in line with their role's median and do not attract particular recognition beyond routine performance reviews. At this level, work delivers adequate financial returns but no premium for exceptional contribution.
    level_2:
      text: |-
        Compensation above median for your role; regular positive feedback from managers; occasional recognition for specific contributions
      reasoning: |-
        Above-median compensation with regular positive feedback and occasional recognition represents 80th percentile rewards. Most workers receive standard pay and infrequent praise; consistently earning more than the median and being noticed for specific contributions places you above the majority.
    level_3:
      text: |-
        Compensation in the top quartile for your role; promoted ahead of peers; recognised across the organisation for the quality of your contributions
      reasoning: |-
        Top-quartile compensation with accelerated promotion and cross-organisational recognition represents 95th percentile rewards. At this level, your contributions are rewarded well above the norm, and your reputation extends beyond your immediate team.
    level_4:
      text: |-
        Compensation in the top decile; sought after by other organisations; publicly recognised as a leader in your area; career advancement outpaces peers significantly
      reasoning: |-
        Top-decile compensation, external demand for your services, and public recognition as a leader represents top 1% rewards. At this level, your market value is exceptional and your contributions are widely acknowledged both within and beyond your organisation.
    level_5:
      text: |-
        Compensation and recognition place you among the very top earners and most respected professionals in your field; your contribution is widely acknowledged as exceptional
      reasoning: |-
        Compensation and recognition among the very top in your field represents 99.9th percentile rewards. At this level, your contribution is not merely well-paid but widely acknowledged as exceptional, placing you among the most respected and best-compensated professionals in your domain.
- key: competence
  name: Competence
  weight: 25
  description:
  - "Skill and effectiveness at performing your current role's core responsibilities."
  - Technical proficiency, consistent quality of output, and the ability to handle increasing complexity.
  - People who prioritise this value focus on mastering the craft of their work and continuously raising their standard.
  benchmarks:
    level_1:
      text: |-
        Meets basic requirements of the role; performance reviews consistently at "meets expectations"; work is adequate but requires regular oversight or revision
      reasoning: |-
        Meeting basic requirements represents the baseline. Most employees cluster around "meets expectations" in formal reviews, with work that is functional but not distinguished. At this level, output quality is adequate but inconsistent, and oversight or revision from others is routine.
    level_2:
      text: |-
        Consistently "exceeds expectations" in reviews; Dreyfus proficient stage; output requires minimal revision and is reliably high quality
      reasoning: |-
        Consistently exceeding expectations places you above roughly 80% of workers. The Dreyfus proficient stage describes someone who sees situations holistically rather than following rules, and whose output requires minimal correction. This level of reliable quality and independent judgement distinguishes strong performers from the majority.
    level_3:
      text: |-
        Dreyfus expert stage; output approximately 4x the average; actively sought out by colleagues for advice, review, and problem-solving
      reasoning: |-
        The Dreyfus expert stage describes someone whose responses are fluid and intuitive, drawing on extensive pattern recognition. Producing 4x average output and being actively sought for advice represents top 5% competence. At this level, colleagues trust your judgement implicitly and you can handle novel problems without established procedures.
    level_4:
      text: |-
        Dreyfus mastery stage; output approximately 8x the average; sets the quality standard others aspire to within the organisation
      reasoning: |-
        Dreyfus mastery with 8x average output represents the top 1% of performers. McKinsey data confirms that top performers in complex roles can be 800% more productive. At this level, you define the quality standard and your work serves as the benchmark others aspire to reach. <a href="https://www.mckinsey.com/capabilities/people-and-organizational-performance/our-insights" target="_blank">McKinsey research</a>
    level_5:
      text: |-
        Advances the practice itself; creates new knowledge, methods, or standards that did not previously exist; recognised authority in the field
      reasoning: |-
        Advancing the practice itself \u2013 creating knowledge, methods, or standards that did not previously exist \u2013 represents 99.9th percentile competence (1 in 1,000). This level goes beyond mastering existing practices to generating genuinely new contributions to the field.
- key: engagement
  name: Engagement
  weight: 25
  description:
  - Psychological investment, motivation, and meaning found in daily work.
  - Experiencing flow states, feeling intrinsically motivated, and finding genuine interest in problems.
  - |-
    People who prioritise this value seek roles and tasks that align with their strengths and actively shape their work to be absorbing.
  benchmarks:
    level_1:
      text: |-
        Neither engaged nor actively disengaged; works primarily for pay; limited intrinsic motivation or flow during the working day
      reasoning: |-
        With only 21% of employees engaged globally and 45% working primarily for pay, the disengaged-but-not-destructive worker represents the statistical norm. This level describes the majority of the workforce \u2013 showing up, completing tasks, but finding little intrinsic motivation or meaning in daily work. <a href="https://www.gallup.com/workplace/349484/state-of-the-global-workplace.aspx" target="_blank">Gallup (2025)</a>
    level_2:
      text: Genuinely engaged in work; experiences flow 10 - 15% of focused time; takes initiative on tasks without being asked
      reasoning: |-
        Genuine engagement with regular flow states (10 \u2013 15% of focused time) represents the top 20% of workers. Given that only 21% of employees are engaged globally and average flow is around 5% of working hours, regularly experiencing flow and taking initiative places you well above the norm. <a href="https://www.gallup.com/workplace/349484/state-of-the-global-workplace.aspx" target="_blank">Gallup (2025)</a>
    level_3:
      text: |-
        Work is a primary source of meaning and fulfilment; flow 15 - 25% of focused time; intrinsically motivated to pursue challenges
      reasoning: |-
        Work as a primary source of meaning, with flow 15 \u2013 25% of focused time, represents 95th percentile engagement. This far exceeds the 5% flow average and goes beyond simple engagement into genuine fulfilment and intrinsic drive. Few workers consistently find deep meaning in daily tasks. <a href="https://www.mckinsey.com/capabilities/people-and-organizational-performance/our-insights" target="_blank">McKinsey research</a>
    level_4:
      text: |-
        Work experienced as vocation; flow 25 - 40% of focused time; consistently rated as "thriving" by Gallup-type engagement measures
      reasoning: |-
        Work experienced as vocation, with flow 25 \u2013 40% of focused time, represents 99th percentile engagement. This level describes someone for whom work is not merely engaging but a central source of identity and purpose. Gallup's "thriving" designation captures this sustained, deep fulfilment.
    level_5:
      text: |-
        Work and identity fully integrated; flow occupies the majority of focused time; professional and personal purpose are indistinguishable
      reasoning: |-
        Full integration of work and identity, with flow occupying the majority of focused time, represents extraordinary engagement achieved by roughly 1 in 1,000 workers. At this level, the distinction between professional effort and personal fulfilment effectively disappears.
- key: balance
  name: Balance
  weight: 20
  description:
  - Maintaining sustainable boundaries between work and the rest of life.
  - |-
    Manageable hours, predictable schedules, the ability to disconnect, and ensuring work does not crowd out health, relationships, or personal interests.
  - People who prioritise this value protect their non-work life as a deliberate choice.
  benchmarks:
    level_1:
      text: |-
        Work hours and boundaries are whatever the job demands; no deliberate effort to protect personal time; work regularly encroaches on evenings, weekends, or health
      reasoning: |-
        Allowing work to dictate your schedule without deliberate boundary-setting is the default for most workers. Many employees accept evening emails, weekend work, and encroachment on personal time as normal, with no conscious effort to protect non-work priorities.
    level_2:
      text: |-
        Clear boundaries between work and personal time; rarely works outside agreed hours; able to disconnect in evenings and weekends without guilt
      reasoning: |-
        Clear boundaries between work and personal time, with the ability to disconnect without guilt, represents 80th percentile balance. Most workers either lack boundaries entirely or feel anxious when they attempt to set them. Consistently protecting personal time is a meaningful differentiator.
    level_3:
      text: |-
        Work fits sustainably within a well-rounded life; energy and time are deliberately allocated across work, health, and relationships; no chronic sacrifice of non-work priorities
      reasoning: |-
        Deliberately allocating energy across work, health, and relationships without chronic sacrifice of non-work priorities represents 95th percentile balance. Most high performers achieve their results at the cost of other life areas; sustaining both performance and a well-rounded life is genuinely rare.
    level_4:
      text: |-
        High performance sustained without burnout; work intensity is deliberately managed with recovery periods; personal relationships and health thrive alongside career success
      reasoning: |-
        Sustaining high performance without burnout, with deliberate recovery periods and thriving personal relationships, represents top 1% balance. At this level, career success and personal wellbeing genuinely coexist rather than trading off against each other.
    level_5:
      text: |-
        Complete integration of work and life where both reinforce each other; sustainable over decades; serves as a model for others seeking high performance without self-destruction
      reasoning: |-
        Complete integration of work and life that is sustainable over decades and serves as a model for others represents 99.9th percentile balance. At this level, work and personal life reinforce rather than compete with each other, and high performance is maintained without self-destruction.
