slug: goals
name: Goals
domain: Productivity
pillar: Organise Your Life
survey_description: "How you set, track, and achieve meaningful goals."
domain_representative: false
values:
- key: follow_through
  name: Follow-through
  weight: 40
  description:
  - Consistently completing what you set out to do -- turning goals from intentions into accomplished outcomes.
  - |-
    Maintaining momentum, tracking progress, building accountability, and developing the discipline to keep working when motivation fades.
  - People who prioritise this value measure success by completion rate rather than ambition of targets.
  benchmarks:
    level_1:
      text: |-
        Goals are modest and vague -- "get a bit healthier," "save some money" -- with no stretch component or transformative vision
      reasoning: |-
        Most people's goals exist as modest, vague aspirations — "get a bit healthier," "save some money," "be happier." Without any stretch component or transformative vision, these goals lack the motivational pull that drives sustained effort. This represents the default state for the majority of the population, given that only 33% of goal-setters define their goals with any specificity, let alone set genuinely ambitious targets. <a href="https://scholar.dominican.edu/psychology-faculty-conference-presentations/3/" target="_blank">Matthews (2015)</a>
    level_2:
      text: 3 – 5 written goals with at least one genuine stretch target; willing to set goals with a meaningful risk of failure
      reasoning: |-
        Writing down 3 – 5 goals with at least one genuine stretch target exceeds what 80% of adults do. Given that only 35% write goals down at all, having written goals that include a meaningful risk of failure places a person well into the top quintile. The willingness to aim beyond comfortable certainty is itself a rare trait. <a href="https://scholar.dominican.edu/psychology-faculty-conference-presentations/3/" target="_blank">Matthews (2015)</a>
    level_3:
      text: |-
        Goal hierarchy (vision > annual > quarterly > weekly) with stretch targets at every level; actively pursues goals that would be transformative if achieved
      reasoning: |-
        A multi-level goal hierarchy (vision > annual > quarterly > weekly) with stretch targets at every level represents 95th percentile ambition. This level of structured aspiration is characteristic of high-performing executives, elite athletes, and serious practitioners of personal development — perhaps 5% of the adult population actively pursue goals that would be genuinely transformative if achieved.
    level_4:
      text: |-
        Multi-year transformative goals with pre-committed decision rules; actively balances a portfolio of ambitious bets with different risk profiles
      reasoning: |-
        Multi-year transformative goals with pre-committed decision rules and a diversified portfolio of ambitious bets represent top 1% ambition. At this level, goals are not just specific and hierarchical but deliberately calibrated to push boundaries, with explicit risk management for the possibility of failure. This level of systematic ambition is vanishingly rare.
    level_5:
      text: |-
        Multi-decade transformative vision with causal models linking daily actions to long-term outcomes; cross-domain coherence where ambitious goals in one area reinforce progress in others
      reasoning: |-
        Multi-decade transformative visions with causal models and cross-domain coherence represent 99.9th percentile capability (1 in 1,000). At this level, the individual can articulate how today's actions connect through causal chains to outcomes decades away, and ambitious goals in one domain (e.g., health) are designed to reinforce ambitious goals in others (e.g., career, relationships). This level of integrated long-term ambition is extraordinarily rare.
- key: clarity
  name: Clarity
  weight: 35
  description:
  - |-
    Defining goals with enough precision that you know exactly what success looks like and can tell whether you are on track.
  - Specific, measurable targets, clear deadlines, and unambiguous criteria for completion.
  - People who prioritise this value believe that vague goals produce vague results.
  benchmarks:
    level_1:
      text: |-
        No honest assessment of capacity or constraints; goals are set based on aspiration alone with no accounting for competing demands or likely obstacles
      reasoning: |-
        With 92% of goal-setters failing to achieve their goals and 80% of resolutions abandoned by February, the baseline level of realistic goal calibration is remarkably poor. At this level, goals are set based on aspiration alone with no honest assessment of capacity, competing demands, or probability of success — leading to predictable failure and disillusionment. <a href="https://news.scranton.edu/articles/2021/01/fac-norcross-stories.shtml" target="_blank">Norcross (University of Scranton)</a>
    level_2:
      text: |-
        Goals account for existing commitments and available time; deadlines reflect honest capacity assessment rather than wishful thinking
      reasoning: |-
        Setting goals that account for existing commitments and available time represents 80th percentile realism. With 80% of resolutions abandoned by February, the ability to set deadlines that reflect honest capacity rather than wishful thinking is a foundational skill that most people never develop. Even basic constraint-awareness dramatically improves follow-through rates. <a href="https://news.scranton.edu/articles/2021/01/fac-norcross-stories.shtml" target="_blank">Norcross (University of Scranton)</a>
    level_3:
      text: |-
        Goals include built-in buffers for setbacks; milestones are calibrated against past performance data; competing priorities are explicitly triaged
      reasoning: |-
        Goals with built-in buffers for setbacks, milestones calibrated against past performance data, and explicit priority triaging represent top 5% realism. This requires the discipline to learn from historical completion data and the honesty to admit where capacity falls short of ambition — a combination that produces reliably achievable yet still meaningful goals.
    level_4:
      text: |-
        Detailed resource and capacity modelling before committing to goals; historical completion data informs new goal calibration; proactive identification of constraints and bottlenecks
      reasoning: |-
        Detailed resource and capacity modelling before committing to goals, combined with historical completion data informing new goal calibration, represents top 1% realism. At this level, goal-setting becomes almost engineering-like: constraints are identified, bottlenecks are anticipated, and targets are set with a precision that makes ambitious goals genuinely achievable.
    level_5:
      text: |-
        90%+ of goals achieved over a 10+ year track record; goal calibration so well-tuned that stretch targets and realistic assessment converge -- ambitious goals that reliably get done
      reasoning: |-
        A 90%+ achievement rate sustained over 10+ years represents 99.9th percentile realism (1 in 1,000). At this level, goal calibration is so well-tuned that stretch targets and realistic assessment converge — the individual sets ambitious goals that reliably get done. This requires not just exceptional systems but deep self-knowledge about capacity, energy, and sustainable pace.
- key: adaptability
  name: Adaptability
  weight: 25
  description:
  - Maintaining the ability to change course, adjust timelines, reprioritise, or abandon goals as new information emerges.
  - |-
    Treating goals as hypotheses, running regular reviews, and developing the skill of strategic retreat without emotional cost.
  - People who prioritise this value believe that adapting intelligently is more important than persisting stubbornly.
  benchmarks:
    level_1:
      text: |-
        Failed goals are simply abandoned with no reflection; no deliberate process for modifying, reprioritising, or strategically retiring goals
      reasoning: |-
        At the awareness level, failed goals are simply dropped without analysis. There is no distinction between a goal that should be abandoned (wrong goal) and one that needs modification (right goal, wrong approach). This binary thinking — succeed or quit — is the default pattern for most people.
    level_2:
      text: |-
        Can modify timelines or scope without abandoning goals entirely; recognises when a goal needs adjustment rather than more willpower
      reasoning: |-
        The ability to modify a goal rather than abandon it requires a cognitive shift that most people never make. Recognising that adjusting a timeline or reducing scope is not failure but intelligent recalibration represents a foundational skill that separates effective goal-setters from the majority.
    level_3:
      text: |-
        Deliberate goal triage based on data; able to deprioritise or retire goals using explicit criteria rather than guilt or avoidance
      reasoning: |-
        Deliberate, data-driven goal triage — actively deciding which goals to continue, modify, or retire based on explicit criteria — represents top 5% capability. Most people either cling to failing goals out of sunk-cost bias or abandon them out of frustration. Using structured evaluation to make these decisions is exceptionally rare.
    level_4:
      text: |-
        Pre-mortems conducted for significant goals; systematic review cadence with explicit criteria for continuing, modifying, or retiring goals; strategic retreat practised without emotional cost
      reasoning: |-
        Pre-mortems (imagining future failure modes before they occur), systematic review cadences, and the ability to practise strategic retreat without emotional cost represent top 1% flexibility. This involves treating goals as hypotheses to be tested rather than commitments to be honoured — fewer than 1 in 100 people apply this level of strategic thinking to personal goals.
    level_5:
      text: |-
        You anticipate changes that affect your goals before they arrive, retire goals decisively when warranted, and your approach to goal-setting itself evolves based on what has worked
      reasoning: |-
        Proactive environmental scanning, a maintained goal graveyard with documented rationale, and evolving personal methodology represent 99.9th percentile flexibility (1 in 1,000). At this level, the individual does not just react to change but anticipates it, maintains institutional memory of past goals, and systematically improves their own goal-setting process based on longitudinal self-data.
