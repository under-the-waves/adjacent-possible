slug: financial-planning-tracking
name: Financial Planning and Tracking
domain: Finances
pillar: Organise Your Life
survey_description: "Your budgeting, financial tracking, and overall money management."
domain_representative: true
values:
- key: accuracy
  name: Accuracy & Control
  weight: 40
  description:
  - Having precise, reliable financial information and clear oversight of money flows.
  - Detailed tracking, categorisation, and understanding exactly where money goes.
  - |-
    People who prioritise this value want comprehensive data and tight control over their financial picture, enabling them to make informed decisions based on complete information.
  benchmarks:
    level_1:
      text: Understand your approximate monthly income and spending patterns, even if not precisely tracked
      reasoning: |-
        Level 1 focuses on basic awareness without requiring systematic tracking. Since 56% of Americans don't know how much they spent last month, simply understanding approximate income and spending patterns represents meaningful initial awareness for financial control.
    level_2:
      text: |-
        Track all income and major expenses for at least one full month, as achieved by fewer than 45% of Americans who maintain any systematic approach to budgeting
      reasoning: |-
        Only 45% of Americans use any systematic budgeting approach, making one month of comprehensive tracking a meaningful achievement. This represents the foundation needed for accurate financial awareness and the basis for all subsequent financial planning.
    level_3:
      text: Maintain detailed expense tracking with less than 5% of spending unaccounted for
      reasoning: |-
        Detailed tracking with 95% accuracy represents sophisticated financial awareness that few Americans achieve. This level of precision enables informed decision-making and identifies spending patterns that casual tracking would miss, supporting the top 5% capability designation.
    level_4:
      text: Implement comprehensive tracking across multiple accounts and asset classes with real-time accuracy
      reasoning: |-
        Comprehensive multi-account tracking with real-time accuracy reflects institutional-level financial management. This capability requires sophisticated tools and processes that only the most dedicated individuals maintain, representing true top 1% financial tracking ability.
    level_5:
      text: |-
        Maintain institutional-grade financial tracking and reporting systems suitable for complex tax strategies and sophisticated financial structures
      reasoning: |-
        Institutional-grade tracking suitable for complex tax strategies represents the highest level of financial accuracy and control. This capability is used by high-net-worth individuals and requires professional-level systems and expertise, clearly placing it in the top 0.1% of capability.
- key: simplicity
  name: Simplicity & Convenience
  weight: 35
  description:
  - Making financial management effortless and low-friction.
  - Automated systems, minimal time investment, and "set it and forget it" approaches.
  - |-
    Those who prioritise this value want good financial outcomes without having to think about money regularly, preferring streamlined systems that work in the background.
  benchmarks:
    level_1:
      text: Identify your current financial management approach and its limitations
      reasoning: |-
        Many people use informal or unsustainable financial management approaches. Identifying current methods and their limitations provides the foundation for developing more effective, convenient systems without requiring immediate changes.
    level_2:
      text: Monitoring your money flows takes minimal daily effort while giving you a clear picture of where your money goes
      reasoning: |-
        Sustainable systems are crucial since most people abandon complex tracking approaches. A basic but maintainable system that requires minimal daily effort addresses the primary barrier to financial tracking whilst building sustainable habits.
    level_3:
      text: Most financial transactions are categorised and tracked with minimal manual input from you
      reasoning: |-
        Automated categorisation systems represent advanced financial management that reduces manual effort whilst maintaining accuracy. This integration of technology with financial planning reflects sophisticated approach used by financial professionals and dedicated personal finance enthusiasts.
    level_4:
      text: |-
        Your financial oversight is largely automated, requiring minimal ongoing attention while maintaining complete accuracy
      reasoning: |-
        Fully automated systems that maintain complete oversight represent the pinnacle of convenient financial management. This level requires significant setup and integration but delivers effortless ongoing financial management that few individuals achieve.
    level_5:
      text: |-
        Financial management adapts seamlessly to life changes with near-zero ongoing effort across all accounts and domains
      reasoning: |-
        Systems that adapt automatically to life changes whilst maintaining seamless operation represent the most sophisticated financial management possible. This level of automation and integration requires significant resources and expertise to achieve and maintain.
- key: insight
  name: Insight & Optimization
  weight: 25
  description:
  - Using financial data to make better decisions and identify opportunities.
  - Trend analysis, finding inefficiencies, and using tracking data to optimise spending patterns.
  - |-
    People who prioritise this value enjoy the analytical aspects and want actionable insights from their financial data to improve their financial position over time.
  benchmarks:
    level_1:
      text: Acknowledge your biggest financial unknowns and pain points
      reasoning: |-
        Research shows that financial stress often stems from uncertainty about money. Acknowledging specific unknowns and pain points creates the awareness needed to prioritise which financial information would be most valuable to track and understand.
    level_2:
      text: |-
        Set and document specific financial goals, achieved by fewer than 20% of Americans who actually accomplish their financial objectives
      reasoning: |-
        Research shows that while many Americans set financial goals, fewer than 20% actually achieve them. Documenting specific goals creates accountability and provides the direction needed for effective financial optimization and planning.
    level_3:
      text: |-
        Conduct regular financial reviews to optimise spending and identify trends. Create and maintain a written financial plan, achieved by only 36% of Americans
      reasoning: |-
        Regular financial reviews and written plans are achieved by only 36% of Americans, making this a clear marker of 95th percentile capability. Written plans provide the structure needed for systematic financial optimization and long-term financial success.
    level_4:
      text: |-
        Use advanced analytics to optimise financial decisions and predict future scenarios. Work with financial professionals for complex planning, utilised by only 37% of Americans despite 66% believing their financial planning needs improvement
      reasoning: |-
        Advanced analytics and professional relationships represent sophisticated financial optimization. Despite 66% of Americans believing their planning needs improvement, only 37% work with advisors, making professional-level planning clearly a top 1% achievement.
    level_5:
      text: |-
        Implement dynamic financial planning that integrates tax, legal, and investment considerations using quantitative methods to optimise decisions across multiple time horizons
      reasoning: |-
        Dynamic planning integrating tax, legal, and investment considerations using quantitative methods represents the highest level of financial optimization. This capability requires professional-level expertise and resources available to only the most sophisticated financial planners and wealthy individuals.
