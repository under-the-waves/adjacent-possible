slug: sex
name: Sex
domain: Friends and Relationships
pillar: Connect with Others
domain_representative: false
values:
- key: frequency
  name: Frequency
  weight: 30
  description:
  - "Maintaining a satisfying rate of sexual activity that meets both partners' needs."
  - |-
    Initiating regularly, managing desire discrepancies constructively, and ensuring sexual intimacy remains a consistent part of the relationship rather than something that fades.
  - People who prioritise this value focus on sustaining regular sexual connection.
  benchmarks:
    level_1:
      text: |-
        Understand your current sexual frequency relative to your own desires and your partner's, and identify whether there is a meaningful gap between what you want and what occurs
      reasoning: |-
        Many couples have never explicitly discussed whether their current sexual frequency meets both partners' needs. Understanding the gap between desired and actual frequency -- and whether that gap causes dissatisfaction -- is the baseline for improvement.
    level_2:
      text: |-
        Regular sexual intimacy at a frequency both partners find satisfying, with open communication about desire and willingness to initiate and respond
      reasoning: |-
        Regular sexual intimacy at a mutually satisfying frequency with open communication represents top 20% achievement. Many couples experience significant desire discrepancies they never discuss, leading to chronic dissatisfaction for one or both partners.
    level_3:
      text: |-
        Sustained sexual frequency that both partners experience as genuinely satisfying, with proactive management of desire discrepancies and life-stage changes
      reasoning: |-
        Sustained mutually satisfying frequency with proactive management of desire discrepancies and life-stage changes represents top 5%. Most couples experience significant frequency decline over time without addressing it constructively.
    level_4:
      text: |-
        Sexual frequency maintained at a mutually satisfying level across years or decades, adapting fluidly to life changes, health shifts, and evolving desires without sustained dissatisfaction
      reasoning: |-
        Mutually satisfying frequency maintained across years or decades, adapting fluidly to life changes, represents top 1%. Most long-term relationships experience significant and unaddressed frequency decline.
    level_5:
      text: |-
        Sexual connection sustained across the lifespan with continued desire and initiation from both partners, adapting gracefully to ageing and health changes without loss of regular intimacy
      reasoning: |-
        Sexual connection sustained across the lifespan with continued mutual desire, adapting gracefully to ageing, represents 99.9th percentile frequency. Most couples experience major frequency decline with age that this level transcends.
- key: variety
  name: Variety
  weight: 25
  description:
  - |-
    Diversity and novelty in sexual experiences -- exploring new activities, settings, dynamics, and expressions of intimacy.
  - Openness to experimentation, comfort discussing fantasies, and actively introducing novelty to prevent routine.
  - People who prioritise this value believe sexual growth comes through exploration.
  benchmarks:
    level_1:
      text: |-
        Know your own preferences, curiosities, and boundaries well enough to identify where you would welcome more exploration and where you feel satisfied with current patterns
      reasoning: |-
        Self-knowledge about sexual curiosities, preferences, and boundaries is surprisingly uncommon. Many people have unexplored interests they have never articulated, and identifying where you would welcome more exploration is the first step toward a richer sexual life.
    level_2:
      text: |-
        Comfort discussing preferences and occasional introduction of novelty -- new activities, settings, or dynamics -- with mutual enthusiasm
      reasoning: |-
        Comfort discussing preferences and occasionally introducing novelty represents 80th percentile variety. Most couples settle into fixed patterns early in the relationship and rarely introduce new experiences, even when both partners would welcome them.
    level_3:
      text: |-
        Active exploration of new experiences with comfort and trust, maintaining novelty within a committed relationship without either partner feeling pressured
      reasoning: |-
        Active exploration with comfort and trust, maintaining novelty without pressure, represents top 5% variety. The ability to explore comfortably while maintaining trust requires exceptional communication and mutual respect that few couples sustain.
    level_4:
      text: |-
        Rich, evolving sexual repertoire sustained over years, with both partners fully comfortable proposing and exploring new experiences together
      reasoning: |-
        A rich, evolving sexual repertoire sustained over years with full mutual comfort represents top 1% variety. Most long-term couples narrow rather than expand their sexual experiences over time.
    level_5:
      text: |-
        Sustained, evolving sexual exploration across decades with complete trust and openness, where both partners continue to discover new dimensions of their sexual connection
      reasoning: |-
        Sustained evolving sexual exploration across decades with complete trust represents 99.9th percentile variety. The combination of sustained curiosity, openness, and trust over decades is extraordinarily rare.
- key: pleasure
  name: Pleasure
  weight: 25
  description:
  - The direct experience of physical and psychological enjoyment from sexual activity.
  - Knowledge of your own body, ability to communicate desires, and the pursuit of mutually satisfying experiences.
  - "People who prioritise this value focus on expanding their capacity for enjoyment and their partner's."
  benchmarks:
    level_1:
      text: Know your own body, preferences, and responses well enough to communicate basic desires and boundaries to a partner
      reasoning: |-
        Self-knowledge about sexual preferences and the ability to communicate them is surprisingly uncommon. Research shows many people struggle to articulate their desires or boundaries, limiting sexual satisfaction.
    level_2:
      text: |-
        Both partners regularly experience satisfying sexual encounters, with the ability to communicate preferences and adjust to each other's responses
      reasoning: |-
        Regular mutual satisfaction with the ability to communicate and adjust represents 80th percentile. Research shows significant satisfaction gaps between partners in many relationships, often due to lack of communication.
    level_3:
      text: |-
        High mutual satisfaction sustained over time, with comfort exploring new experiences and the ability to maintain novelty within a committed relationship
      reasoning: |-
        Sustained high satisfaction with maintained novelty in a committed relationship is top 5% achievement. The ability to explore comfortably while maintaining trust requires exceptional communication and mutual respect.
    level_4:
      text: |-
        Consistently exceptional mutual satisfaction maintained across years or decades, with both partners fully comfortable communicating evolving needs and exploring together
      reasoning: |-
        Consistently exceptional mutual satisfaction across years or decades is top 1% achievement. Most long-term relationships experience significant satisfaction decline that this level avoids.
    level_5:
      text: |-
        Sustained, evolving sexual satisfaction across the lifespan that both partners rate as deeply fulfilling, with the flexibility and communication skills to adapt to any changes in desire, function, or circumstance
      reasoning: |-
        Sustained, evolving sexual fulfilment across the lifespan with full adaptability represents 99.9th percentile. The combination of sustained desire, communication, and flexibility over decades is extraordinarily rare.
- key: contentment
  name: Contentment
  weight: 20
  description:
  - |-
    Overall satisfaction with your sexual life as a whole -- feeling at peace with the role sex plays in your life and relationship.
  - |-
    Acceptance, gratitude, realistic expectations, and the sense that your sexual life is genuinely fulfilling rather than a source of stress or inadequacy.
  - People who prioritise this value focus on satisfaction rather than optimisation.
  benchmarks:
    level_1:
      text: |-
        Honestly assess your overall satisfaction with your sexual life -- whether it is a source of fulfilment, frustration, or indifference -- and identify what would need to change
      reasoning: |-
        Honestly assessing overall satisfaction with your sexual life -- rather than avoiding the question or assuming it is fine -- is the prerequisite for meaningful improvement. Many people carry chronic dissatisfaction without examining its sources.
    level_2:
      text: |-
        Generally satisfied with sexual life; it is experienced as a positive aspect of the relationship rather than a source of tension or inadequacy
      reasoning: |-
        General satisfaction with sexual life as a positive aspect of the relationship represents 80th percentile contentment. Many people experience their sexual life as a source of tension, inadequacy, or indifference rather than genuine satisfaction.
    level_3:
      text: |-
        Deep satisfaction with sexual life as a whole; sex is experienced as a genuinely fulfilling part of life rather than something requiring constant improvement
      reasoning: |-
        Deep satisfaction with sexual life as genuinely fulfilling rather than requiring constant improvement represents top 5% contentment. Most sexually active adults harbour some chronic dissatisfaction or comparison anxiety about their sexual lives.
    level_4:
      text: |-
        Genuine peace with sexual life; both partners feel grateful for and fulfilled by the role sex plays in their relationship, with no chronic dissatisfaction or comparison anxiety
      reasoning: |-
        Genuine peace with sexual life, with gratitude and fulfilment and no chronic dissatisfaction, represents top 1% contentment. At this level, sex is a source of deep satisfaction rather than anxiety or comparison.
    level_5:
      text: |-
        Profound contentment with sexual life as a whole, sustained across decades; sex is experienced as a source of renewal, gratitude, and deep satisfaction rather than a domain requiring vigilance
      reasoning: |-
        Profound contentment with sexual life sustained across decades, experienced as a source of renewal and deep satisfaction, represents 99.9th percentile. Fewer than 1 in 1,000 adults achieve this level of sustained sexual peace and fulfilment.
