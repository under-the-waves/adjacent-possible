slug: participatory-leisure
name: Participatory Leisure
domain: Leisure
pillar: Create & Contribute
survey_description: "Active hobbies and creative pursuits you engage in for enjoyment."
domain_representative: true
values:
- key: social
  name: Social Connection
  weight: 40
  description:
  - Building relationships and experiencing community through shared leisure activities.
  - Developing friendships, feeling belonging to groups, and gaining emotional support through leisure pursuits.
  - |-
    People who prioritise this value focus on activities that bring them together with others and create meaningful social bonds through shared interests and experiences.
  benchmarks:
    level_1:
      text: |-
        Understand your current social patterns through leisure activities and identify opportunities for meaningful connection. Recognise which activities bring you genuine social satisfaction versus those that feel obligatory or draining.
    level_2:
      text: Maintain 1-2 close leisure-based friendships and feel comfortable participating in at least one group activity.
      reasoning: |-
        Only 21% of adults participate in sports/recreation activities on any given day, with many people having primarily work-based social connections. Additionally, 15% of Americans report having no hobbies at all, and social club membership rates are quite low outside of expensive exclusive clubs. Having even 1-2 meaningful leisure-based friendships puts someone well above average social engagement through leisure. <a href="https://www.bls.gov/opub/ted/2023/time-spent-in-leisure-and-sports-activities-2022.htm" target="_blank">BLS Time Use Study</a>
    level_3:
      text: |-
        Have 3-4 close leisure-based friendships across different interest areas with regular social interaction and community involvement.
      reasoning: |-
        International studies show hobby engagement varies dramatically by country (51% in Spain to 96% in Denmark), with significant social components. Having multiple leisure-based friendships across different interest areas would be quite rare, representing approximately the top 5% of social engagement through leisure activities. <a href="https://www.nature.com/articles/s41591-023-02506-1" target="_blank">16-Country Hobby Study</a>
    level_4:
      text: |-
        Maintain extensive leisure-based friendships that provide deep emotional support and enhance all areas of life through shared experiences.
      reasoning: |-
        Research shows that maintaining extensive leisure-based friendships that provide deep emotional support across multiple life areas represents approximately 1% of the population. Most people have limited leisure-based social connections, making this level of social integration through shared interests quite rare.
    level_5:
      text: |-
        Experience profound sense of community and belonging through leisure that becomes central to personal identity and life meaning.
      reasoning: |-
        Experiencing profound community and belonging through leisure that becomes central to personal identity represents approximately 1 in 1,000 people (0.1%). This level of integration where leisure becomes the primary source of life meaning and identity is quite rare in the general population.
- key: achievement
  name: Achievement & Mastery
  weight: 35
  description:
  - Developing skills, accomplishing goals, and experiencing personal growth through leisure pursuits.
  - Both the satisfaction of improving capabilities and the confidence that comes from competence.
  - |-
    Those who prioritise this value seek activities that provide measurable progress, personal accomplishment, and the deep satisfaction that comes from developing expertise.
  benchmarks:
    level_1:
      text: |-
        Assess your existing skills and interests to identify areas where you naturally excel or feel drawn to develop further. Understand what types of accomplishment and progress feel most satisfying to you personally.
    level_2:
      text: |-
        Consistently engage in one skill-based activity for 6+ months with noticeable improvement and regular sense of accomplishment.
      reasoning: |-
        The average hobbyist spends 4-10 hours per week on their hobby, but 62% say hobbies are time-consuming and 63% wish they had more time for them. Research shows most people struggle with consistency in leisure activities. Maintaining consistent engagement in a skill-based activity for 6+ months represents genuine achievement that most people do not sustain. <a href="https://aytm.com/post/hobbies-survey" target="_blank">American Hobbies Survey</a>
    level_3:
      text: |-
        Develop intermediate-to-advanced skills in 1-2 activities, sufficient for informal teaching or impressive demonstration to others.
      reasoning: |-
        Hobbies are characterized by consistent engagement in skill-building activities pursued for enjoyment. Reaching intermediate-to-advanced level sufficient for teaching others requires significant sustained time investment (typically 100+ hours) that research shows most hobbyists never achieve. This represents approximately top 5% achievement. <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC6934368/" target="_blank">Organized Activities Study</a>
    level_4:
      text: |-
        Achieve highly advanced skills that enable original creative expression, competitive success, or recognition within your areas of interest.
      reasoning: |-
        Achieving highly advanced skills that enable original creative expression, competitive success, or recognition typically requires 500-1000+ hours of dedicated practice. Research on skill development suggests only about 1% of hobbyists reach levels where they achieve competitive success or significant recognition in their field.
    level_5:
      text: |-
        Reach near-professional level mastery that provides deep life purpose and enables exceptional creative or competitive achievements.
      reasoning: |-
        Near-professional level mastery that provides deep life purpose typically requires 2000+ hours of practice and often represents the top 0.1% of practitioners in any given field. This might include published authors, exhibited artists, or competitive athletes who achieve exceptional creative or competitive achievements.
- key: adventure
  name: Adventure & Exploration
  weight: 25
  description:
  - Seeking novelty, challenge, and transformative experiences through leisure.
  - |-
    Expanding comfort zones, discovering new activities, and pursuing memorable adventures that provide lasting personal meaning.
  - |-
    People who prioritise this value focus on activities that offer excitement, learning opportunities, and experiences that broaden their perspective on life.
  benchmarks:
    level_1:
      text: |-
        Recognise your comfort zone boundaries and natural curiosity patterns. Identify what kinds of new experiences energise you versus those that create unnecessary stress or anxiety.
    level_2:
      text: Try 2-3 new activities per year and occasionally step outside comfort zone with moderate challenges.
      reasoning: |-
        67% of people have multiple hobbies, but research shows most stick to familiar activities. Only 55% of Americans participate in outdoor recreational activities, suggesting most prefer familiar, indoor pursuits. Trying 2-3 new activities per year represents more adventurous behaviour than most people demonstrate. <a href="https://www.sportsdestinations.com/sports/all-sports/record-number-americans-participated-sports-33929" target="_blank">SFIA Participation Report</a>
    level_3:
      text: |-
        Regularly seek transformative experiences that create lasting memories and demonstrate willingness to tackle significant challenges.
      reasoning: |-
        Survey data on travel and new experiences suggests that only about 5% of adults regularly seek transformative experiences or consistently expand their comfort zones. Most people prefer routine leisure choices and familiar activities. Regular transformative experiences would be quite rare in the general population.
    level_4:
      text: |-
        Pursue extraordinary experiences that require exceptional commitment, skill, or courage and create profound personal transformation.
      reasoning: |-
        Extraordinary experiences requiring exceptional commitment, skill, or courage (such as major expeditions, competitive events, or challenging creative projects) are pursued by approximately 1% of the population. These activities often require substantial time, money, and risk tolerance that most people do not possess.
    level_5:
      text: |-
        Undertake life-defining adventures that push personal boundaries and contribute to knowledge or inspiration in your areas of interest.
      reasoning: |-
        Life-defining adventures that push personal boundaries and contribute to knowledge or inspiration represent the activities of approximately 1 in 1,000 people. Examples might include significant explorations, pioneering new activities, or adventures that result in documentaries, books, or inspire others in meaningful ways.
