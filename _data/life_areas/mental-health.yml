slug: mental-health
name: Mental Health
domain: Wellbeing
pillar: Look After Yourself
survey_description: "Your emotional wellbeing, resilience, and psychological health."
domain_representative: false
values:
- key: stability
  name: Stability
  weight: 40
  description:
  - Freedom from distressing psychological symptoms such as anxiety, depression, rumination, and emotional volatility.
  - A consistently stable emotional baseline that allows you to function well day-to-day without being derailed by internal distress.
  - People who prioritise this value focus on reducing suffering and maintaining emotional equilibrium.
  benchmarks:
    level_1:
      text: Identify which psychological symptoms (anxiety, low mood, rumination, emotional volatility) most affect your daily functioning and how frequently they occur
      reasoning: |-
        Most people experience distressing psychological symptoms but have not systematically assessed which ones affect them most or how often. This awareness step requires honest self-inventory rather than vague acknowledgement that "stress is bad." Approximately 80% of adults have not done this structured self-assessment.
    level_2:
      text: |-
        Experience distressing psychological symptoms no more than a few times per month, with episodes resolving within hours rather than days
      reasoning: |-
        Achieving this level of emotional stability places someone in the top 20% of the adult population. Approximately 20% of adults experience a mental health disorder in any given year, and many more experience subclinical symptoms that regularly disrupt functioning. Consistently resolving distress within hours rather than days requires either natural temperament or developed coping skills. <a href="https://www.nimh.nih.gov/health/statistics/mental-illness" target="_blank">Source: NIMH</a>
    level_3:
      text: |-
        Maintain a stable emotional baseline across most situations, with distressing episodes rare and brief, and no symptoms meeting clinical thresholds
      reasoning: |-
        This represents the top 5% of emotional stability. Most adults experience regular anxiety, mood dips, or rumination that disrupts functioning at least weekly. Achieving near-complete freedom from clinical-threshold symptoms while maintaining stability across varied situations requires sophisticated self-management or fortunate neurobiology. <a href="https://www.who.int/news-room/fact-sheets/detail/mental-disorders" target="_blank">Source: WHO</a>
    level_4:
      text: |-
        Sustain emotional equilibrium even during significant life stressors (job loss, relationship conflict, health scares) with minimal symptom escalation
      reasoning: |-
        Maintaining stability during major stressors represents approximately the top 1%. Most people experience significant symptom increases during adverse life events. This level requires deep emotional regulation capacity that prevents stressors from destabilising the baseline, not merely recovering quickly afterwards.
    level_5:
      text: |-
        Experience near-complete freedom from distressing psychological symptoms across all life circumstances, including prolonged adversity and major transitions
      reasoning: |-
        Approximately 1 in 1,000 people maintain this degree of psychological stability. Even among those with excellent mental health, sustained adversity (bereavement, chronic illness, major loss) typically produces some symptom elevation. This level represents exceptional emotional regulation that keeps distress minimal even under extreme circumstances.
- key: resilience
  name: Resilience
  weight: 35
  description:
  - Capacity to maintain psychological functioning during adversity and recover quickly from setbacks.
  - The ability to tolerate stress, adapt to changed circumstances, and emerge from difficulty without lasting impairment.
  - People who prioritise this value focus on building stress tolerance and adaptive capacity rather than avoiding difficulty.
  benchmarks:
    level_1:
      text: Identify your typical responses to adversity and recognise which types of stressors affect you most
      reasoning: |-
        Understanding your own stress response patterns requires metacognitive awareness that most people lack. The majority react to adversity without examining their patterns, making this basic self-knowledge a meaningful first step that approximately 80% of adults have not systematically undertaken.
    level_2:
      text: |-
        Recover from moderate setbacks (work conflict, minor financial stress, social rejection) within one to two weeks and maintain basic functioning during the recovery period
      reasoning: |-
        Recovering from moderate stressors within two weeks while maintaining functioning places someone in the top 20%. Many adults experience prolonged disruption from common setbacks, with rumination and avoidance extending recovery well beyond two weeks. <a href="https://www.apa.org/topics/resilience" target="_blank">Source: APA</a>
    level_3:
      text: |-
        Recover from major setbacks (job loss, relationship breakdown, significant health issue) within weeks rather than months, and use the experience to inform future coping
      reasoning: |-
        Recovering from major life events within weeks and extracting useful learning represents the top 5%. Research on post-adversity adjustment shows most people take months to regain baseline functioning after major setbacks, and many do not systematically learn from the experience. <a href="https://pubmed.ncbi.nlm.nih.gov/20085608/" target="_blank">Source: Bonanno (2004)</a>
    level_4:
      text: |-
        Maintain near-normal functioning during severe adversity and demonstrate post-traumatic growth, emerging from major challenges with genuinely enhanced capability
      reasoning: |-
        Post-traumatic growth (not merely recovery but genuine improvement) following severe adversity is experienced by approximately 1% of the population in a meaningful, lasting way. This requires the capacity to process extreme stress without prolonged impairment while simultaneously extracting growth from the experience.
    level_5:
      text: |-
        Sustain high-level functioning through prolonged, compounding adversity (multiple simultaneous major stressors) and consistently convert difficult experiences into enhanced psychological capacity
      reasoning: |-
        Approximately 1 in 1,000 people maintain high functioning through compounding adversity. Most people who handle one major stressor well are overwhelmed when multiple stressors coincide. This level represents an extraordinary capacity to absorb, process, and grow from sustained difficulty without cumulative degradation.
- key: flourishing
  name: Flourishing
  weight: 25
  description:
  - Experiencing deep and sustained joy, meaning, life satisfaction, and engagement across daily life.
  - The ceiling of mental health rather than the floor -- not just the absence of suffering, but the active presence of positive psychological states.
  - People who prioritise this value focus on cultivating purpose, positive emotions, and meaningful engagement rather than merely managing symptoms.
  benchmarks:
    level_1:
      text: Identify which activities, relationships, and circumstances most reliably produce positive emotions, meaning, or engagement in your life
      reasoning: |-
        Most people have not systematically mapped their sources of positive experience. They may know they "feel good" after exercise or with certain friends, but have not catalogued these patterns to inform life decisions. This structured awareness is the foundation for intentional flourishing.
    level_2:
      text: |-
        Experience genuine positive emotions (joy, gratitude, interest, amusement) on most days, with a general sense that life is satisfying and moving in a good direction
      reasoning: |-
        Consistent daily positive affect with an overall sense of life satisfaction places someone in the top 20%. Research on subjective wellbeing shows that while most people report being "fairly happy," regular experience of varied positive emotions combined with a sense of forward momentum is less common. <a href="https://worldhappiness.report/" target="_blank">Source: World Happiness Report</a>
    level_3:
      text: |-
        Experience frequent flow states, a clear sense of purpose, and deep satisfaction from multiple life domains (work, relationships, personal growth)
      reasoning: |-
        Experiencing flow regularly, having a clear sense of purpose, and deriving deep satisfaction across multiple life domains represents the top 5%. Most people may flourish in one area while languishing in others, or experience occasional flow without it being a regular feature of their life. <a href="https://pubmed.ncbi.nlm.nih.gov/15982151/" target="_blank">Source: Keyes (2005)</a>
    level_4:
      text: |-
        Sustain deep meaning and engagement across all major life areas, with positive emotions as the dominant daily experience and a strong sense of living in alignment with core values
      reasoning: |-
        Sustained flourishing across all major life domains represents approximately the top 1%. Keyes' research on "complete mental health" (high emotional, psychological, and social wellbeing combined with low mental illness) estimates this comprehensive flourishing at roughly 17% of adults, but sustained flourishing across all domains simultaneously is much rarer.
    level_5:
      text: |-
        Experience a pervasive sense of meaning, joy, and engagement that persists even during difficult periods, with life structured around deep purpose and values
      reasoning: |-
        Approximately 1 in 1,000 people maintain this degree of flourishing. The key distinction from Level 4 is persistence through adversity -- most people's positive affect drops significantly during hard times. This level represents a depth of meaning and engagement so rooted that it sustains even when circumstances are unfavourable.
