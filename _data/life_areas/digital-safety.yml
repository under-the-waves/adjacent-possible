slug: digital-safety
name: Digital Safety
domain: Security
pillar: Look After Yourself
domain_representative: false
values:
- key: security
  name: Comprehensive Security
  weight: 70
  description:
  - |-
    Minimising exposure to cyber threats, data breaches, privacy violations, and digital fraud through systematic security measures, privacy controls, and threat awareness.
  - |-
    People who prioritise this value focus on thorough protection across devices and platforms, proactive security practices, and evidence-based methods for reducing various categories of digital risk including financial fraud, identity theft, surveillance, and malware.
  - |-
    Learning about emerging threats, implementing multiple layers of protection, and accepting some inconvenience or reduced functionality in exchange for stronger security.
  benchmarks:
    level_1:
      text: |-
        Understand current digital vulnerabilities through basic assessment of password security, device protection, and online habits
      reasoning: |-
        This represents basic awareness appropriate for assessment-level engagement. Research shows significant gaps in basic cybersecurity knowledge, with studies finding that 20% of underserved populations don't know about online crime and 31% don't know about antivirus software. Level 1 focuses on understanding these fundamental concepts without requiring implementation.
    level_2:
      text: |-
        Use unique passwords with a password manager for all important accounts, enable 2FA on financial and email accounts, recognise and avoid obvious phishing attempts, keep devices updated with security patches, and use basic privacy settings on social media platforms
      reasoning: |-
        This represents 80th percentile achievement based on research showing only 36% of Americans use password managers and 41% enable 2FA for all accounts. Since Level 2 targets the top 20% of the population, achieving comprehensive password management and selective 2FA implementation represents significant improvement over average security practices. Studies demonstrate these measures prevent 99.9% of automated attacks.
    level_3:
      text: |-
        Comprehensive password management across all accounts, 2FA enabled on all critical services, reliable recognition of sophisticated phishing attempts, thoughtful privacy settings across all platforms, quarterly review of account security and permissions, and occasional use of encrypted messaging for sensitive conversations
      reasoning: |-
        This represents 95th percentile capability (top 5%) based on population research. While 41% use 2FA for some accounts, comprehensive 2FA across all critical services, sophisticated phishing recognition, and systematic security reviews represent advanced practices achieved by very few people. Quarterly security reviews indicate proactive rather than reactive security management.
    level_4:
      text: |-
        Personal threat assessment considering individual risk factors, hardware security keys for most important accounts, regular VPN usage for privacy protection, consistent encrypted communication practices, systematic approach to monitoring account activity and responding to security alerts, and careful management of digital footprint across platforms
      reasoning: |-
        This represents 99th percentile capability (top 1%) incorporating advanced practices like personal threat assessment and hardware security keys. With only 32% of Americans using VPNs and most using free/less secure options, regular strategic VPN usage plus systematic security monitoring represents sophisticated personal security practices achieved by very few individuals.
    level_5:
      text: |-
        Systematic personal security planning based on individual threat landscape, sophisticated authentication and privacy protection across all digital activities, comprehensive approach to digital privacy including selective platform usage, proactive security monitoring with clear response procedures for suspicious activity, and serves as informal security advisor for family and friends
      reasoning: |-
        This represents 99.9th percentile capability (top 0.1%, ~340,000 Americans) with systematic personal security planning and comprehensive threat management. This level includes serving as informal security advisor, indicating expertise sufficient to guide others while maintaining sophisticated personal security practices across all digital activities.
- key: convenience
  name: Usability and Convenience
  weight: 30
  description:
  - Maintaining digital functionality and ease of use whilst achieving reasonable security.
  - |-
    The ability to use desired platforms, services, and features without excessive security-related friction, complexity, or technical barriers.
  - |-
    Those who prioritise this value seek protective measures that integrate seamlessly into existing digital workflows rather than comprehensive systems that may significantly impact user experience, require extensive technical knowledge, or limit access to preferred services and features.
  benchmarks:
    level_1:
      text: "Assess current digital workflows and identify security gaps that don't require significant changes to existing habits"
      reasoning: |-
        Level 1 convenience focuses on assessment without disruption to existing workflows. This acknowledges that 37% of people don't think they need security tools and 23% don't believe they are secure, indicating that awareness-building must respect current digital habits and preferences.
    level_2:
      text: |-
        Implement security measures that require minimal daily management through automated tools like browser-integrated password managers and automatic updates. Maintain access to preferred platforms and services while achieving reasonable protection against common threats
      reasoning: |-
        Level 2 convenience emphasises security measures that integrate with existing workflows. Research shows 51% of people rely on memorisation for passwords, making browser-integrated password managers a significant but manageable improvement. Automatic updates and basic privacy settings provide substantial protection with minimal daily interaction required.
    level_3:
      text: |-
        Streamlined security workflows using premium tools that balance protection with functionality. Minimal disruption to digital habits while maintaining strong security across personal and professional digital activities
      reasoning: |-
        Level 3 convenience focuses on streamlined workflows using premium tools that balance protection with functionality. This level represents users who have moved beyond basic security to sophisticated but manageable systems that enhance rather than hinder digital productivity.
    level_4:
      text: |-
        Highly efficient security systems that enhance rather than hinder productivity through advanced automation and integration. Seamless protection across all digital activities with minimal daily security management required
      reasoning: |-
        Level 4 convenience represents highly efficient security systems that enhance productivity through advanced automation. This level indicates security expertise that allows for sophisticated protection without daily management overhead, representing the top 1% of personal security implementations.
    level_5:
      text: |-
        Highly sophisticated but transparent security infrastructure that provides maximum protection with minimal user friction. Advanced automation and security systems that maintain full functionality while providing comprehensive protection against sophisticated threats
      reasoning: |-
        Level 5 convenience represents sophisticated security infrastructure that provides maximum protection with minimal user friction. This level indicates mastery where advanced security becomes transparent to daily use, representing the most sophisticated personal digital safety implementations achievable.
