slug: housework
name: Housework
domain: Environment
pillar: Organise Your Life
survey_description: "How you manage cleaning, maintenance, and domestic responsibilities."
domain_representative: false
values:
- key: health
  name: Health & Hygiene
  weight: 35
  description:
  - Housework that protects physical health by reducing illness, allergens, pests, mould, and toxins.
  - Cleaning protocols, air quality management, and maintenance practices that eliminate health hazards.
  - |-
    Those who prioritise this value focus on evidence-based cleaning frequencies and methods that have the greatest impact on health outcomes.
- key: order
  name: Order
  weight: 30
  description:
  - The mental calm and cognitive ease that comes from an organised, uncluttered living space.
  - Knowing where everything is, having systems that maintain themselves, and not feeling overwhelmed by mess.
  - |-
    Those who prioritise this value focus on organisational systems, decluttering, and routines that keep the home orderly without constant effort.
- key: aesthetics
  name: Aesthetics
  weight: 25
  description:
  - The visual appeal and sensory pleasure derived from your living space.
  - Design choices, visual harmony, and personalised spaces that reflect your taste and feel inviting.
  - |-
    Those who prioritise this value focus on creating environments that are pleasing to be in, not just tidy or functional.
- key: environmental
  name: Environmental Impact
  weight: 10
  description:
  - The ecological footprint of home management practices.
  - Sustainable cleaning methods, waste reduction, and considerate resource use.
  - |-
    Those who prioritise this value focus on eco-friendly products, minimal consumption, and practices that reduce environmental harm.
