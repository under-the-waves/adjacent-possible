slug: housework
name: Housework
domain: Environment
pillar: Organise Your Life
domain_representative: false
values:
- key: functional
  name: Functional Efficiency
  weight: 40
  description:
  - Home management that creates smooth operation and reduced friction in daily life.
  - Logical organization systems, streamlined workflows, intuitive storage, and time-saving routines.
  - |-
    People who prioritize this value focus on creating systems that minimize effort while maximizing effectiveness, with particular attention to how their space functions.
- key: health
  name: Health & Wellbeing
  weight: 30
  description:
  - Housework that supports physical and psychological wellbeing.
  - Cleanliness standards, air quality, absence of toxins, and creating spaces that reduce stress and support relaxation.
  - |-
    Those who prioritize this value focus on cleaning protocols that eliminate health hazards and maintenance practices that create a physically and mentally supportive environment.
- key: aesthetics
  name: Aesthetics & Enjoyment
  weight: 20
  description:
  - The visual appeal and sensory pleasure derived from your living space.
  - |-
    Design considerations, organization that creates visual calm, and the satisfaction of personalized spaces that reflect your tastes.
  - |-
    Those who prioritize this value focus on creating environments that are not just functional but also beautiful and emotionally nurturing.
- key: environmental
  name: Environmental Impact
  weight: 10
  description:
  - The ecological footprint of home management practices.
  - Sustainable cleaning methods, waste reduction, energy efficiency, and considerate resource use.
  - |-
    Those who prioritise this value focus on eco-friendly products, minimal consumption, and practices that reduce environmental harm.
  - |-
    Your optimal approach will also be influenced by your household size, living space, cultural background, personal preferences, health conditions, income level, and competing priorities. This guide focuses on evidence-based principles that benefit most people across five core components: cleanliness and hygiene, organisation and storage, home maintenance and systems, time and resource efficiency, and sustainability impact.
  - |-
    _Note: Your own priorities may differ from the weightings used in this guide. While these values often complement each other, there can be trade-offs—for example, some highly efficient systems might initially require more time to implement, or certain aesthetic choices might require more maintenance._
