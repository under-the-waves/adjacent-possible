slug: extended-family
name: Extended Family
domain: Family
pillar: Connect with Others
domain_representative: false
values:
- key: harmony
  name: Harmony
  weight: 40
  description:
  - Maintaining peaceful, low-conflict relationships across the extended family.
  - |-
    Navigating differences respectfully, managing family tensions proactively, finding common ground, and ensuring family gatherings are pleasant rather than stressful.
  - People who prioritise this value invest in diplomacy and conflict prevention.
  benchmarks:
    level_1:
      text: |-
        Assess the current level of conflict and tension across your extended family -- identify which relationships are strained, which disagreements are unresolved, and where gatherings create stress rather than connection
      reasoning: |-
        Many adults are unaware of the full landscape of tension and conflict across their extended family. Assessing which relationships are strained and which gatherings create stress rather than connection is the first step toward building a more peaceful family environment.
    level_2:
      text: |-
        Family gatherings are generally pleasant; major sources of tension are identified and managed; you can navigate disagreements with extended family without damaging relationships
      reasoning: |-
        Generally pleasant family gatherings with managed tensions and the ability to navigate disagreements without damage represents 80th percentile harmony. Many extended families have unaddressed conflicts that make gatherings stressful for at least some members.
    level_3:
      text: |-
        You actively mediate tensions and prevent conflicts from escalating; family members see you as someone who makes gatherings better; disagreements are navigated with genuine skill
      reasoning: |-
        Actively mediating tensions and being seen as someone who makes gatherings better represents top 5% family harmony. Most family members either avoid conflict entirely or participate in it; the ability to defuse tensions with genuine skill is rare.
    level_4:
      text: |-
        You function as a peacekeeper and unifier across the family network; conflicts are resolved before they escalate; the family culture of respectful disagreement is partly your creation
      reasoning: |-
        Functioning as a peacekeeper and unifier who has helped create a family culture of respectful disagreement represents top 1% harmony. This requires exceptional emotional intelligence, diplomatic skill, and years of patient relationship management.
    level_5:
      text: |-
        The extended family operates as a harmonious community where differences are valued rather than merely tolerated; a culture of mutual respect and constructive dialogue has been established that persists across generations
      reasoning: |-
        An extended family that operates as a harmonious community where differences are valued and a culture of mutual respect persists across generations represents 99.9th percentile harmony. This level of family cohesion requires generational effort and leadership that virtually no modern family achieves.
- key: closeness
  name: Closeness
  weight: 35
  description:
  - Maintaining emotionally meaningful relationships with extended family across geographic and generational boundaries.
  - |-
    Regular contact, shared experiences, genuine conversations, and investing time in relationships that might otherwise atrophy.
  - People who prioritise this value actively seek deeper involvement with their extended family.
  benchmarks:
    level_1:
      text: |-
        Assess the current emotional depth of your extended family relationships -- identify which relatives you genuinely know well and which you have only surface-level contact with
      reasoning: |-
        Many adults have extended family contact that is logistical rather than emotionally meaningful. Assessing which relationships have genuine depth -- and which are maintained only through obligation or habit -- is the prerequisite for building closer family ties.
    level_2:
      text: |-
        Monthly meaningful contact with at least 3 -- 5 extended family members that goes beyond logistics -- genuine conversations about each other's lives, feelings, and experiences
      reasoning: |-
        Monthly meaningful contact with 3 -- 5 extended family members that goes beyond logistics places you above 80% of adults. Most people maintain only surface-level contact with extended family, limited to holidays and family emergencies.
    level_3:
      text: |-
        Weekly contact with multiple extended family members, regular visits across geographic distance, and relationships of genuine emotional depth across at least 2 generations beyond your own
      reasoning: |-
        Weekly contact with multiple extended family members across generations represents exceptional commitment. This level of emotional investment in extended family requires deliberate prioritisation that fewer than 5% of adults sustain.
    level_4:
      text: |-
        Sustained emotionally intimate relationships with 10+ extended family members across multiple branches, with regular multi-generational gatherings and meaningful connection that extends to distant relatives
      reasoning: |-
        Sustained emotionally intimate relationships with 10+ extended family members while organising gatherings represents top 1% family closeness. This requires exceptional social energy, organisational ability, and genuine emotional investment that very few people maintain.
    level_5:
      text: |-
        Deep, sustained emotional intimacy across the entire extended family network spanning 3+ generations, with regular contact maintained with 20+ relatives and the ability to bring together distant branches into a cohesive family community
      reasoning: |-
        Deep emotional intimacy across 3+ generations with 20+ relatives represents 99.9th percentile family closeness. Building a cohesive family community from distant branches requires exceptional social capacity, resources, and commitment that fewer than 1 in 1,000 people sustain.
- key: balance
  name: Balance
  weight: 25
  description:
  - Maintaining healthy boundaries with extended family so these relationships enhance rather than constrain your life.
  - The ability to set limits without guilt, make decisions independently, and ensure family obligations remain sustainable.
  - People who prioritise this value protect their autonomy while staying connected.
  benchmarks:
    level_1:
      text: |-
        Recognise where extended family expectations may be constraining your choices, and where you may be sacrificing personal boundaries to avoid conflict or guilt
      reasoning: |-
        Many people are unaware of how much extended family expectations shape their choices -- from where they live to how they spend holidays. Recognising where family pressure constrains your autonomy is the first step toward healthier boundaries.
    level_2:
      text: |-
        Clear boundaries maintained with extended family without damaging relationships -- able to decline requests, set limits on visits, and make life decisions independently while remaining connected
      reasoning: |-
        Maintaining clear boundaries without damaging relationships represents 80th percentile family balance. Many adults either submit to family pressure or create distance through conflict -- the ability to set limits warmly is surprisingly rare.
    level_3:
      text: |-
        Boundaries that are understood and respected by extended family, with the ability to navigate family pressure without guilt or resentment. Family relationships feel chosen rather than obligatory
      reasoning: |-
        Boundaries that are understood and respected -- where family relationships feel chosen rather than obligatory -- represent top 5% family functioning. Achieving this requires honest communication and sustained boundary-setting that most families never reach.
    level_4:
      text: |-
        Complete autonomy in life decisions while maintaining warm family relationships. Family members respect your boundaries because you have demonstrated that independence and closeness coexist
      reasoning: |-
        Complete life autonomy while maintaining warm family relationships represents top 1% family balance. Most people experience independence and family closeness as a trade-off; achieving both simultaneously requires exceptional emotional maturity and communication skill.
    level_5:
      text: |-
        Family relationships that are entirely free of coercion or guilt, where every member's autonomy is respected as a matter of family culture. Your independence is not just tolerated but valued as a model for healthy family functioning
      reasoning: |-
        Family relationships entirely free of coercion or guilt, where autonomy is valued as part of family culture, represents 99.9th percentile balance. This level of healthy family functioning is extraordinarily rare and typically requires generational effort to establish.
