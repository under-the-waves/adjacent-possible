# Schwartz Portrait Values Questionnaire (PVQ-21)
# Source: Schwartz, S.H. (2003). "A proposal for measuring value orientations across nations".
# In Questionnaire Development Package of the European Social Survey.
# Items reproduced verbatim from Table 6 of the source chapter.

intro: "Below are short descriptions of some people. Please read each description and think about how much each person is or is not like you. Choose the option that shows how much the person described is like you."

prompt: "How much like you is this person?"

scale:
  - { value: 6, label: "Very much like me" }
  - { value: 5, label: "Like me" }
  - { value: 4, label: "Somewhat like me" }
  - { value: 3, label: "A little like me" }
  - { value: 2, label: "Not like me" }
  - { value: 1, label: "Not like me at all" }

# 21 items in canonical order. Each rendered with the form matching the user's
# stated gender. Female swaps he/his/him/himself → she/her/her/herself.
# They version uses singular they: he→they, his→their, him→them, himself→themself,
# and conjugates verbs accordingly (he likes → they like, he wants → they want).

items:
  - id: 1
    value: self-direction
    male: "Thinking up new ideas and being creative is important to him. He likes to do things in his own original way."
    female: "Thinking up new ideas and being creative is important to her. She likes to do things in her own original way."
    they: "Thinking up new ideas and being creative is important to them. They like to do things in their own original way."

  - id: 2
    value: power
    male: "It is important to him to be rich. He wants to have a lot of money and expensive things."
    female: "It is important to her to be rich. She wants to have a lot of money and expensive things."
    they: "It is important to them to be rich. They want to have a lot of money and expensive things."

  - id: 3
    value: universalism
    male: "He thinks it is important that every person in the world be treated equally. He wants justice for everybody, even for people he doesn't know."
    female: "She thinks it is important that every person in the world be treated equally. She wants justice for everybody, even for people she doesn't know."
    they: "They think it is important that every person in the world be treated equally. They want justice for everybody, even for people they don't know."

  - id: 4
    value: achievement
    male: "It is very important to him to show his abilities. He wants people to admire what he does."
    female: "It is very important to her to show her abilities. She wants people to admire what she does."
    they: "It is very important to them to show their abilities. They want people to admire what they do."

  - id: 5
    value: security
    male: "It is important to him to live in secure surroundings. He avoids anything that might endanger his safety."
    female: "It is important to her to live in secure surroundings. She avoids anything that might endanger her safety."
    they: "It is important to them to live in secure surroundings. They avoid anything that might endanger their safety."

  - id: 6
    value: stimulation
    male: "He likes surprises and is always looking for new things to do. He thinks it is important to do lots of different things in life."
    female: "She likes surprises and is always looking for new things to do. She thinks it is important to do lots of different things in life."
    they: "They like surprises and are always looking for new things to do. They think it is important to do lots of different things in life."

  - id: 7
    value: conformity
    male: "He believes that people should do what they're told. He thinks people should follow rules at all times, even when no-one is watching."
    female: "She believes that people should do what they're told. She thinks people should follow rules at all times, even when no-one is watching."
    they: "They believe that people should do what they're told. They think people should follow rules at all times, even when no-one is watching."

  - id: 8
    value: universalism
    male: "It is important to him to listen to people who are different from him. Even when he disagrees with them, he still wants to understand them."
    female: "It is important to her to listen to people who are different from her. Even when she disagrees with them, she still wants to understand them."
    they: "It is important to them to listen to people who are different from them. Even when they disagree, they still want to understand them."

  - id: 9
    value: tradition
    male: "He thinks it's important not to ask for more than what you have. He believes that people should be satisfied with what they have."
    female: "She thinks it's important not to ask for more than what you have. She believes that people should be satisfied with what they have."
    they: "They think it's important not to ask for more than what you have. They believe that people should be satisfied with what they have."

  - id: 10
    value: hedonism
    male: 'Having a good time is important to him. He likes to "spoil" himself.'
    female: 'Having a good time is important to her. She likes to "spoil" herself.'
    they: 'Having a good time is important to them. They like to "spoil" themself.'

  - id: 11
    value: self-direction
    male: "It is important to him to make his own decisions about what he does. He likes to be free to plan and to choose his activities for himself."
    female: "It is important to her to make her own decisions about what she does. She likes to be free to plan and to choose her activities for herself."
    they: "It is important to them to make their own decisions about what they do. They like to be free to plan and to choose their activities for themself."

  - id: 12
    value: benevolence
    male: "It's very important to him to help the people around him. He wants to care for other people."
    female: "It's very important to her to help the people around her. She wants to care for other people."
    they: "It's very important to them to help the people around them. They want to care for other people."

  - id: 13
    value: achievement
    male: "Being very successful is important to him. He likes to impress other people."
    female: "Being very successful is important to her. She likes to impress other people."
    they: "Being very successful is important to them. They like to impress other people."

  - id: 14
    value: security
    male: "It is very important to him that his country be safe from threats from within and without. He is concerned that social order be protected."
    female: "It is very important to her that her country be safe from threats from within and without. She is concerned that social order be protected."
    they: "It is very important to them that their country be safe from threats from within and without. They are concerned that social order be protected."

  - id: 15
    value: stimulation
    male: "He looks for adventures and likes to take risks. He wants to have an exciting life."
    female: "She looks for adventures and likes to take risks. She wants to have an exciting life."
    they: "They look for adventures and like to take risks. They want to have an exciting life."

  - id: 16
    value: conformity
    male: "It is important to him always to behave properly. He wants to avoid doing anything people would say is wrong."
    female: "It is important to her always to behave properly. She wants to avoid doing anything people would say is wrong."
    they: "It is important to them always to behave properly. They want to avoid doing anything people would say is wrong."

  - id: 17
    value: power
    male: "It is important to him to be in charge and tell others what to do. He wants people to do what he says."
    female: "It is important to her to be in charge and tell others what to do. She wants people to do what she says."
    they: "It is important to them to be in charge and tell others what to do. They want people to do what they say."

  - id: 18
    value: benevolence
    male: "It is important to him to be loyal to his friends. He wants to devote himself to people close to him."
    female: "It is important to her to be loyal to her friends. She wants to devote herself to people close to her."
    they: "It is important to them to be loyal to their friends. They want to devote themself to people close to them."

  - id: 19
    value: universalism
    male: "He strongly believes that people should care for nature. Looking after the environment is important to him."
    female: "She strongly believes that people should care for nature. Looking after the environment is important to her."
    they: "They strongly believe that people should care for nature. Looking after the environment is important to them."

  - id: 20
    value: tradition
    male: "Religious belief is important to him. He tries hard to do what his religion requires."
    female: "Religious belief is important to her. She tries hard to do what her religion requires."
    they: "Religious belief is important to them. They try hard to do what their religion requires."

  - id: 21
    value: hedonism
    male: "He seeks every chance he can to have fun. It is important to him to do things that give him pleasure."
    female: "She seeks every chance she can to have fun. It is important to her to do things that give her pleasure."
    they: "They seek every chance they can to have fun. It is important to them to do things that give them pleasure."

# Items per value (for averaging when computing pvqScore per value)
items_by_value:
  self-direction: [1, 11]
  power: [2, 17]
  universalism: [3, 8, 19]
  achievement: [4, 13]
  security: [5, 14]
  stimulation: [6, 15]
  conformity: [7, 16]
  hedonism: [10, 21]
  benevolence: [12, 18]
  tradition: [9, 20]
