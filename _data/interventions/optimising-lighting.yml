  upfront_cost_reasoning: "A basic 10,000 lux light therapy lamp costs $30-50 (budget models on Amazon). The evening component can start with free phone/computer night mode settings and 1-2 warm-toned smart bulbs ($10-15 each for basic Wi-Fi bulbs). Minimum viable setup: one therapy lamp (~$40) plus two warm smart bulbs (~$30)."
  ongoing_cost: 5
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "Electricity costs for the therapy lamp (30 min/day at ~24W) and smart bulbs are negligible. Occasional bulb replacement every 2-3 years. No subscriptions required if using basic smart bulbs with free apps."
  upfront_time: 3
  upfront_time_reasoning: "Research optimal lamp placement and timing (~1 hour), set up smart bulbs and configure evening automation schedules (~1 hour), establish morning routine integration (~1 hour). Basic setup can be done in a single session."
  ongoing_time: 2.5
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Morning light therapy session: 20-30 minutes daily (2-3.5 hours/week). Evening component requires no additional time once automated – simply living in the dim warm light environment. Minimum effective commitment is ~2.5 hours/week for the morning sessions."

prerequisites:
  - "Electrical outlets near where you spend your first 30 minutes after waking (for therapy lamp placement)"
  - "Controllable lighting in main evening living spaces (ability to dim or replace bulbs; renters may need landlord permission for fixture changes)"
  - "No photosensitive medical conditions such as retinal disease, bipolar disorder (bright light can trigger mania), or use of photosensitising medications without medical clearance"

