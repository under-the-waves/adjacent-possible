name: "Eliminating Micro-Decisions"
what_it_is: |
  Systematically identifying and removing low-stakes recurring decisions – meals, clothing, routes, scheduling – by establishing default choices and 'if X, then always Y' rules. Once defaults are in place, the intervention works by removing effort rather than adding it, which makes it unusually durable. Complements [Creating SOPs](/resources/intervention-database/creating-sops), which preserves all steps but offloads sequencing, and [Habit Stacking](/resources/intervention-database/habit-stacking), which anchors new behaviours to existing routines.
how_to_do_it: |
  - Audit a typical week by noting every recurring choice point from waking to sleeping, then categorise each as high-stakes (worth deliberating) or low-stakes (safe to automate)
  - For each low-stakes decision, set a permanent default: a weekday meal rotation, a standard outfit formula, a fixed route to work, a standing meeting slot for recurring appointments
  - Many people find it helpful to communicate defaults to household members or colleagues so others stop presenting options ('what do you want for dinner?') that reintroduce the decision
  - Review defaults monthly for about 15 minutes to catch any that no longer work – seasonal changes, new routines, or shifting preferences may require updates
success_looks_like: |
  - Mornings and mealtimes feel noticeably smoother – you move through routine parts of the day on autopilot, reserving deliberation for things that actually matter
  - Decision fatigue in the late afternoon diminishes: you have more patience and mental clarity for complex work and personal interactions at the end of the day
  - The number of 'what should I…?' moments in a typical day drops by half or more within the first month
common_pitfalls: |
  - Automating decisions that actually matter to you – wearing the same outfit every day works for some people but feels soul-crushing for others; the line between low-stakes and meaningful is personal
  - Setting defaults without testing them, then discovering the 'optimal' meal plan or capsule wardrobe is unpleasant to live with and abandoning the whole approach
  - Scope creep in the other direction: gradually reintroducing deliberation ('maybe I should try a different route today') until most defaults have eroded within a few months
description: |
  - Systematically identifying and removing or automating low-stakes recurring decisions (meals, clothing, routes, scheduling) by establishing default choices and creating decision rules for recurring situations ('if X, then always Y')
  - Implementation involves auditing a typical week for recurring decision points, categorising each as high-stakes or low-stakes, and designing defaults or automation for the low-stakes category, with most practitioners eliminating 15-30 micro-decisions per day within 2-3 weeks
  - Draws on [decision fatigue research](https://doi.org/10.1111/j.1467-9280.2008.02057.x) showing accumulated decisions deplete self-regulatory resources, though [replication attempts](https://doi.org/10.1177/1745691616652873) have found smaller effects than originally reported
  - Once defaults are established, the intervention operates by removing effort rather than adding it, which [habit research](https://doi.org/10.1002/ejsp.674) identifies as the strongest predictor of sustained behaviour change, with full system stabilisation over 4-8 weeks
applicable_domains: ["organisation"]

values:
  organisation.tracking:
    pbs: 6
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 55th – 65th percentile (moderately above average organisational efficiency). Delta: ~25 percentile points of improvement. Knowledge workers make an estimated [35,000 decisions per day](https://go.roberts.edu/leadingedge/the-great-choices-of-strategic-leaders), many trivial but cumulatively costly. Eliminating 15-30 of these removes a significant layer of deliberation friction between intention and action.
      - [Vohs et al. (2008)](https://doi.org/10.1111/j.1467-9280.2008.02057.x) demonstrated that accumulated decisions deplete self-regulatory resources, slowing subsequent action initiation. Defaults bypass this depletion mechanism entirely.
      - Score 6 rather than higher because the anchor (zero overhead, instant intention-to-action) requires addressing structural overhead too (capture systems, prioritisation, context-switching), which this intervention does not touch. It removes one meaningful friction layer but not the whole system.
    isr: 55
    isr_reasoning: |
      - [Baumeister & Vohs (2016)](https://doi.org/10.1016/bs.adms.2016.04.002) established the ego depletion framework underpinning decision fatigue, but a [2016 multi-lab replication](https://doi.org/10.1177/1745691616652873) found smaller-than-expected effects, suggesting individual variation is substantial.
      - A [2025 healthcare study](https://doi.org/10.1001/jamanetworkopen.2024.52702) found no credible evidence for decision fatigue in medical decision-making contexts, and a [systematic review](https://doi.org/10.1016/j.joep.2017.07.008) found significant effects in only 45% of assessed studies.
      - Practical success (Obama, Zuckerberg clothing defaults) is widely reported but anecdotal. The mixed empirical picture suggests roughly half of proper adopters experience meaningful tracking improvements.
    uar: 75
    confidence: medium
    uar_reasoning: |
      - Once defaults are established, the intervention operates by removing effort rather than adding it, which [habit research](https://doi.org/10.1002/ejsp.674) identifies as the strongest predictor of sustained behaviour change.
      - [Wood & Neal (2007)](https://doi.org/10.1037/0033-295X.114.4.843) found that context-stable behaviours become automatic within 4-8 weeks, and decision defaults are inherently context-stable since they eliminate the choice point entirely.
      - Primary failure mode is scope creep (gradually re-introducing decisions) or life changes invalidating defaults. Estimated 70-80% sustained at 6 months given the low maintenance burden.

  organisation.order:
    pbs: 5
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 50th – 55th percentile (modestly fewer missed commitments). Delta: ~15 – 20 percentile points of improvement. The inverted anchor (missed commitments/month) means this scores how much the intervention reduces missed commitments. Decision rules for recurring situations ('if a meeting has no agenda, decline it') remove points where procrastination or poor judgement cause commitments to slip.
      - [Gollwitzer (1999)](https://doi.org/10.1037/0003-066X.54.7.493) found implementation intentions (a form of decision rule) doubled follow-through rates, suggesting defaults meaningfully reduce the failure points where commitments get missed.
      - Score 5 rather than higher because missed commitments depend more on capture systems, review practices, and follow-through habits than on decision reduction alone. A successful user might move from 5 missed/month (score 2) to 1-2/month (score 4), a meaningful but not transformative shift.
    isr: 50
    isr_reasoning: |
      - [Harkin et al. (2016)](https://doi.org/10.1037/bul0000025) meta-analysis found progress monitoring (d = 0.40) reliably improves goal attainment, but decision reduction is a more indirect mechanism than monitoring for reducing missed commitments.
      - Most decision fatigue research from [Baumeister's lab](https://doi.org/10.1016/bs.adms.2016.04.002) focuses on decision quality rather than task completion or commitment fulfilment. The commitment-keeping benefit is inferred from the mechanism rather than directly measured.
      - The moderate score reflects this inferential gap: the causal chain from fewer decision points to fewer missed commitments is plausible but incompletely validated.
    uar: 75
    confidence: medium
    uar_reasoning: |
      - Same low-maintenance profile as tracking: once defaults are set, they operate passively. [Wood & Neal (2007)](https://doi.org/10.1037/0033-295X.114.4.843) found context-stable habits persist with minimal conscious effort.
      - Order-relevant defaults (e.g., always processing email at set times, always filing documents immediately) tend to be especially sticky because the cost of failure is immediately visible when commitments are missed.
      - Estimated 70-80% sustained at 6 months, consistent with the tracking dimension, since it is the same intervention being maintained.

  organisation.speed:
    pbs: 4
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 45th – 50th percentile (slightly above average system minimalism). Delta: ~10 – 15 percentile points of improvement. The anchor (perfectly minimal system) refers to reducing tools, steps, and rules. Eliminating micro-decisions reduces the decision layer but does not itself simplify organisational tools or processes.
      - [Cognitive load theory (Sweller, 1988)](https://doi.org/10.1207/s15516709cog1202_4) supports the principle that fewer active choice points reduce cognitive architecture complexity, but this is an indirect contribution to system minimalism.
      - Score 4 because the intervention makes the experience of using your system feel simpler without actually reducing the system's structural complexity. It is a real but modest simplicity gain.
    isr: 45
    isr_reasoning: |
      - The link between reduced decision load and system simplicity is supported by [cognitive load theory (Sweller, 1988)](https://doi.org/10.1207/s15516709cog1202_4) rather than direct experimental evidence on organisational system design.
      - [Decision fatigue research](https://doi.org/10.1016/j.joep.2017.07.008) has focused on decision quality and willpower rather than on system minimalism as an outcome variable.
      - The score reflects the plausible but weakly evidenced nature of this connection: simplicity is a second-order effect of decision elimination rather than a primary outcome.
    uar: 75
    confidence: low
    uar_reasoning: |
      - Same adherence profile as other organisation dimensions: the intervention reduces cognitive load rather than adding it, supporting sustained adoption. [Lally et al. (2010)](https://doi.org/10.1002/ejsp.674) found that effortless behaviours are the most durable.
      - No additional maintenance burden for the speed dimension specifically, since it is the same set of defaults and decision rules being sustained.
      - Estimated 70-80% sustained at 6 months, consistent with tracking and order dimensions.

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No financial cost required. The intervention is a cognitive restructuring exercise that uses existing infrastructure. Some practitioners invest in tools that support automation (e.g., meal planning apps, capsule wardrobe services), but these are optional enhancements rather than prerequisites."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring financial costs for the core intervention. Optional automation tools (meal kit subscriptions, automated scheduling software) may have associated costs but are not required for the technique itself."
  upfront_time: 3
  upfront_time_reasoning: "Approximately 3 hours for the initial implementation: 1 hour to audit a typical week and catalogue all recurring decisions, 1 hour to categorise decisions as high-stakes vs. low-stakes and design defaults for the low-stakes category, and 1 hour to document decision rules and communicate changes to affected people (e.g., informing household members about meal defaults)."
  ongoing_time: 0.5
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Minimal ongoing maintenance — approximately 30 minutes per month to review whether defaults are still working, adjust for seasonal or life changes, and address any new recurring decisions that have crept in. The whole point of the intervention is to reduce ongoing time expenditure, so maintenance should be light."

prerequisites:
  - "Willingness to audit one full week of decisions, noting every choice point from waking to sleeping, and honestly categorise each as high-value or low-value"
  - "Comfort with 'good enough' solutions for routine matters — the intervention requires accepting that optimising every small decision is counterproductive"
  - "Sufficient life stability that defaults can remain in place for at least 4 - 6 weeks; frequent travel, irregular schedules, or chaotic living situations may undermine the approach"
