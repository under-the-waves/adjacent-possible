name: "Consistent Wake Time"
what_it_is: |
  Waking up at the same time every day – within roughly a 30-minute window, including weekends and days off – regardless of when you fell asleep. The fixed wake point is the strongest single anchor for the circadian system because, unlike bedtime, it can be enforced with an alarm; bedtime then self-regulates as homeostatic sleep pressure builds at predictable times. Often described in the sleep literature as the keystone of sleep hygiene.
how_to_do_it: |
  - Pick a wake time that works on your most constrained day (typically a workday) and commit to it on weekends and holidays as well; keep variance below 30 minutes
  - Set a single non-negotiable alarm and get out of bed within 60 seconds – snoozing fragments the wake response and undermines circadian stability
  - Pair the alarm with bright light within 5–10 minutes of rising (open curtains, step outside, or use a 10,000-lux lamp) to reinforce the cortisol awakening response
  - If your current wake time varies by two or more hours, shift gradually – 15 minutes earlier every three days – rather than imposing a step change that creates acute sleep debt
  - Track the [Sleep Regularity Index](https://elifesciences.org/articles/88359) informally with a wearable; aim for a score above the median (~60) and ideally toward the 95th percentile (~75)
success_looks_like: |
  - You wake within a few minutes of your target time most days, often spontaneously before the alarm, and feel alert within 15–20 minutes of rising
  - Bedtime sleepiness arrives at a predictable hour without deliberate effort, replacing the pattern of lying awake or scrolling until exhausted
  - Weekend mornings no longer feel like a different time zone – energy and mood are consistent across the week rather than cycling between weekday fatigue and weekend oversleep
common_pitfalls: |
  - Sleeping in after a bad night to 'catch up' – this resets the circadian anchor and delays adaptation; holding the wake time even after poor sleep is the hardest but most important part
  - Setting an aspirational wake time that is incompatible with social or work commitments, producing chronic sleep restriction rather than circadian alignment
  - Anchoring wake time but letting bedtime drift later – a stable wake time with a creeping bedtime produces sleep deprivation, not regularity
description: |
  - Waking up at the same time every day – within roughly 30 minutes, including weekends and days off – regardless of when you went to bed
  - Stabilises the body's internal clock by maintaining a fixed anchor for the sleep-wake cycle; bedtime regulates itself as homeostatic sleep pressure builds at predictable times
  - [Recent UK Biobank work](https://elifesciences.org/articles/88359) shows the Sleep Regularity Index is a stronger predictor of all-cause mortality than sleep duration, with hazard ratios of 1.53 at the 5th percentile of regularity versus 0.90 at the 95th
  - Most adopters notice improved daytime alertness and easier sleep onset within 2–3 weeks; full circadian adaptation typically takes 4–6 weeks
applicable_domains: ["sleep", "mental-health", "cognitive-skills", "health-management"]

values:
  sleep.daily_functioning:
    pbs: 7
    isr: 75
    uar: 50
    confidence: high
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (~25 productive minutes per day on the linear anchor). Endpoint after successful adherence: 75th–80th percentile (~2–3 productive hours per day) as daytime sleepiness scores fall and cognitive output stabilises. Delta: ~2 productive hours.
      - PBS = 10 + log₂(2/14) = 10 − 2.81 = **7.2** (round to 7), reflecting one of the largest single-behaviour gains in daily functioning available from sleep hygiene.
      - [Huang et al. (2020)](https://doi.org/10.1038/s41746-020-0270-1) found sleep regularity independently predicted next-day cognitive performance even after controlling for total sleep duration, supporting a delta of this magnitude for adherent users.
    isr_reasoning: |
      - Among adherent participants in [Phillips et al. (2017)](https://www.nature.com/articles/s41598-017-03171-4), higher Sleep Regularity Index scores tracked reliably with better academic performance and circadian phase alignment, with most students in the high-SRI tertile showing measurable cognitive gains.
      - The mechanism (zeitgeber entrainment of the suprachiasmatic nucleus, normalised cortisol awakening response) is mechanistically robust; non-responders are mostly people with concurrent sleep disorders (apnoea, insomnia) where regularity alone cannot deliver the benefit.
      - [Lunsford-Avery et al. (2018)](https://www.nature.com/articles/s41598-018-32402-5) reported that ~70–80% of adults with regularised sleep–wake patterns showed concurrent improvements in alertness and metabolic markers, supporting an ISR of roughly 75%.
    uar_reasoning: |
      - [Roenneberg et al. (2012)](https://doi.org/10.1016/j.cub.2012.03.038) found in a cohort of over 65,000 adults that the majority experience two or more hours of social jetlag between weekdays and weekends, indicating that fewer than half maintain wake-time variance under 30 minutes long-term.
      - Weekend social pressure, late-night events, alcohol, and the temptation to recover after poor nights create persistent barriers; [CDC data](https://www.cdc.gov/sleep/data-and-statistics/adults.html) show only ~33% of US adults regularly meet basic sleep recommendations, of which a smaller fraction maintain timing consistency.
      - Adherence is the binding constraint here – the intervention is free and physically simple, but social rhythms work against it. Conservative estimate: 50% sustain it beyond six months.

  sleep.long_term_health:
    pbs: 7
    isr: 70
    uar: 50
    confidence: high
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (~7 weeks of additional healthy lifespan on the 8-year anchor). Endpoint after sustained adherence: 70th–75th percentile (~1.5 years additional healthy lifespan) via reduced cardiometabolic and all-cause mortality risk. Delta: ~1.5 years.
      - PBS = 10 + log₂(1.5/8) = 10 − 2.42 = **7.6** (round to 7), consistent with [Windred et al. (2024)](https://academic.oup.com/sleep/article/47/1/zsad253/7280269) finding hazard ratios of 1.53 at the 5th SRI percentile versus 0.90 at the 95th – a roughly 40% mortality risk reduction across the regularity gradient.
      - [Full et al. (2023)](https://www.ahajournals.org/doi/10.1161/JAHA.124.040027) UK Biobank analysis showed sleep duration irregularity independently predicted incident cardiovascular disease, supporting the size of the long-term health delta for adherent users.
    isr_reasoning: |
      - The dose-response curve in [Windred et al. (2024)](https://academic.oup.com/sleep/article/47/1/zsad253/7280269) is monotonic – the great majority of adults who shift from low to high SRI capture a meaningful slice of the mortality benefit, with diminishing returns above the 80th percentile.
      - [Huang et al. (2023) cardiometabolic analysis](https://www.ahajournals.org/doi/10.1161/CIRCRESAHA.125.325613) shows the underlying mechanisms (glucose tolerance, blood pressure, inflammatory markers) respond reliably to circadian alignment in roughly 70% of adherent participants.
      - ISR slightly lower than daily functioning because long-term outcomes are more vulnerable to confounding from concurrent risks (smoking, sedentary lifestyle, diet) that consistent wake time alone cannot address.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile. Long-term health requires sustained adherence over years, which compounds the difficulty observed in [Roenneberg et al. (2012)](https://doi.org/10.1016/j.cub.2012.03.038).

  sleep.comfort_experience:
    pbs: 6
    isr: 80
    uar: 55
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (variable, often unsatisfying sleep experience). Endpoint after adherence: 65th–70th percentile (reliably good-to-restful sleep with predictable morning refreshment). Delta: ~30 percentile points.
      - On the subjective anchor, this maps to a "meaningful gain in quality of sleep experience" (score 6) – consistent wake time produces predictable bedtime sleepiness, reduces sleep-onset latency, and removes the grogginess of weekend oversleep, though it does not directly address sleep depth or comfort like a better mattress would.
      - Improvements compound with other sleep-hygiene behaviours; in isolation, the comfort gain is real but bounded by factors the intervention does not touch (bedroom environment, partner disruption, stress).
    isr_reasoning: |
      - The experiential mechanism is direct: predictable circadian timing converts the bedtime-sleep-onset interval from variable to reliable, which most adherents notice within 2–3 weeks.
      - [Buysse et al. (2010)](https://doi.org/10.1093/sleep/33.6.781) found sleep regularity was among the strongest predictors of subjective sleep satisfaction in both clinical and community samples.
      - High ISR (~80%) because the construct measured (perceived sleep quality) is closely coupled to the mechanism modified (timing predictability); non-responders are mostly people whose poor sleep stems from non-timing causes.
    uar_reasoning: |
      - Slightly higher than other sleep values because [Buysse et al. (2010)](https://doi.org/10.1093/sleep/33.6.781) shows perceived quality gains arrive within weeks, providing positive reinforcement that helps offset social pressure to sleep in.
      - Still bounded by the same weekend-and-holiday drift documented in [Roenneberg et al. (2012)](https://doi.org/10.1016/j.cub.2012.03.038); roughly 45% of users gradually allow variance to creep above 30 minutes once initial novelty fades.

  cognitive-skills.focus:
    pbs: 5
    isr: 65
    uar: 50
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (~5 minutes of sustained deep focus on the 120-minute anchor). Endpoint: 55th–60th percentile (~10–14 minutes of sustained focus) via reduced daytime sleepiness and stabilised cortisol rhythm. Delta: ~5–8 minutes.
      - PBS = 10 + log₂(6/120) = 10 − 4.32 = **5.7** (round to 5–6), reflecting a meaningful but secondary benefit – consistent wake time supports focus indirectly via circadian alignment rather than directly training attention.
      - [Phillips et al. (2017)](https://www.nature.com/articles/s41598-017-03171-4) found that students with higher Sleep Regularity Index scores had measurably better academic performance and circadian phase, with effect sizes consistent with a focus delta of this magnitude.
    isr_reasoning: |
      - The pathway runs from circadian regularity to alertness to focus – each step introduces variability, and many adherent users see alertness gains without translating them into longer focus windows because attention also depends on environment, motivation, and skill.
      - [Huang et al. (2020)](https://doi.org/10.1038/s41746-020-0270-1) found sleep regularity predicted cognitive outcomes in roughly two thirds of participants after controlling for sleep duration.
      - Conservatively estimated at 65% – mechanism is real but contingent on other focus prerequisites being in place.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile.

  health-management.vitality:
    pbs: 6
    isr: 70
    uar: 50
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (~5–6 high-energy hours per day on the 14-hour anchor). Endpoint after adherence: 65th–70th percentile (~8–9 high-energy hours per day). Delta: ~3 high-energy hours.
      - PBS = 10 + log₂(3/14) = 10 − 2.22 = **7.8** rounded down to 6 to be conservative, since vitality also depends on nutrition and exercise that this intervention does not modify.
      - [Lunsford-Avery et al. (2018)](https://www.nature.com/articles/s41598-018-32402-5) linked sleep regularity to lower 10-year cardiovascular risk via energy-relevant mechanisms (insulin sensitivity, blood pressure, inflammatory markers) that translate to subjective vitality.
    isr_reasoning: |
      - Energy-relevant biomarkers (cortisol awakening response, glucose tolerance, blood pressure rhythms) respond reliably to circadian alignment in well-controlled studies.
      - [Huang et al. (2023)](https://www.ahajournals.org/doi/10.1161/CIRCRESAHA.125.325613) reports consistent cardiometabolic improvements across most adherent participants in cohort data.
      - ISR of 70% reflects that vitality also depends on factors beyond circadian timing – the regularity benefit is necessary but not sufficient.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile.

  mental-health.stability:
    pbs: 5
    isr: 50
    uar: 50
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (below-average emotional stability). Endpoint after adherence: 50th–55th percentile (modestly improved mood stability via circadian alignment). Delta: ~15–20 percentile points.
      - On the subjective anchor, this maps to a "modest reduction in frequency or intensity of distress" (score 4) to "meaningful gain in day-to-day emotional steadiness" (score 6) – settling at score 5 reflects a real but secondary benefit.
      - [Fang et al. (2021)](https://www.nature.com/articles/s41746-021-00400-z) found wake-time variability prospectively predicted depressive symptoms in a UK Biobank-style cohort, with regular sleepers showing ~38% lower depression risk – but circadian alignment does not address the psychological or social drivers of distress that consistent wake time leaves untouched.
    isr_reasoning: |
      - The pathway from consistent wake time to mood stability runs through circadian alignment, then cortisol normalisation, then serotonergic regulation – each step adds variability, and not all participants with irregular wake times have circadian-driven mood instability to begin with.
      - Most evidence is observational: [Walker et al. (2020) review](https://www.nature.com/articles/s41398-020-0694-0) concludes circadian disruption is a depression risk factor but interventional trials of regularity alone (without broader sleep-and-light interventions) are limited.
      - ISR of 50% reflects the mechanism's plausibility but the genuine uncertainty about how much wake-time consistency alone shifts mood in an unselected population.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile.

