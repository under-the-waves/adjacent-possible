evaluated_at: 2026-03-23
evaluated_by: claude-opus-4-7
name: "GLP-1 Receptor Agonists"
what_it_is: |
  A weekly self-injection of a prescription drug that quiets your hunger signals. The two main options are Wegovy (semaglutide) and Mounjaro/Zepbound (tirzepatide). They imitate hormones your gut produces after a meal, so you feel full sooner, eat less, and stop thinking about food as often. Trial participants lost 15–22% of their starting body weight on average – the biggest weight loss available without surgery – but the weight comes back fast if you stop, so most people stay on the drug long-term.
how_to_do_it: |
  - Get a prescription from your doctor or a weight-management clinic. You usually qualify if your BMI is 30 or above, or 27 with a weight-related condition like high blood pressure or type 2 diabetes. Expect a blood test and medical history review.
  - Start on the lowest dose and step up gradually over four to five months. Going up faster means more nausea.
  - Eat slowly, keep meals small, and drink plenty of water during the first weeks at each new dose. That is when stomach upset is at its worst.
  - Lift weights and eat plenty of protein (around 100g a day for most adults). Without this, a chunk of the weight you lose will be muscle rather than fat, leaving you weaker and softer-looking than the scale suggests.
success_looks_like: |
  - You stop thinking about food all the time. Smaller portions feel like enough. Cravings for sweet, fatty, or salty food quieten without you having to fight them.
  - You lose around 10–15% of your starting weight over six to nine months, and most of that is fat rather than muscle if you have kept up the resistance training.
  - The nausea fades within four to eight weeks at each dose, and the weekly injection becomes a quick, unremarkable habit.
common_pitfalls: |
  - Stopping the medication once you have hit your target weight. About two-thirds of the lost weight typically comes back within a year, which means this is effectively a lifelong commitment.
  - Skipping the strength training and protein during rapid weight loss. Without them you lose a lot of muscle along with the fat, which leaves you weaker and burning fewer calories at rest.
  - Underestimating the cost. Without insurance, it runs $300–1,350 a month – the single biggest reason people quit in practice.
description: |
  - A weekly injection that copies a hormone your gut releases after eating, so you feel full sooner and think about food less. Main brands: Wegovy (semaglutide) and Mounjaro/Zepbound (tirzepatide).
  - [Phase III trials](https://www.nejm.org/doi/full/10.1056/NEJMoa2032183) show 15–22% body weight loss sustained over 68–104 weeks – the largest weight loss available without surgery.
  - Two-thirds of the lost weight typically returns within a year of stopping, so most users continue indefinitely.
  - Cost without insurance: $300–1,350 a month. This is the single biggest reason people stop.
applicable_domains: ["body-image"]

values:
  body-image.fat_loss:
    pbs: 9
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 85th – 90th percentile on sustained fat loss outcomes. Delta: ~50 – 55 percentile points of improvement. [STEP 1 trial](https://www.nejm.org/doi/full/10.1056/NEJMoa2032183) showed mean weight loss of 14.9% at 68 weeks with semaglutide 2.4 mg; [STEP 5](https://www.nature.com/articles/s41591-022-02026-4) confirmed 15.2% sustained at 104 weeks of continuous use
      - [SURMOUNT-1](https://www.nejm.org/doi/full/10.1056/NEJMoa2206038) showed tirzepatide achieving 16.0% (5 mg), 21.4% (10 mg), and 22.5% (15 mg) weight loss at 72 weeks, with the highest-dose group averaging over 20% loss
      - On the logarithmic anchor (25% = score 10, each point = 2x), semaglutide's ~15% maps to 10 + log₂(15/25) = 9.3 and tirzepatide's ~21% maps to 9.75; weighting toward semaglutide as the more commonly prescribed starting agent, PBS 9 reflects a successful user on continued treatment
      - These are the largest sustained effect sizes of any non-surgical fat loss intervention, driven by potent appetite suppression and metabolic effects
    isr: 88
    isr_reasoning: |
      - [STEP 1](https://www.nejm.org/doi/full/10.1056/NEJMoa2032183) found 86.4% of semaglutide participants achieved >5% weight loss vs 31.5% with placebo, and 69.1% exceeded 10% loss – indicating the vast majority of adherent users respond meaningfully
      - [SURMOUNT-1](https://www.nejm.org/doi/full/10.1056/NEJMoa2206038) reported 89 – 96% of tirzepatide participants achieved >5% weight loss across dose groups, confirming near-universal response in adherent patients
      - The pharmacological mechanism (GLP-1/GIP receptor activation) bypasses behavioural variability – the drug directly suppresses appetite and slows gastric emptying, producing reliable caloric reduction in virtually all compliant users; true non-response is rare in clinical data
      - Score of 88 reflects that out of 100 people who sustain proper use, approximately 86 – 96 achieve clinically meaningful fat loss, with the small minority of non-responders likely explained by genetic variation in receptor sensitivity
    uar: 25
    confidence: high
    uar_reasoning: |
      - [STEP 1 extension](https://pmc.ncbi.nlm.nih.gov/articles/PMC9542252/) showed participants regained two-thirds of lost weight within one year of stopping, reducing net weight loss from 17.3% to 5.6% – the requirement for indefinite use is the single largest adherence barrier
      - [Real-world discontinuation data](https://www.biospace.com/drug-development/glp-1-side-effects-only-one-factor-driving-patient-discontinuation-rates) shows 64.8% of non-diabetic patients discontinue within the first year, driven primarily by cost ($350-1,350/month without insurance) and gastrointestinal side effects
      - [Clinical trial data](https://pmc.ncbi.nlm.nih.gov/articles/PMC9821052/) reports gastrointestinal adverse events in 40-70% of patients during dose escalation (nausea, vomiting, diarrhoea), with 6.5% discontinuing due to adverse events in trials – real-world rates are substantially higher
      - Additional barriers include injection aversion, prescription access requirements, supply constraints, and the psychological burden of indefinite pharmaceutical dependence for weight maintenance

dose_response:
  metric: dose_and_adherence
  metric_label: "Dose tier and adherence state"
  metric_help: "Tiers describe the combination of where you are in dose titration and how reliably you're injecting each week, including resistance-training and protein-intake co-treatments that protect lean mass during weight loss."
  scored_at_tier: 3

  tiers:
    - level: 0
      label: "Not on medication"
      criterion: "Not currently prescribed or taking a GLP-1 agonist"
    - level: 1
      label: "Titrating"
      criterion: "On medication but still in the initial 4–5 month dose-escalation phase; below therapeutic dose; managing early side effects"
    - level: 2
      label: "Therapeutic dose, partial co-treatment"
      criterion: "At therapeutic dose with consistent weekly injections; minimal resistance training or protein intake, so a meaningful share of weight loss is lean mass"
    - level: 3
      label: "Full regimen"
      criterion: "Sustained therapeutic dose, weekly injections without gaps, plus resistance training and adequate protein intake to preserve lean mass"

  value_templates:
    body-image.fat_loss: threshold

  rationale: |
    - Tier criteria reflect the dose-titration arc and the description's emphasis that "without resistance training and protein, a chunk of the weight you lose will be muscle rather than fat, leaving you weaker and softer-looking than the scale suggests" – tier 2 captures pharmacological compliance without lean-mass protection (still delivers most scale weight loss but lower body-composition quality); tier 3 captures the full regimen the PBS was scored against.
    - `threshold` for body-image.fat_loss because the appetite-suppression mechanism only activates at therapeutic dose – the [STEP 1 trial](https://www.nejm.org/doi/full/10.1056/NEJMoa2032183) and [SURMOUNT-1](https://www.nejm.org/doi/full/10.1056/NEJMoa2206038) both show the bulk of weight loss occurring after full dose escalation. Tier 1 (titrating) produces minimal weight change; meaningful fat loss requires tier 2+, and the body-composition quality that PBS 9 reflects requires tier 3.

resources:
  upfront_cost: 250
  upfront_cost_reasoning: "Initial primary care or specialist consultation ($150–250) plus baseline blood work and BMI assessment. Some patients require multiple visits before receiving a prescription. Costs vary widely by country and healthcare system; users with different access should adjust via 'Personalise these costs'."
  ongoing_cost: 500
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Semaglutide (Wegovy) lists at ~$1,350/month but manufacturer discount programmes reduce this to $199-349/month for eligible uninsured patients. With insurance copays or out-of-pocket, $300-600/month is typical. Tirzepatide (Zepbound) is similarly priced. Score uses $500 as a realistic midpoint given variable coverage."
  upfront_time: 4
  upfront_time_reasoning: "Two to three medical appointments for eligibility assessment, prescription, and injection training (1-2 hours each including travel). Additional time for insurance pre-authorisation paperwork."
  ongoing_time: 1
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Weekly self-injection takes under 5 minutes. Quarterly follow-up appointments add roughly 1-2 hours every 3 months, averaging about 1 hour per month overall."

prerequisites:
  - "BMI of 30 or above, or BMI of 27 or above with at least one weight-related comorbidity (hypertension, type 2 diabetes, dyslipidaemia) – standard prescribing criteria"
  - "Prescription from a licensed physician, typically requiring an in-person consultation and documented medical history"
  - "Financial capacity for sustained monthly medication costs ($300-1,000+/month depending on insurance coverage), as benefits reverse on cessation"
  - "Willingness to self-administer weekly subcutaneous injections indefinitely and tolerate dose-titration side effects (nausea, reduced appetite) during the first 16-20 weeks"
