name: "Buying a Lottery Ticket"
what_it_is: ""
how_to_do_it: ""
success_looks_like: ""
common_pitfalls: ""
description: |
  - Purchasing a lottery ticket once or twice per week as a wealth-building strategy, costing $2-5 per ticket depending on the game
  - Jackpot odds range from ~1 in 14 million ([UK Lotto](https://www.national-lottery.co.uk/games/lotto)) to ~1 in 292 million ([US Powerball](https://www.powerball.com/about))
  - The expected value of a $2 ticket is approximately $0.50-0.80, meaning the average player loses 60-75% of every dollar spent
  - Results are immediate per draw, though the probability of a life-changing outcome in any given year is negligible
applicable_domains: ["investing"]

values:
  investing.growth:
    pbs: 10
    pbs_reasoning: |
      - UK Lotto jackpots average [£5-10 million](https://www.national-lottery.co.uk/results/lotto/draw-history); US Powerball regularly exceeds [$100 million](https://www.powerball.com/previous-results). These sums vastly exceed the $10M anchor maximum, placing a successful outcome at the ceiling of the scale.
      - PBS measures magnitude assuming success, not probability. A jackpot win is unambiguously transformative and exceeds what any conventional investment strategy could produce from $10k over 30 years.
      - [Hankins, Hoekstra & Skiba (2011)](https://doi.org/10.1162/REST_a_00114) found large winners show increased bankruptcy rates within 3-5 years, but the initial windfall magnitude still meets the $10M+ threshold for score 10 – retention risk is a separate consideration from the size of the payout itself.
    isr: 0.1
    isr_reasoning: |
      - Annual jackpot probability for a regular player (2 tickets/week) is ~0.0002% for [UK Lotto](https://www.national-lottery.co.uk/games/lotto) and ~0.000004% for [US Powerball](https://www.powerball.com/about).
      - Including smaller prizes, fewer than 0.1% of regular players achieve a net positive return in any given year. [Clotfelter & Cook (1989)](https://doi.org/10.4159/harvard.9780674423084) established that lotteries function as a regressive tax on participants.
      - [Matheson & Grote (2004)](https://doi.org/10.1111/j.1465-7295.2004.tb01384.x) calculated that US lottery tickets return $0.45-0.80 per dollar spent, confirming a consistent negative expected return.
    uar: 85
    confidence: medium
    uar_reasoning: |
      - [Camelot annual reports](https://www.national-lottery.co.uk/life-changing) show stable or growing regular player bases over decades, with most monthly players maintaining the habit for years.
      - [Griffiths & Wood (2001)](https://doi.org/10.1080/14459790108732861) found lottery play is among the most persistent gambling forms due to social acceptability, low per-transaction cost, and intermittent reinforcement from small wins.
      - The 'set and forget' option (direct debit subscriptions) further boosts retention by removing the active purchase decision.

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No setup costs. Lottery tickets are available at any newsagent, supermarket, or online. No account, equipment, or training required."
  ongoing_cost: 10
  ongoing_cost_period: "week"
  ongoing_cost_reasoning: "Two tickets per week at $2-5 each. Using $10/week as a conservative estimate for regular play across one or two games."
  upfront_time: 0.1
  upfront_time_reasoning: "A few minutes to choose a game and learn how to buy a ticket. Essentially zero setup required."
  ongoing_time: 0.1
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Under 10 minutes per week to purchase tickets and check results. Can be reduced to near-zero with direct debit and automatic number selection."

prerequisites:
  - "Legal gambling age in your jurisdiction (typically 18+)"
  - "Access to a licensed lottery retailer or online lottery platform"
  - "Disposable income that can be lost without affecting essential expenses"
