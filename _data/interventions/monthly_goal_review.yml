name: "Monthly Goal Review"
description: "A structured monthly session dedicated to reviewing progress against all active goals, evaluating whether goals remain worth pursuing, updating timelines and priorities, and planning the next month's focus. The review follows a consistent format: assess completion status of each goal, identify obstacles and enablers, decide whether to continue, modify, or retire each goal, and set concrete next actions for the coming month. Harkin et al.'s meta-analysis (2016) of 138 studies found that progress monitoring significantly promotes goal attainment (d = 0.40), with physically recording progress and public reporting producing stronger effects. Monthly cadence balances the need for regular course correction against the overhead of frequent reviews, and is particularly effective when combined with weekly check-ins."
applicable_domains: ["goals"]

values:
  goals.ambition:
    pbs: 7
    pbs_reasoning: "Monthly reviews directly and substantially support ambitious goal-setting. The structured review process forces explicit confrontation with whether goals are genuinely stretching or merely comfortable. Over time, the regular cadence builds confidence in taking on bigger challenges, as past stretch targets that were met provide evidence for raising the bar further. The Harkin et al. meta-analysis demonstrates that monitoring promotes attainment, which in turn enables more ambitious future goals. Monthly cadence allows enough time for meaningful progress data while being frequent enough to catch when ambition has quietly downshifted to safety."
    isr: 72
    isr_reasoning: "Strong evidence base. Harkin et al.'s meta-analysis across 138 studies (N = 19,951) found a reliable positive effect of progress monitoring on goal attainment (d = 0.40, 95% CI [0.32, 0.48]). The effect was stronger when progress was physically recorded — which a monthly review inherently involves. Additional research by Matthews (Dominican University, 2015) found that writing goals down increases achievement by 42%. The combination of structured review and written recording is well-supported, though most studies examined monitoring frequency rather than monthly review specifically."
    uar: 55
    uar_reasoning: "Monthly reviews have moderate adherence. The time commitment is manageable (1 - 2 hours monthly), but the practice requires discipline and can feel tedious when progress is slow or goals feel out of reach. Studies of GTD and similar review-based systems suggest that weekly reviews are sustained by roughly 30 - 40% of practitioners beyond 6 months; monthly reviews likely fare somewhat better due to lower frequency, estimated at 50 - 60%. The main dropout risk is skipping one month and never resuming. Those who pair reviews with calendar blocking and accountability partners show significantly higher retention."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "ambition_level"
    anchor_description: "Consistently setting and pursuing transformative goals that push well beyond the comfort zone"

  goals.realism:
    pbs: 7
    pbs_reasoning: "Monthly reviews are one of the highest-leverage interventions for realistic goal calibration. The review process catches goals that are drifting, identifies where original estimates were too aggressive or too conservative, and builds a longitudinal record of actual capacity versus planned capacity. Over time, this data makes goal-setting progressively more realistic — not by lowering ambition, but by improving the accuracy of what can genuinely be achieved in a given timeframe. The 42% improvement in achievement from writing goals down (Matthews, 2015) compounds with regular review. However, monthly cadence may be too infrequent for fast-moving goals that need weekly recalibration, limiting the score below the maximum."
    isr: 70
    isr_reasoning: "The evidence linking goal monitoring to goal achievement is among the strongest in the self-regulation literature. The Harkin et al. effect size of d = 0.40 is moderate and highly reliable across 138 studies. Monthly review specifically has less direct experimental evidence than monitoring in general, but the mechanism is well-understood and the meta-analytic findings generalise well to structured review practices. The score reflects strong but slightly indirect evidence."
    uar: 55
    uar_reasoning: "Same adherence profile as ambition. The monthly cadence is both an advantage (lower burden) and a disadvantage (easier to let slide without noticing). Practitioners focused on realistic calibration tend to sustain reviews longer, as they see direct causal links between reviews and improved accuracy of their goal-setting. Estimated 50 - 60% sustained at 6 months."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "realism_level"
    anchor_description: "Goals perfectly calibrated to actual capacity, with milestones reliably achieved through honest constraint assessment"

  goals.flexibility:
    pbs: 6
    pbs_reasoning: "Monthly reviews provide a natural mechanism for goal flexibility — the structured decision point where goals can be modified, reprioritised, or retired based on new information. Without regular reviews, most people either cling to failing goals out of sunk-cost bias or abandon them impulsively. The monthly cadence creates a disciplined window for strategic adjustment, treating goals as hypotheses to be evaluated rather than commitments to be honoured. However, truly flexible goal management also requires real-time responsiveness to major changes (job loss, health crisis, new opportunities), which a monthly cadence cannot fully provide."
    isr: 65
    isr_reasoning: "The link between structured review and flexible goal management is supported by organisational behaviour research and practical frameworks (OKRs, quarterly business reviews). The Harkin et al. findings on monitoring generalise to the review-and-adjust cycle, though flexibility as a specific outcome variable has received less direct experimental attention than achievement. The evidence is solid but somewhat more theoretical than empirical for this specific value."
    uar: 55
    uar_reasoning: "Adherence for the flexibility dimension is the same as for other goal review dimensions, since it is the same practice being sustained. The challenge is that flexibility requires honest self-assessment about failed or inappropriate goals, which is psychologically uncomfortable and may reduce engagement over time. Those with growth mindsets and lower sunk-cost sensitivity tend to sustain the practice longer."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "flexibility_level"
    anchor_description: "Proactive goal portfolio management with systematic review and strategic flexibility to change course as needed"

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No financial cost required. A monthly review can be conducted with any existing note-taking tool, journal, or even pen and paper. Template design takes time but no money."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring financial costs. Some practitioners choose to invest in dedicated planning tools or journals (e.g., Full Focus Planner at ~$40/quarter), but these are optional and not necessary for effectiveness."
  upfront_time: 2
  upfront_time_reasoning: "Approximately 2 hours to design the review template, inventory all active goals across life domains, establish the review format, and schedule the first session. Includes time to define evaluation criteria for continuing, modifying, or retiring goals."
  ongoing_time: 2
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Each monthly review session typically takes 1.5 - 2 hours: 30 minutes reviewing progress data, 30 minutes evaluating each goal, 30 minutes planning next month's priorities and actions, and 15 - 30 minutes for documentation and calendar updates. The first few sessions may take longer as the format is refined."

prerequisites:
  - "A written inventory of all active goals across life domains, each with at least basic success criteria and a timeline"
  - "A consistent method for tracking progress against goals throughout the month (journal, spreadsheet, task manager, or similar)"
  - "Willingness to block 1.5 - 2 hours monthly and protect that time from interruption, ideally at a consistent point in the monthly cycle"
