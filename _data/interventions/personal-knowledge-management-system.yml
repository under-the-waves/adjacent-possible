  - domain: "rationality"
    rationale: "Externalising arguments and evidence into linked notes supports more systematic belief tracking and reduces reliance on memory for evidence weighting, plausibly improving accurate-beliefs over time."
  - domain: "current-work"
    rationale: "For knowledge workers, a populated PKM directly reduces time spent searching for prior context and supports more confident reuse of past work, improving competence and reducing rework."
