name: "Personal Knowledge Management System"
what_it_is: |
  Building and maintaining a structured digital system for capturing, organising, linking, and reviewing personal notes – using a tool such as Obsidian, Notion, Logseq, or Roam Research. The system rests on a few core conventions: a single inbox for unfiltered capture, atomic notes (one idea per note) written in your own words, explicit links between related notes, and a periodic review habit that processes the inbox and surfaces older notes for reuse. The design intent is external cognition – offloading working memory and using the structure of links to surface non-obvious connections later. Costs are mostly cognitive: setup is hours, but ongoing maintenance is a daily friction tax that most people abandon within months. The literature supporting the approach centres on Sönke Ahrens' synthesis of Niklas Luhmann's zettelkasten and a wider body of note-taking and externalised-cognition research, but rigorous direct evidence for the system as a whole is thin – most adherence and outcome data is observational or extrapolated from generative writing and study-skills literature.
how_to_do_it: |
  - Choose one tool and stop evaluating others. Obsidian (free, local Markdown files) is the default for most people; Logseq and Roam emphasise outliner workflows; Notion is heavier but better for collaboration. Tool-hopping is the largest single source of failed PKM systems – pick one and commit for at least six months before switching.
  - Set up an inbox folder (e.g. `00-inbox/`) and a small set of pillar folders that match how you actually think, not a theoretical taxonomy. Resist building elaborate hierarchies upfront – let structure emerge from notes you actually write.
  - Capture freely into the inbox without categorising. Once or twice a week, process the inbox: convert each capture into an atomic note (one idea, in your own words, with a clear title), link it to two or three existing notes, and move it out of the inbox.
  - Adopt a small, consistent set of conventions: file naming (`slug.md` for evergreen, `YYYYMMDD-slug.md` for dated), wikilinks for connections, and lightweight frontmatter for status and tags. Document the conventions in a single note so future-you does not have to re-derive them.
  - Run a weekly review: process the inbox to zero, open three random older notes to refresh memory, and notice what you keep wanting to write about – that is signal about what to work on next.
success_looks_like: |
  - You can locate any previously captured idea, quote, or reference within a minute or two – the system replaces a meaningful share of memory and bookmark-hunting overhead
  - Writing and thinking get easier over time because past you has done preparatory work – you regularly find yourself building on notes from months or years ago rather than starting from scratch
  - Connections between notes occasionally surface ideas you would not have generated by deliberate effort, justifying the linking discipline rather than just retrieval
common_pitfalls: |
  - Spending more time configuring the tool than using it – plugin tweaking, theme changes, and template engineering are seductive forms of productive procrastination that produce no notes
  - Building a hierarchical folder taxonomy upfront and then discovering that real notes do not fit it; the resulting friction kills capture and the system collapses
  - Treating the inbox as a permanent dumping ground rather than processing it weekly – an unprocessed inbox of 500 items becomes psychologically aversive and is the most common point of system abandonment
  - Capturing without ever rereading – capture-only systems decay into a graveyard of links and quotes that produce no insight or retrieval benefit
description: |
  - A structured digital note-taking system using a tool such as [Obsidian](https://obsidian.md/), [Logseq](https://logseq.com/), [Roam Research](https://roamresearch.com/), or [Notion](https://www.notion.so/), built around an inbox for capture, atomic notes (one idea per note), explicit links between notes, and a weekly review habit
  - The dominant theoretical framework comes from [Sönke Ahrens' "How to Take Smart Notes"](https://www.soenkeahrens.de/en/takesmartnotes), which synthesises Niklas Luhmann's zettelkasten method – Luhmann produced 90,000 notes and ~70 books over his career, a productivity outlier that Ahrens attributes to the linked-note workflow
  - The mechanism is external cognition: [research on offloading and external memory](https://www.nature.com/articles/s41562-022-01477-6) shows that systematically externalising information frees working memory for reasoning and synthesis, with the largest gains for people whose work involves combining ideas across time
  - Setup is 5–15 hours; ongoing time is 2–5 hours per week of capture, processing, and linking, on top of work that would have happened anyway. Direct outcome evidence is thin – most claims rest on observational case studies, productivity-blog reports, and adjacent generative-writing literature rather than randomised trials
  - Distinct from a generic notes app or bookmarking workflow: the defining features are atomic notes, explicit linking, and a review habit. Without all three, the system reduces to file storage and yields most of the costs without the connection-making benefits
applicable_domains: ["information-management", "learning-methods", "cognitive-skills", "organisation"]

values:
  information-management.retrieval:
    pbs: 7
    isr: 65
    uar: 20
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (most adults rely on a mix of email, browser bookmarks, scattered docs, and memory). After successful adherence, a user could plausibly reach the 80th–85th percentile – most items located within 1–2 minutes via search and links across all life contexts. Delta: ~45–50 percentile points.
      - The retrieval anchor is linear (10 minutes to locate any previously captured item maps to score 10). A mature PKM system reduces typical retrieval to under 1–2 minutes via full-text search plus link traversal, mapping to the 8–9 region on the anchor for users whose system is genuinely populated.
      - [Research on external cognition and digital note-taking](https://www.nature.com/articles/s41562-022-01477-6) shows that externalised information stores produce reliable retrieval gains compared to memory-based recall, supporting a high PBS for the retrieval value specifically.
    isr_reasoning: |
      - Among users who maintain consistent capture and processing for 12+ months, retrieval gains are highly mechanical: full-text search across atomic notes works as advertised. The main failure mode is incomplete capture – information never entered the system in the first place – rather than search itself failing.
      - [Survey research on note-taking app users](https://dl.acm.org/doi/10.1145/3411764.3445648) finds that users with consistent capture habits report substantial retrieval benefits, while inconsistent users report little improvement over baseline tools – the bimodal pattern that drives ISR estimates.
      - ISR of 65% reflects that the retrieval mechanism reliably works for adherent users, with a meaningful minority undermined by inconsistent capture, fragmented systems across multiple apps, or failure to use linking conventions that aid traversal.
    uar_reasoning: |
      - PKM tools have famously low long-term adherence. [Survey data on note-taking app abandonment](https://dl.acm.org/doi/10.1145/3411764.3445648) and [analyses of productivity tool churn](https://www.nngroup.com/articles/digital-workplace-tools/) suggest that the majority of users who set up a PKM system abandon active use within 6–12 months, often after an initial enthusiastic period.
      - The adherence challenge is structural: ongoing maintenance (inbox processing, atomic-note discipline, linking) is friction layered on top of work that would have happened anyway, with benefits that are delayed and probabilistic rather than immediate.
      - UAR of 20% reflects that sustained, multi-year PKM use is genuinely rare. Most users either abandon entirely, drift into capture-only mode without processing (which destroys retrieval gains), or churn between tools every 6–18 months – breaking the compounding benefit.
  information-management.simplicity:
    pbs: 4
    isr: 40
    uar: 20
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (most adults have a fragmented mess of email, browser bookmarks, scattered docs, and Slack saves with no coherent system). After successful adherence, a user could plausibly reach the 50th–55th percentile – a single tool replaces several scattered ones, but the system itself imposes new maintenance overhead. Delta: ~15–20 percentile points.
      - Score 4 reflects a modest net simplicity gain at best. Consolidating capture into one tool genuinely reduces the number of places to look, but atomic-note discipline, linking conventions, and weekly reviews are real ongoing costs that partially offset the consolidation benefit.
      - For a meaningful share of users, a PKM system makes simplicity worse – the maintenance burden exceeds the retrieval benefit, especially for those who do not produce much new written output. The PBS captures the upside for users who do see a net simplification; the downside risk is reflected in ISR.
    isr_reasoning: |
      - The simplicity benefit is unreliable because the maintenance overhead is real and constant, while the consolidation benefit depends on actually migrating other systems (email, bookmarks, scattered docs) into the PKM, which most users never fully do.
      - [Critical analyses of PKM workflows](https://www.nngroup.com/articles/digital-workplace-tools/) note that many users end up running their PKM alongside their previous tools rather than replacing them, producing a net increase in system complexity rather than a decrease.
      - ISR of 40% reflects that for a substantial share of adherent users, the maintenance burden of atomic notes, linking, and weekly review is greater than the simplicity gain from consolidation – meaning even successful adherers do not always experience a net simplicity benefit.
    uar_reasoning: |
      - See information-management.retrieval UAR – same intervention, same adherence profile. UAR of 20% reflects the structural difficulty of sustained PKM maintenance.
  information-management.retention:
    pbs: 6
    isr: 60
    uar: 20
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 70th percentile – information capture becomes systematic rather than reliant on memory or scattered notes, and rephrasing-in-own-words at processing time deepens initial encoding. Delta: ~35 percentile points.
      - The mechanism is twofold: external storage means information is not lost when memory fades, and the act of writing atomic notes in one's own words is a generative encoding step that improves retention of what is captured. [Research on the generation effect](https://psycnet.apa.org/record/1979-09437-001) and [self-explanation effects in learning](https://link.springer.com/article/10.1007/s10648-018-9434-x) supports the encoding pathway.
      - Score 6 reflects a meaningful but bounded retention gain – atomic-note workflows improve encoding for what gets processed, but most captures never get rewritten, and the bulk of the retention benefit comes from external storage rather than memory enhancement per se.
    isr_reasoning: |
      - Retention gains depend on the user actually processing inbox captures into atomic notes (which involves rephrasing and integration), not just hoarding raw clippings. [Note-taking research](https://psycnet.apa.org/record/2014-15511-001) consistently finds that paraphrasing-based notes outperform verbatim capture for retention.
      - The failure mode is capture-only behaviour: many adherent PKM users accumulate large collections of unprocessed clippings that produce no encoding benefit. Retention gains accrue mainly to the subset who process consistently.
      - ISR of 60% reflects that most adherent users will see meaningful retention gains, but a substantial minority who default to capture-only behaviour will not – the rephrasing step is the active ingredient and is often skipped.
    uar_reasoning: |
      - See information-management.retrieval UAR – same intervention, same adherence profile.
  information-management.insight:
    pbs: 6
    isr: 45
    uar: 20
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 65th percentile – linked atomic notes occasionally surface non-obvious connections that produce novel understanding, particularly when reviewing older notes during weekly review. Delta: ~30 percentile points.
      - The insight pathway is the headline claim of zettelkasten methodology – that explicit linking between atomic notes generates connections the original author did not see. [Ahrens' synthesis](https://www.soenkeahrens.de/en/takesmartnotes) of Luhmann's case offers the strongest narrative evidence; direct experimental evidence is essentially absent.
      - Score 6 reflects a real but modest and contingent benefit. Most insight gains require a critical mass of notes (hundreds to thousands), sustained linking discipline, and active review habits – conditions that hold for a small minority of even committed users.
    isr_reasoning: |
      - Insight generation is the least reliable benefit of PKM. It requires both a populated graph (months to years of consistent use) and an active habit of revisiting and connecting older notes – not just searching when prompted by a current task.
      - The Luhmann case is one extraordinary outlier across decades of academic practice; treating it as evidence of a generalisable method overstates the population-level effect. Most practitioners report retrieval and capture gains far more reliably than insight gains.
      - ISR of 45% reflects that genuine insight gains, beyond what the user would have generated through reading and thinking alone, are achieved by a minority of adherent users – conditional on graph density, review habits, and the kind of work the user does (synthesis-heavy work benefits more than execution-heavy work).
    uar_reasoning: |
      - See information-management.retrieval UAR – same intervention, same adherence profile.
  learning-methods.depth:
    pbs: 5
    isr: 50
    uar: 20
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 60th percentile – atomic-note rephrasing and linking provide a structured form of elaborative encoding that supports depth of understanding for topics the user actively writes about. Delta: ~25 percentile points.
      - The mechanism is generative: rephrasing source material in one's own words and linking it to existing notes is a form of [elaborative interrogation and self-explanation](https://link.springer.com/article/10.1007/s10648-018-9434-x), techniques with reasonable evidence for improving depth of learning.
      - Score 5 reflects a real but secondary benefit – PKM depth gains are confined to topics actively written about, which for most users is a small fraction of what they read or study. The intervention does not replace deliberate practice or active recall.
    isr_reasoning: |
      - Depth gains require the rephrasing-and-linking step at processing time, not just inbox capture. Users who skip processing or copy-paste captures verbatim see little depth benefit beyond what reading alone produces.
      - [Note-taking and elaboration research](https://psycnet.apa.org/record/2014-15511-001) shows that paraphrased, integrated notes produce stronger learning outcomes than verbatim capture, but the effect requires the active processing step.
      - ISR of 50% reflects that around half of adherent users will perform the active rephrasing step consistently enough to achieve depth gains; the rest will accumulate notes without the encoding benefit.
    uar_reasoning: |
      - See information-management.retrieval UAR – same intervention, same adherence profile.
  organisation.tracking:
    pbs: 4
    isr: 45
    uar: 20
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 55th percentile – a unified inbox and weekly review reduce the friction of moving from intention to action by making relevant context easy to find. Delta: ~20 percentile points.
      - The mechanism is consolidation: a single PKM tool with consistent capture replaces searching across email, bookmarks, scattered docs, and memory. The benefit is real but modest because PKM systems are not optimised for action tracking – dedicated task managers (e.g. Things, Todoist) handle that better.
      - Score 4 reflects that PKM contributes meaningfully to tracking only as a side effect of consolidating reference material; users typically still need a separate task system, so the net organisational gain is bounded.
    isr_reasoning: |
      - PKM tools are designed for reference and synthesis, not action tracking. Users who try to use them as task managers often produce friction rather than reducing it – the lack of structured task fields and reminders means commitments slip through.
      - The tracking benefit accrues mainly to users who pair PKM with a dedicated task manager and use the PKM for reference material – a setup that takes time to converge on and is not the default starting configuration.
      - ISR of 45% reflects that less than half of adherent users will see meaningful tracking gains, because the benefit depends on a hybrid configuration that most users do not adopt deliberately.
    uar_reasoning: |
      - See information-management.retrieval UAR – same intervention, same adherence profile.

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "Obsidian and Logseq are free for personal use; local Markdown files require no subscription. Notion has a free tier sufficient for personal PKM. The intervention can be started with no spend; paid sync plans are optional."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Free tools (Obsidian local, Logseq, Notion personal) are sufficient for the full intervention. Optional paid sync (Obsidian Sync $4/month) or premium plans are not required for the system to function."
  upfront_time: 8
  upfront_time_reasoning: "Approximately 8 hours: 2 hours installing and configuring the tool, 2 hours reading core methodology (a chapter or two of Ahrens, a few introductory blog posts), 2 hours setting up folder structure and conventions, 2 hours migrating a small initial set of existing notes. Tool-hopping and elaborate configuration can extend this indefinitely – the figure assumes a disciplined start."
  ongoing_time: 3
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Approximately 3 hours per week: ~2 hours of capture and processing distributed across the week (10–20 minutes most days), ~1 hour for weekly review and inbox-zero processing. This is on top of work that would have happened anyway and represents the friction tax that drives most abandonment."

prerequisites:
  - "A computer (and ideally a phone) with reliable storage and sync capability for the chosen tool"
  - "Basic comfort with Markdown syntax or willingness to learn it (most PKM tools use Markdown or a similar lightweight format)"
  - "Work or study that involves enough reading, writing, or synthesis to justify the maintenance overhead – PKM is poorly suited to people whose work is purely execution-based"

