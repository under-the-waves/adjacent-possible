name: "Phone and Notification Management"
description: |
  - Aggressively curating digital inputs by disabling non-essential notifications, setting phone-free periods (especially during focused work and before bed), using Do Not Disturb modes, removing social media apps, and configuring screen time limits to reclaim attention and reduce compulsive checking
  - Core techniques include notification auditing (disabling all but essential contacts and calendar alerts), batching remaining notifications to 2-3 delivery windows per day, establishing device-free zones (desk during deep work, bedroom after a set time), and using built-in or third-party screen time tools to enforce limits
  - [Research](https://academic.oup.com/pnasnexus/article/4/2/pgaf017/8016017) shows blocking mobile internet for two weeks reversed the equivalent of 10 years of age-related attention decline, and a [meta-analysis](https://dl.acm.org/doi/10.1145/3571810) of digital self-control tools found a moderate effect (d = 0.5) on reducing time spent on distracting platforms
  - Distinct from a full digital detox in that it preserves essential phone functionality (calls, messaging, maps, calendar) while systematically eliminating attention-fragmenting inputs; the goal is sustainable curation rather than temporary abstinence
  - [Notification batching](https://www.sciencedirect.com/science/article/abs/pii/S0747563219302596) 3 times daily improved attentiveness and perceived productivity compared to both continuous delivery and complete suppression, suggesting moderation outperforms extremes
applicable_domains: ["organisation", "current-work", "goals", "sleep", "mental-health"]

values:
  organisation.tracking:
    pbs: 6
    pbs_reasoning: |
      - Phone notifications are a primary source of deliberation friction: each alert pulls attention from the current task, and [research](https://pmc.ncbi.nlm.nih.gov/articles/PMC9671478/) shows even unattended notifications impair cognitive control, slowing transition from intention to action.
      - [Gloria Mark's research](https://tctecinnovation.com/blogs/daily-blog/every-distraction-costs-you-23-minutes) found it takes an average of 23 minutes to fully regain deep focus after an interruption. Eliminating the majority of notification triggers removes a substantial layer of organisational friction.
      - Score 6 because the anchor (zero overhead, instant intention-to-action) requires addressing all organisational systems. Notification management removes one major friction source but does not address task capture, prioritisation, or workflow design.
    isr: 55
    isr_reasoning: |
      - A [preregistered RCT (N = 205)](https://www.tandfonline.com/doi/full/10.1080/15213269.2024.2334025) found that disabling notifications for one week reduced perceived habit strength but did not significantly affect productivity or distraction, suggesting individual variation is substantial.
      - Conversely, [Fitz et al. (2019)](https://www.sciencedirect.com/science/article/abs/pii/S0747563219302596) found batching notifications 3x daily significantly improved attentiveness and perceived productivity, suggesting approach matters as much as intent.
      - The mixed evidence base suggests roughly half of proper adopters experience meaningful tracking improvements, with success depending on whether users batch rather than fully suppress, and whether they address the habitual checking that persists even without notifications.
    uar: 60
    uar_reasoning: |
      - [Roffarello & De Russis (2023)](https://dl.acm.org/doi/10.1145/3571810) found digital self-control tools had moderate short-term effects (d = 0.5), but most studies only measured outcomes over ~21 days; long-term adherence data is sparse.
      - A [consumer survey](https://www.journals.uchicago.edu/doi/abs/10.1086/714365?journalCode=jacr) found users readily monitor screen time but are unlikely to sustain actual reductions, particularly those highest in smartphone dependence.
      - Social pressure (fear of missing messages, professional expectations for rapid responses) creates ongoing friction. Estimated 55-65% sustained at 6 months, with higher adherence for batching approaches than for complete suppression.

  organisation.order:
    pbs: 5
    pbs_reasoning: |
      - Reduced notification interruptions mean fewer moments where incoming alerts derail commitment follow-through. The inverted anchor (missed commitments/month) benefits when attention is protected during task execution windows.
      - [Implementation intention research](https://doi.org/10.1037/0003-066X.54.7.493) shows pre-commitment rules (such as 'phone on DND during work blocks') roughly double follow-through rates by removing decision points where commitments slip.
      - Score 5 because missed commitments depend more on capture and review systems than on notification discipline alone. A successful user might move from 5 missed/month to 1-2/month, a meaningful but not transformative shift.
    isr: 50
    isr_reasoning: |
      - The causal chain from fewer interruptions to fewer missed commitments is plausible but indirect. [Decision fatigue research](https://doi.org/10.1016/j.joep.2017.07.008) found significant effects in only 45% of assessed studies, suggesting the mechanism is real but unreliable.
      - The [PNAS Nexus RCT](https://academic.oup.com/pnasnexus/article/4/2/pgaf017/8016017) showed 91% of participants improved on at least one outcome when blocking mobile internet, but commitment-keeping was not directly measured.
      - Conservative estimate given the indirect pathway from attention protection to commitment fulfilment.
    uar: 60
    uar_reasoning: |
      - See organisation.tracking UAR -- same intervention, same adherence profile. Social pressure and habitual checking are the primary failure modes regardless of which organisational dimension benefits.

  organisation.speed:
    pbs: 4
    pbs_reasoning: |
      - The anchor (perfectly minimal system) refers to reducing tools, steps, and rules. Notification management simplifies the experience of using one's phone but does not restructure organisational systems themselves.
      - Disabling unnecessary notification channels and removing social media apps does eliminate some system complexity (fewer apps, fewer input streams to manage), representing a modest simplification.
      - Score 4 because the intervention makes the digital environment feel less cluttered without fundamentally reducing structural system complexity.
    isr: 45
    isr_reasoning: |
      - The link between notification reduction and perceived system simplicity is supported by [cognitive load theory](https://doi.org/10.1207/s15516709cog1202_4) but not directly measured in notification intervention studies.
      - [Digital self-control research](https://dl.acm.org/doi/10.1145/3571810) focuses on usage time and wellbeing rather than system minimalism as an outcome, making this an inferred benefit.
      - Conservative score reflecting the plausible but weakly evidenced connection between fewer digital inputs and perceived system speed.
    uar: 60
    uar_reasoning: |
      - See organisation.tracking UAR -- same intervention, same adherence profile.

  current-work.competence:
    pbs: 5
    pbs_reasoning: |
      - Sustained attention is a core input to work competence. The [PNAS Nexus RCT](https://academic.oup.com/pnasnexus/article/4/2/pgaf017/8016017) found blocking mobile internet reversed 10 years of age-related attention decline, a substantial cognitive performance gain.
      - [Notification research](https://pmc.ncbi.nlm.nih.gov/articles/PMC9671478/) shows smartphone alerts disrupt performance on attention-demanding tasks at a scale similar to active phone use, meaning even brief notifications carry a significant competence cost.
      - Score 5 (not higher) because competence depends on skills, knowledge, and experience beyond attention alone. Protecting attention is necessary but not sufficient for elite-level execution.
    isr: 50
    isr_reasoning: |
      - The [Fitz et al. (2019)](https://www.sciencedirect.com/science/article/abs/pii/S0747563219302596) batching study found improved perceived productivity, but a [separate RCT](https://www.tandfonline.com/doi/full/10.1080/15213269.2024.2334025) found no effect on productivity or distraction when notifications were simply disabled, highlighting inconsistency.
      - Individual baseline phone usage varies enormously; heavy users have more to gain, while light users may see negligible competence improvements from further reduction.
      - Conservative estimate reflecting genuine but inconsistent evidence for productivity gains from notification management.
    uar: 60
    uar_reasoning: |
      - See organisation.tracking UAR -- same intervention, same adherence profile.

  goals.follow_through:
    pbs: 5
    pbs_reasoning: |
      - The anchor (% of days with deliberate goal action) benefits when attention is available for goal-directed work rather than being fragmented by notifications. Each protected attention block increases the probability of taking at least one goal action that day.
      - [Problematic smartphone use research](https://pmc.ncbi.nlm.nih.gov/articles/PMC9223448/) demonstrates that excessive phone use leads to both behavioural and cognitive self-control deficits, directly undermining the self-regulation needed for daily goal follow-through.
      - Score 5 because goal follow-through depends on goal clarity, planning, and motivation beyond attention availability. Notification management removes one barrier but not the full set.
    isr: 45
    isr_reasoning: |
      - The pathway from reduced phone distraction to increased goal action is plausible but indirect. [Self-regulation research](https://pmc.ncbi.nlm.nih.gov/articles/PMC8663477/) found that self-efficacy and planning mediate between smartphone management and behaviour change, suggesting notification control alone is insufficient without intentional goal-direction.
      - No studies directly measure goal completion rates as an outcome of notification interventions, making this an inferred rather than observed benefit.
      - Conservative estimate given the inferential gap between attention protection and daily goal action.
    uar: 60
    uar_reasoning: |
      - See organisation.tracking UAR -- same intervention, same adherence profile.

  sleep.daily_functioning:
    pbs: 5
    pbs_reasoning: |
      - The anchor is productive hours per day (max 14). A [meta-analysis of 55 studies (N = 41,716)](https://www.jmir.org/2024/1/e48356) found smartphone use was significantly associated with decreased sleep quality (pooled effect size 0.28), and poor sleep directly reduces productive hours the following day.
      - Evening phone-free periods reduce blue light exposure and cognitive arousal before bed. [Evening smartphone use](https://jcsm.aasm.org/doi/10.5664/jcsm.10392) specifically predicted worse sleep quality independent of total usage, and the [PNAS Nexus trial](https://academic.oup.com/pnasnexus/article/4/2/pgaf017/8016017) participants reported improved sleep alongside attention gains.
      - Score 5 because the sleep-mediated pathway to productive hours is real but represents only one of many factors affecting daily functioning. Someone already practising good sleep hygiene would see minimal additional benefit.
    isr: 50
    isr_reasoning: |
      - The [sleep quality meta-analysis](https://www.jmir.org/2024/1/e48356) found consistent associations (effect sizes 0.28-0.33), but these are correlational; intervention studies show more mixed results depending on whether the user actually reduces evening screen time or merely shifts to other screens.
      - The [Radtke et al. (2022) systematic review](https://journals.sagepub.com/doi/10.1177/20501579211028647) of digital detox found diverse outcomes across studies, with more stable effects for reduction approaches than complete abstinence.
      - Individual variation in screen sensitivity is substantial; some people sleep well regardless of evening phone use, limiting the population-level success rate.
    uar: 60
    uar_reasoning: |
      - See organisation.tracking UAR -- same intervention, same adherence profile. Evening phone-free periods face additional adherence challenges (boredom, habit of scrolling in bed) but benefit from a clear environmental trigger (bedtime).

  mental-health.stability:
    pbs: 5
    pbs_reasoning: |
      - An [RCT (N = 467)](https://pubmed.ncbi.nlm.nih.gov/39967678/) blocking mobile internet for two weeks found mental health symptom improvement with dz = 0.57 (P < 0.001), an effect larger than reported in multiple antidepressant trials. Participants also reported increased self-control, directly relevant to compulsive checking and anxiety cycles.
      - A [separate RCT (N = 111)](https://pmc.ncbi.nlm.nih.gov/articles/PMC11846175/) reducing screen time to two hours per day for three weeks found small-to-medium effects on depressive symptoms (eta-squared = .109) and stress (eta-squared = .085), with improvements persisting at six-week follow-up.
      - A [meta-analysis of 10 studies (N = 2,503)](https://pmc.ncbi.nlm.nih.gov/articles/PMC11392003/) found social media detox significantly reduced depressive symptoms (SMD = -0.29, P = 0.01), though stress reduction was not statistically significant.
      - Score 5 because a successful adopter plausibly moves from frequent distress (scale 4) toward occasional, quickly resolving distress (scale 6). The intervention reduces anxiety triggers and social comparison but does not address underlying vulnerability or provide therapeutic skills.
    isr: 50
    isr_reasoning: |
      - The [notification-disabling RCT (N = 205)](https://www.tandfonline.com/doi/full/10.1080/15213269.2024.2334025) found reduced perceived habit strength but also increased anxiety about missing notifications, suggesting the intervention can backfire for some users.
      - The [social media detox meta-analysis](https://pmc.ncbi.nlm.nih.gov/articles/PMC11392003/) found significant depression reduction only when pooling across studies; individual trial results varied substantially, and stress and general wellbeing effects were non-significant.
      - Baseline severity matters: [higher baseline symptom severity](https://pmc.ncbi.nlm.nih.gov/articles/PMC11392003/) predicted larger benefits, meaning light phone users or those without pre-existing distress may see negligible stability gains. Conservative estimate reflecting genuine but inconsistent effects across the population.
    uar: 60
    uar_reasoning: |
      - See organisation.tracking UAR -- same intervention, same adherence profile.

  mental-health.flourishing:
    pbs: 4
    pbs_reasoning: |
      - The [PNAS Nexus RCT (N = 467)](https://pubmed.ncbi.nlm.nih.gov/39967678/) found significant subjective wellbeing improvements (dz = 0.46, P < 0.001), with participants reporting increased offline engagement (hobbies, face-to-face conversation, time in nature) and greater social connectedness -- all inputs to present-moment awareness and meaning.
      - However, a [meta-analysis of social media detox studies](https://pmc.ncbi.nlm.nih.gov/articles/PMC11392003/) found no significant effect on life satisfaction (SMD = 0.20, P = 0.23) or general mental wellbeing (SMD = 0.04, P = 0.90), suggesting the flourishing pathway is weaker than the stability pathway.
      - The [BMC Medicine RCT](https://pmc.ncbi.nlm.nih.gov/articles/PMC11846175/) found a small effect on WHO-5 wellbeing (eta-squared = .053), the weakest of its four outcomes.
      - Score 4 because the mechanism is real -- reclaimed attention enables greater engagement with valued activities -- but the evidence for sustained flourishing gains (as opposed to transient mood improvements) is weak. A successful adopter moves from neutral (scale 4) toward regular moments of satisfaction (scale 6) only modestly.
    isr: 40
    isr_reasoning: |
      - The [social media detox meta-analysis](https://pmc.ncbi.nlm.nih.gov/articles/PMC11392003/) found non-significant effects on life satisfaction and general wellbeing, suggesting fewer than half of adherent users experience meaningful flourishing gains.
      - Reclaimed time does not automatically convert to meaningful engagement; users may substitute other passive activities (television, web browsing on a laptop) rather than pursuing flourishing-enhancing ones. The [PNAS Nexus trial](https://pubmed.ncbi.nlm.nih.gov/39967678/) noted decreased media consumption across all devices, but this was under controlled experimental conditions unlikely to persist universally.
      - Conservative estimate reflecting the indirect and unreliable pathway from reduced phone use to positive affect and meaning.
    uar: 60
    uar_reasoning: |
      - See organisation.tracking UAR -- same intervention, same adherence profile.

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No financial cost required. All major smartphone operating systems include built-in notification controls, Do Not Disturb modes, and screen time management tools. Third-party apps exist but are optional enhancements."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring financial costs for the core intervention. Premium screen time apps (e.g., Freedom, Opal) cost approximately $3-8/month but are not required when built-in tools suffice."
  upfront_time: 2
  upfront_time_reasoning: "Approximately 2 hours for initial setup: 30 minutes to audit all installed apps and their notification settings, 30 minutes to disable non-essential notifications and configure batching or scheduling, 30 minutes to set up screen time limits and phone-free period rules, and 30 minutes to communicate changed availability expectations to key contacts."
  ongoing_time: 0.5
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Approximately 30 minutes per month to review notification settings after app updates or new app installations, adjust screen time limits as needs change, and address any new notification sources that have crept in."

prerequisites:
  - "A smartphone with built-in notification management and screen time controls (iOS Screen Time or Android Digital Wellbeing, available on all devices from 2018 onwards)"
  - "Awareness of which contacts and apps genuinely require immediate notification (e.g., family, on-call work responsibilities) versus those that can be batched or silenced"
  - "Agreement from key stakeholders (manager, partner, close contacts) on altered response time expectations, particularly if the user's role involves time-sensitive communication"

flagged_domains:
  - domain: "relationships"
    rationale: "Improves present-moment availability during in-person interactions by reducing phone-related interruptions and distraction"
