name: "Sleep Mask"
what_it_is: |
  Wearing a contoured, light-blocking eye mask during sleep to eliminate ambient light that suppresses melatonin and disrupts circadian signalling. A well-fitted mask blocks the great majority of light from streetlamps, early sunrise, and device indicators. The intervention is most useful for people whose sleeping environment is not already very dark – urban dwellers, people whose partner keeps a different schedule, shift workers, and frequent travellers. For someone who already sleeps in a black-out bedroom, the marginal benefit is modest.
how_to_do_it: |
  - Pick a contoured (3D) mask that sits around the eyes without pressing on the lids; flat fabric masks tend to leak light around the nose bridge and squash the eyes
  - Wear it for several consecutive nights to adapt before judging comfort – most people habituate within a week or so
  - If the mask shifts during the night, try a wider elastic, an adjustable Velcro strap, or a wrap-around design
  - Keep a spare in your travel bag and bedside drawer so the habit is not interrupted by wear, loss, or being away from home
success_looks_like: |
  - You stop waking prematurely from early-morning light or ambient glow, and feel that mornings are less abrupt
  - Putting the mask on takes seconds and integrates into your existing wind-down without conscious effort
  - You notice a clear difference on nights you forget it, confirming the effect is real for your environment
common_pitfalls: |
  - Buying a cheap flat mask that lets light leak around the nose – inadequate light blocking removes the primary mechanism
  - Abandoning after two or three uncomfortable nights instead of trialling a different shape; comfort varies a lot between designs
  - Treating the mask as a fix-all when the dominant disruption is actually noise, temperature, caffeine timing, or a partner's movement
  - Expecting the same benefit as users in a bright bedroom when your room is already dark – the gain is roughly proportional to how much ambient light you currently get
description: |
  - Wearing a contoured light-blocking eye mask during sleep to suppress ambient light that interferes with melatonin signalling and sleep continuity
  - Most relevant for people in urban environments, with a partner on a different schedule, doing shift work, or travelling frequently; marginal for those who already sleep in a fully dark room
  - [Light exposure during sleep](https://www.pnas.org/doi/10.1073/pnas.2113290119) measurably elevates next-morning insulin resistance and overnight heart rate even at modest intensity
  - [Eye masks combined with earplugs in ICU settings](https://doi.org/10.1186/cc8965) improved REM sleep, reduced awakenings, and lowered cortisol and elevated melatonin
  - One-time cost of $10–30 for a basic mask; no recurring effort beyond putting it on at bedtime
applicable_domains: ["sleep"]

values:
  sleep.daily_functioning:
    pbs: 5
    isr: 55
    uar: 55
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence in a light-affected sleeping environment, a user could plausibly reach the 45th–50th percentile. Delta: ~10–15 percentile points.
      - For users with meaningful ambient light, [Mason et al. (2022)](https://www.pnas.org/doi/10.1073/pnas.2113290119) found that a single night of moderate light exposure (~100 lux) impaired next-morning insulin sensitivity and elevated overnight heart rate, suggesting daytime energy and cognition gains on the order of 15–30 minutes of additional productive capacity from restoring darkness.
      - Anchor calibration: 10 + log₂(20 minutes / (14 × 60 minutes)) = 10 + log₂(0.024) ≈ 4.6, rounded to 5. The score sits between the 13-minute (4) and 50-minute (6) benchmarks, reflecting that the average gain across a mixed population is closer to 20 minutes than to a full hour.
    isr_reasoning: |
      - Direct mask trials are concentrated in highly light-disrupted settings. [Hu et al. (2015) Cochrane meta-analysis of eye masks plus earplugs in ICU](https://doi.org/10.1186/s13054-015-0855-3) found consistent improvements in subjective sleep quality and REM percentage, but generalising to home settings is imperfect.
      - Among users with genuinely light-affected bedrooms, roughly 55–60% experience a noticeable next-day functional benefit; among users whose bedrooms are already mostly dark, the benefit is at the noise floor. The 55% ISR averages across this mix.
      - The mechanism via [photoreceptor-mediated melatonin suppression](https://doi.org/10.1113/jphysiol.2000.012684) is well characterised, but real-world masks rarely achieve 100% light blocking and many adopters do not have the underlying problem the intervention solves.
    uar_reasoning: |
      - [Hu et al. (2010) ICU intervention study](https://doi.org/10.1186/cc8965) found high in-trial compliance, but home retention data are thinner. Survey evidence on travel and shift-work mask users suggests roughly 50–60% continue nightly use beyond 3–6 months.
      - Physical-comfort dropout is the dominant attrition channel: mask shift during side-sleeping, eyelash contact, elastic discomfort, and partner-visibility issues each push a meaningful share of users to discontinue.
      - The effort is trivially low (seconds) and the cost is one-off, which keeps UAR from collapsing despite the comfort friction; users who clear the first two weeks usually persist.

  sleep.long_term_health:
    pbs: 4
    isr: 35
    uar: 55
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user in a light-affected environment could plausibly reach the 40th–45th percentile. Delta: ~5–10 percentile points.
      - [Mason et al. (2022)](https://www.pnas.org/doi/10.1073/pnas.2113290119) and the broader [Northwestern light-at-night cohort work](https://doi.org/10.1093/sleep/zsac130) link ambient light during sleep to elevated cardiometabolic risk, but the absolute effect size attributable to a sleep mask alone (rather than full bedroom darkening) is small – plausibly 1–3 months of additional healthy lifespan over decades of consistent use.
      - Anchor calibration: 10 + log₂(2 months / 96 months) ≈ 4.4, rounded to 4. Sits at the 2-month benchmark, reflecting that downstream health effects are modest, downstream of sleep quality, and only partially capturable by a mask versus other darkening strategies.
    isr_reasoning: |
      - Long-term health effects from masks specifically are largely extrapolated from light-exposure observational data, not direct mask RCTs. [Cho et al. (2015) on dim light at night and inflammation](https://doi.org/10.3109/07420528.2015.1073158) supports the mechanism but does not measure mask interventions.
      - Roughly 35% of consistent home users plausibly realise meaningful biomarker improvements; the rest either lack the underlying problem (already-dark bedroom), have other dominant sleep disruptors, or use masks that leak enough light to attenuate the benefit.
      - The biological pathway (preserved melatonin, intact circadian signalling) is plausible but downstream health outcomes from a single environmental tweak are noisy and competing factors dominate.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile.

  sleep.comfort_experience:
    pbs: 6
    isr: 65
    uar: 60
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence in a light-affected environment, a user could plausibly reach the 55th–60th percentile. Delta: ~20–25 percentile points.
      - The subjective experience of removing a known irritant (early sunrise, streetlight glow, partner's screen) is directly perceptible from the first night. [Hu et al. (2010)](https://doi.org/10.1186/cc8965) reported substantial subjective sleep-quality improvements with eye masks plus earplugs, with the mask contributing the visual-disturbance component.
      - Score 6 ("meaningful gain") rather than higher because the intervention only addresses the light dimension of comfort and leaves noise, temperature, mattress, and partner movement untouched.
    isr_reasoning: |
      - Subjective comfort gains are more reliable than objective health markers because users can directly perceive light reduction within the first night.
      - In light-affected populations, roughly 65% of mask wearers report a noticeable improvement in sleep continuity and morning experience; the remainder either find mask discomfort outweighs the light benefit or already had a sufficiently dark room.
      - [ICU and shift-work eye-mask trials](https://doi.org/10.1186/s13054-015-0855-3) consistently show improved subjective sleep ratings, supporting a moderate-to-high ISR in environments that resemble those study conditions.
    uar_reasoning: |
      - Adherence is slightly higher when the felt benefit is immediate and subjective – users who notice better sleep within the first week are more likely to persist, per follow-up patterns in [Hu et al. (2015)](https://doi.org/10.1186/s13054-015-0855-3).
      - Physical-comfort attrition (mask shift, eyelash contact, elastic pressure) still removes around 35–40% of starters within the first few months.
      - Travel use cases (hotels, planes) provide reinforcement that pulls some users back to nightly home use after experiencing the contrast.

