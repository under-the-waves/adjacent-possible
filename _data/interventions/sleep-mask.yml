  ongoing_cost: 10
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "Replacement every 12–18 months due to elastic degradation and hygiene; some users buy a second mask for travel. $10/year covers minimum replacement at low-cost-mask price points."
  upfront_time: 0.25
  upfront_time_reasoning: "Selecting and fitting a mask takes minutes. The adaptation period (a few nights) is part of normal sleeping time, not a dedicated time investment."
  ongoing_time: 0
  ongoing_time_period: "week"
