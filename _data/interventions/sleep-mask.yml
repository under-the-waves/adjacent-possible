prerequisites:
  - "Tolerance for material covering the eyes during sleep – a minority find this intolerable regardless of mask design"
  - "No medical condition affecting the eye area that contraindicates pressure or coverage (e.g., recent eye surgery)"
  - "Sleeping environment where a mask realistically stays in place – very restless sleep or certain face-down positions can dislodge it"

flagged_domains:
  - domain: "mental-health"
    rationale: "Improved sleep continuity in light-affected environments plausibly reduces day-to-day mood volatility and irritability via better circadian regulation, but no mask-specific evidence on mental-health outcomes."
  - domain: "cognitive-skills"
    rationale: "Better-preserved sleep architecture supports next-day focus and working memory; effect is downstream of sleep quality and partially captured by sleep.daily_functioning, but a separate cognitive-focus anchor would let this be scored directly."
