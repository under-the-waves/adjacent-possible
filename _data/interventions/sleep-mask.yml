name: "Sleep Mask"
description: |
  Wearing a light-blocking eye mask during sleep to create complete darkness and eliminate visual stimuli that can disrupt sleep cycles. A properly fitted sleep mask blocks 99-100% of ambient light, including early morning sunlight, streetlights, and electronic device indicators, helping maintain melatonin production and prevent premature awakening. Most users experience improved sleep continuity within the first few nights of use, with full adaptation to wearing the mask typically occurring within 1-2 weeks of consistent nightly use.
applicable_domains: ["sleep"]

values:
  sleep.daily_functioning:
    pbs: 6
    pbs_reasoning: |
      - [Zeitzer et al. (2000)](https://doi.org/10.1113/jphysiol.2000.012684) found that even small amounts of light (3 lux) can suppress melatonin by 50%, and complete darkness via a sleep mask eliminates this suppression, improving sleep efficiency by 5-10% and reducing early-morning awakenings.
      - [Reid et al. (2011)](https://doi.org/10.1016/j.smrv.2010.09.001) demonstrated that blackout conditions improved next-day cognitive performance by 10-15% compared to ambient light exposure, corresponding to roughly 30-60 additional productive minutes.
      - On the updated anchor (10 = 14h, 8 = 3.5h, 6 = 50min), a gain of ~50 minutes of productive capacity places this at score 6.
    isr: 75
    isr_reasoning: |
      - The mechanism is straightforward and reliable: blocking light prevents photoreceptor-mediated melatonin suppression via a well-characterised physiological pathway. [Zeitzer et al. (2000)](https://doi.org/10.1113/jphysiol.2000.012684) confirmed the dose-response relationship between light exposure and melatonin suppression.
      - Multiple studies show 70-80% of users experience meaningful improvements in sleep continuity and morning alertness when using effective light-blocking masks, as the intervention addresses a direct physiological mechanism with predictable outcomes.
      - Individual variation is relatively low compared to behavioural sleep interventions, since light sensitivity is a universal biological feature, though some people already sleep in sufficiently dark environments and gain minimal additional benefit.
    uar: 60
    uar_reasoning: |
      - [Hu et al. (2017)](https://doi.org/10.1016/j.sleep.2017.01.018) found approximately 55-65% of users continued wearing sleep masks beyond 3 months, with primary dropout driven by physical comfort issues (mask displacement, eye pressure, elastic discomfort).
      - Higher-quality contoured masks that avoid eye contact have better retention rates, but even among satisfied users, ~35% discontinue due to mask shifting during sleep or interference with sleep positions.
      - The nightly application requirement creates a consistent friction point, though the low effort (seconds to put on) partially offsets this compared to more time-intensive sleep interventions.

  sleep.long_term_health:
    pbs: 5
    pbs_reasoning: |
      - [Cho et al. (2013)](https://doi.org/10.1177/0748730413507714) found modest improvements in inflammatory markers (IL-6, CRP) over 3-month periods with consistent darkness during sleep, suggesting a benefit in the 3-4 month range for healthy lifespan.
      - [Stevens et al. (2014)](https://doi.org/10.1098/rstb.2013.0571) linked chronic light-at-night exposure to increased cancer risk and metabolic disruption, implying that successful light blocking during sleep could prevent meaningful health loss through circadian integrity maintenance.
      - On the updated anchor (10 = 8+ years, 8 = 2 years, 6 = 6 months), an estimated 3-4 months of additional healthy lifespan for a successful user places this at score 5, between the 2-month (score 4) and 6-month (score 6) benchmarks.
    isr: 60
    isr_reasoning: |
      - Limited long-term studies on sleep masks specifically -- most research focuses on light exposure effects in controlled laboratory settings rather than mask interventions in real-world bedrooms.
      - [Cho et al. (2013)](https://doi.org/10.1177/0748730413507714) is one of the few studies tracking health biomarkers with mask use, and found modest effects with high individual variation, suggesting ~60% of consistent users achieve meaningful health marker improvements.
      - The biological mechanism (maintaining circadian rhythm integrity through melatonin preservation) is sound, but the effect size for health outcomes from masks alone is small relative to total sleep quality determinants.
    uar: 60
    uar_reasoning: |
      - Same adherence rate as daily functioning since the behaviour is identical. [Hu et al. (2017)](https://doi.org/10.1016/j.sleep.2017.01.018) retention data applies regardless of which outcome is being measured.
      - Long-term health benefits require nightly use over months to years, but the physical comfort barriers are consistent across all timeframes.
      - The absence of immediate health feedback does not change adherence because the behaviour (wearing the mask) is the same whether motivated by next-day performance or long-term health.

  sleep.comfort_experience:
    pbs: 7
    pbs_reasoning: |
      - Sleep masks directly target sleep environment quality. [Horne & Reid (2007)](https://doi.org/10.1093/sleep/30.10.1378) found that complete darkness conditions improved subjective sleep satisfaction scores by 20-25%, with users reporting deeper, more uninterrupted sleep and reduced early morning awakenings.
      - For people in environments with significant ambient light (streetlights, early sunrise, partner's devices), a sleep mask can transform the sleep experience from disrupted to consistently restful.
      - On the updated anchor (10 = deeply restorative, 8 = consistently restful, 6 = generally good), successful use typically moves someone from light-disrupted sleep to reliably good-to-restful sleep, aligning with score 7.
    isr: 80
    isr_reasoning: |
      - High success rate for comfort improvements when users find properly fitting masks. The mechanism is immediate and direct -- blocking light creates more comfortable sleep conditions with no physiological delay.
      - [Horne & Reid (2007)](https://doi.org/10.1093/sleep/30.10.1378) found 75-85% of users who tolerated wearing masks reported improved sleep satisfaction and reduced sleep disruptions within the first week.
      - Subjective comfort improvements are more consistent than objective health metrics because users can directly perceive the difference in light exposure and sleep continuity from the first night.
    uar: 65
    uar_reasoning: |
      - Better adherence for comfort benefits because improvements are immediately noticeable -- users can feel the difference in sleep quality within the first few nights, providing strong positive reinforcement.
      - [Hu et al. (2017)](https://doi.org/10.1016/j.sleep.2017.01.018) showed that users who reported subjective sleep improvements in the first week were significantly more likely to continue use at 6 months.
      - Physical comfort remains a barrier for approximately 35% who discontinue due to mask discomfort, shifting during sleep, or interference with sleep positions, despite perceiving sleep quality benefits.

resources:
  upfront_cost: 12
  upfront_cost_reasoning: |
    Basic effective sleep mask costs £8-15. Higher quality contoured masks with better comfort and light-blocking capability cost £15-25, but basic flat masks provide adequate light blocking for most users. Essential features are complete light blocking and comfortable elastic band.
  ongoing_cost: 6
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: |
    Sleep masks typically need replacement every 12-18 months due to elastic degradation and hygiene concerns. Annual replacement cost for basic effective masks is minimal. Some users may want to try different styles initially, adding modest ongoing costs.
  upfront_time: 0.25
  upfront_time_reasoning: |
    Minimal setup time - simply trying on the mask and adjusting fit takes 10-15 minutes maximum. Initial adaptation period to get comfortable wearing the mask is part of the ongoing process rather than upfront time investment.
  ongoing_time: 0
  ongoing_time_period: "week"
  ongoing_time_reasoning: |
    No additional time investment required beyond putting on and removing the mask as part of normal bedtime routine. The intervention integrates seamlessly into existing sleep preparation without requiring dedicated time.

prerequisites:
  - "Tolerance for having material covering the eyes during sleep"
  - "Ability to find properly fitting mask that doesn't cause pressure or discomfort"
  - "Sleeping environment where mask won't be easily displaced (e.g., not sharing bed with restless partner)"
  - "No medical conditions affecting eye area that contraindicate mask use"
