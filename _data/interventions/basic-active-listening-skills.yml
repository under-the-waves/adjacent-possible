  - "Basic familiarity with the three core techniques (paraphrasing, open questions, feeling-reflection) via any free resource before first application"

flagged_domains:
  - domain: "mental-health"
    rationale: "Being listened to well is a robust predictor of psychological well-being; practitioners who listen better also tend to feel more relationally secure, reducing loneliness and anxiety."
  - domain: "self-awareness"
    rationale: "Reflecting feelings back to others requires first noticing and labelling emotions, which builds the practitioner's own emotional vocabulary and self-awareness over time."
