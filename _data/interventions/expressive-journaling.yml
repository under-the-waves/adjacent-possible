  upfront_cost_reasoning: "No financial cost required. Any notebook, text editor, or note-taking app works. No special equipment needed."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring financial costs."
  upfront_time: 0.5
  upfront_time_reasoning: "Approximately 30 minutes to read about the expressive writing approach, decide on a time of day, and try the first session. Less setup than structured decision review because there is no template to design."
  ongoing_time: 2
  ongoing_time_period: "week"
  ongoing_time_reasoning: "15-20 minutes per session, ideally 3-4 sessions per week. Daily practice is optional but not required – the research shows benefits from as few as 3 sessions per week."

prerequisites:
  - "Willingness to engage with emotionally difficult material in writing"
  - "A private, uninterrupted writing environment where emotional expression feels safe"
  - "Basic literacy and comfort articulating feelings in writing"

flagged_domains:
  - domain: "self-awareness"
    rationale: "Sustained emotional writing builds insight into personal emotional patterns, triggers, and coping responses"
  - domain: "goals"
    rationale: "Processing emotional barriers to action may indirectly improve goal follow-through, but the mechanism is indirect"
