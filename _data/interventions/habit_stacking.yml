name: "Habit Stacking"
description: "Attaching a new desired behaviour to an existing established habit using an 'After I [current habit], I will [new habit]' formula. Developed by BJ Fogg as part of the Tiny Habits method, habit stacking leverages existing neural pathways and routine-based cues to reduce the activation energy for new behaviours. The technique works because established habits already have strong contextual triggers, making them reliable anchors for new actions. Implementation typically involves identifying 3 - 5 existing habits as anchor points, then sequencing new micro-behaviours immediately after each anchor. Most practitioners see noticeable routine integration within 2 - 4 weeks, with full automaticity developing over 6 - 10 weeks depending on complexity."
applicable_domains: ["goals"]

values:
  goals.clarity:
    pbs: 5
    pbs_reasoning: "Habit stacking forces explicit articulation of when and where a behaviour will occur, which significantly improves goal specificity. Research on implementation intentions (Gollwitzer, 1999) shows that specifying the situational cue for a behaviour roughly doubles follow-through rates. However, habit stacking primarily clarifies execution rather than goal architecture itself — it does not help with defining what goals to pursue or establishing measurable success criteria. The clarity benefit is real but bounded to the implementation layer."
    isr: 60
    isr_reasoning: "BJ Fogg's Tiny Habits research and a scoping review of the Fogg Behavior Model show consistent short-term effectiveness across diverse health domains. A British Psychological Society study found 64% higher success rates for executives using habit stacking versus standalone habit formation. However, most studies are relatively short (7 days to several months), and long-term adherence data remains limited. The evidence base is promising but not yet as robust as meta-analyses covering goal monitoring or exercise interventions."
    uar: 65
    uar_reasoning: "Habit stacking has moderate-to-good adherence because it piggybacks on existing routines, reducing the need for separate motivation or reminders. The technique is simple to learn and requires no tools or financial investment. However, disruptions to the anchor habit (travel, schedule changes, illness) can cascade and break the stacked behaviour. Studies suggest routine-based cues produce stronger automaticity than time-based cues, but real-world adherence is limited by lifestyle variability. Estimated 60 - 70% sustained adoption at 6 months."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "clarity_level"
    anchor_description: "Complete goal clarity with unambiguous success criteria and logical connection to broader life aims"

  goals.achievement:
    pbs: 6
    pbs_reasoning: "Habit stacking directly addresses the execution gap between intention and action — the point where most goals fail. By embedding goal-relevant behaviours into existing routines, it bypasses the need for willpower-dependent initiation. The 64% improvement in success rates found in executive populations is meaningful. However, habit stacking is most effective for small, repeatable behaviours rather than complex multi-step goals. It raises the floor of daily consistency but does not address strategic goal selection, progress tracking, or adaptive course correction."
    isr: 55
    isr_reasoning: "Evidence for achievement impact is moderate. The Fogg Behavior Model has been validated across health behaviour change interventions, and implementation intention research broadly supports the mechanism. However, translating habit-level consistency into goal-level achievement requires additional systems (tracking, review, accountability). The causal chain from 'I do this micro-behaviour daily' to 'I achieve my quarterly goal' has plausible but incompletely validated links."
    uar: 65
    uar_reasoning: "Same adherence profile as clarity — the technique's simplicity and integration into existing routines support sustained use. The main risk is that users stack trivially small habits that feel productive but do not meaningfully advance larger goals. Those who connect stacked habits to explicit goal outcomes tend to persist; those who treat it as a productivity trick may abandon it when novelty fades."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "achievement_level"
    anchor_description: "Consistently achieving 90%+ of set goals across multiple life domains over sustained periods"

  goals.adaptability:
    pbs: 3
    pbs_reasoning: "Habit stacking provides minimal direct benefit to goal adaptability. The technique is inherently about building fixed routines, which can actually reduce flexibility if over-applied. It does not include mechanisms for reviewing whether goals remain worth pursuing, adjusting timelines, or triaging competing priorities. The modest score reflects the indirect benefit that stable daily habits free cognitive resources for higher-order strategic thinking, but this is a second-order effect rather than a direct contribution."
    isr: 50
    isr_reasoning: "There is little direct research on habit stacking's impact on goal adaptability specifically. The theoretical link — that automated routines free cognitive bandwidth for strategic review — is plausible but largely untested. The score reflects this uncertainty rather than negative evidence."
    uar: 65
    uar_reasoning: "Adherence for the adaptability dimension mirrors the overall habit stacking adherence rate, since the same behaviour is being sustained regardless of which value dimension it serves."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "adaptability_level"
    anchor_description: "Proactive goal portfolio management with systematic review and strategic flexibility"

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No financial cost required. Habit stacking is a purely behavioural technique that requires only knowledge of the method and reflection on existing routines."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring costs. The technique uses existing habits and environments as infrastructure."
  upfront_time: 1
  upfront_time_reasoning: "Approximately 1 hour to audit existing daily habits, identify 3 - 5 reliable anchor points, design the stacking sequences, and write out the 'After I X, I will Y' formulas. Some practitioners benefit from a second hour of refinement after the first week."
  ongoing_time: 0.5
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Minimal ongoing time — perhaps 5 minutes per day of conscious attention during the first 2 - 4 weeks while new stacks are forming. Once automated, the time cost drops to near zero, with occasional review when routines change."

prerequisites:
  - "At least 3 stable daily habits that occur reliably in the same context and sequence (e.g., morning coffee, brushing teeth, arriving at desk)"
  - "Clear identification of 1 - 3 new behaviours to integrate, each small enough to complete in under 2 minutes initially"
  - "Willingness to start with trivially small versions of desired behaviours and scale up gradually rather than attempting full-sized habits immediately"
