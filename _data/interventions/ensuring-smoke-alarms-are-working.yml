evaluated_at: 2026-04-25
evaluated_by: claude-opus-4-7
name: "Ensuring Smoke Alarms Are Working"
quick_win: true
quick_win_cadence: rare_check
what_it_is: |
  A household maintenance practice consisting of three linked actions: testing every smoke alarm monthly by pressing the test button, replacing batteries annually on a fixed date, and confirming that alarms are installed on every floor (including inside and outside sleeping areas). The intervention costs roughly $20/year in batteries and replacement alarms and takes under five minutes per test cycle. Despite its trivial cost and effort, it addresses the single most lethal residential fire-safety gap: the majority of home fire deaths occur in homes with no smoke alarm or a non-functioning one. Working smoke alarms roughly halve the death rate in reported home fires, making this a rare case where a low-effort habit carries genuinely life-altering stakes – even though the annual probability of a fire for any individual household is low.
how_to_do_it: |
  - Press the test button on every alarm in the home once per month – a 30-second task per alarm. Set a recurring calendar reminder (e.g., the first of each month) to avoid relying on memory
  - Replace all batteries annually on a fixed, memorable date (many people use a daylight-saving clock change or the New Year); use 9V alkaline or the manufacturer-specified type, and keep spares on hand
  - Walk every floor of the home and confirm alarm placement: at minimum, one alarm on each floor, one inside each sleeping room, and one outside each sleeping area – NFPA 72 is the standard reference for coverage requirements
  - Replace any alarm older than 10 years regardless of apparent function; the sensing element degrades silently over time and may fail to trigger even when the test button works
success_looks_like: |
  - Every alarm in the home produces a loud tone when the test button is pressed, and the test is completed on schedule each month without skipping
  - All alarms carry batteries no older than 12 months, with a visible date label on the battery or alarm body confirming the last replacement
  - The home has confirmed coverage on every floor and in or adjacent to every sleeping area, with no expired alarms (over 10 years old) remaining
common_pitfalls: |
  - Silencing a low-battery chirp by removing the battery and then forgetting to replace it – this is the single most common reason alarms fail; keep spare batteries in a dedicated drawer near the alarms
  - Testing only the closest or most accessible alarm and assuming the rest work – sensors degrade independently, and a failed alarm elsewhere in the home provides no warning
  - Relying on alarms that are wired into the mains without checking whether the battery backup is still functional; power outages are disproportionately associated with fire events
description: |
  - Monthly test involves pressing each alarm's test button to trigger the 85-decibel minimum tone required by UL 217; alarms that fail to sound should be replaced immediately, not noted for later
  - Annual battery replacement eliminates the most common failure mode: [NFPA data](https://www.nfpa.org/education-and-research/home-fire-safety/smoke-alarms) shows that in fires where an alarm was present but did not operate, 47% had missing or disconnected batteries and 24% had dead batteries
  - Coverage follows NFPA 72: one alarm per floor, inside each bedroom, and outside each sleeping area – interconnected alarms (wired or wireless) are preferable so any triggered unit alerts the whole home
  - [NFPA research](https://www.nfpa.org/education-and-research/research/nfpa-research/fire-statistical-reports/smoke-alarms-in-us-home-fires) covering 2012–2016 shows the death rate per 1,000 reported home fires was more than twice as high in homes without working alarms (1.18) as in homes with them (0.53) – a 55% reduction in conditional fire mortality
  - Alarms should be replaced after 10 years per manufacturer guidance; ionisation and photoelectric sensor types detect different fire signatures (fast-flaming vs. slow-smouldering), and combination or dual-sensor units are recommended where only one alarm is installed per area
applicable_domains: ["physical-safety", "emergency-preparedness"]

values:
  physical-safety.risk:
    pbs: 10
    isr: 0.12
    uar: 70
    confidence: high
    pbs_reasoning: |
      - Conditional on the intervention succeeding (the alarm warns the user and prevents a fire death), the user has avoided premature death from one of the most lethal residential incidents. By the framework's lottery-precedent rule, PBS captures the magnitude assuming success, with probability moved to ISR: the magnitude here is "your life saved", which sits at the top of the preventable-incident-mortality anchor (PBS 10).
      - The save preserves roughly 30 expected remaining life-years for a typical adult, which under the framework's [QALY anchoring with $100K/QALY threshold and 2× loss aversion for premature death](/methodology/valuing-health-and-life/) translates to ~60 QALYs of value preserved – at the top of the safety anchor.
      - Probability is intentionally NOT in PBS. The annual home fire base rate (~0.31% per household), conditional alarm effectiveness (~60% mortality reduction per [NFPA](https://www.nfpa.org/education-and-research/research/nfpa-research/fire-statistical-reports/smoke-alarms-in-us-home-fires)), and user-population maintenance reliability are reflected in ISR. PBS is the size of the prize on success.
    isr_reasoning: |
      - ISR is the lifetime probability that the intervention delivers the meaningful outcome (your life saved by an alarm-triggered fire warning). Computed as: lifetime fire-death probability without alarm × alarm mortality-reduction effectiveness.
      - [NFPA data](https://www.nfpa.org/education-and-research/research/nfpa-research/fire-statistical-reports/home-structure-fires) shows ~3,500 home fire deaths per year across ~125 million US households = ~0.0028% annual fire-death probability per household, accumulating to ~0.196% lifetime probability over 70 years (without alarm).
      - Working alarms reduce fire mortality by ~60% per [NFPA's 2012–2016 analysis](https://www.nfpa.org/education-and-research/research/nfpa-research/fire-statistical-reports/smoke-alarms-in-us-home-fires) (death rate of 0.53/1,000 vs 1.18/1,000 reported home fires – 55% conditional reduction). Lifetime probability of being saved by alarm: 0.196% × 60% ≈ 0.12%.
      - This rare-event ISR is correctly small. The same shape as a lottery ticket (PBS 10, ISR 0.05%) – high conditional benefit, low conditional probability. The per-EBS expected value is modest because the relevant scenario is rare, not because the intervention is weak.
    uar_reasoning: |
      - Monthly testing has low inherent friction (30 seconds per alarm, no cost), but habit research consistently shows that low-salience, infrequent maintenance tasks have poor long-term adherence without external triggers. A meaningful proportion of households do not test alarms even annually. [NFPA survey data](https://www.nfpa.org/education-and-research/home-fire-safety/smoke-alarms) indicates roughly 21% of homes lack working smoke alarms, suggesting a substantial non-compliance population even among those who intend to maintain them.
      - Annual battery replacement is a single-event habit with reasonable adherence when calendar-anchored, but without a fixed anchor (e.g., a seasonal cue), many households drift into reactive replacement only after a low-battery chirp – which itself often results in battery removal without replacement. The 47% missing-or-disconnected-battery failure rate in non-operating alarms ([NFPA](https://www.nfpa.org/education-and-research/home-fire-safety/smoke-alarms)) reflects real-world non-adherence.
      - UAR of 70% reflects that the task is easy and low-cost but competes against inertia, forgetfulness, and the alarm's silence (no feedback when it works correctly). Users who set calendar reminders or anchor the habit to an annual date should substantially exceed this; those without an external trigger will drift. Sealed-battery 10-year alarms remove the battery-replacement step entirely and would push UAR higher, but the monthly test requirement remains.

  emergency-preparedness.baseline:
    pbs: 4
    isr: 85
    uar: 70
    confidence: high
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 45th–50th percentile on baseline emergency preparedness – alarms represent one well-covered risk domain but leave food, water, power, and medical supply gaps untouched. Delta: ~10–15 percentile points.
      - The scale level 4 for this value ("Modest gain in baseline emergency preparedness") fits precisely: the intervention closes the most lethal single gap in home fire preparedness, which is a genuine and meaningful preparedness improvement, but it does not address the breadth of disruptions (outages, storms, medical emergencies) covered by higher score levels.
      - Smoke alarm maintenance is a foundational preparedness step recommended in every baseline emergency preparedness guide (Red Cross, FEMA, NFPA) – it is the floor, not the ceiling, of home safety readiness. PBS 4 reflects meaningful but bounded scope.
    isr_reasoning: |
      - For the baseline-preparedness value, ISR reflects how reliably the intervention actually closes the fire-detection gap it targets. [NFPA data](https://www.nfpa.org/education-and-research/research/nfpa-research/fire-statistical-reports/smoke-alarms-in-us-home-fires) consistently shows working alarms reduce fire death rates by 55–60%, confirming high reliability when the intervention is followed.
      - A small ISR discount below 100% reflects that some fires (very fast-developing, or originating adjacent to the alarm) may not allow adequate egress time even with a working alarm, and that coverage gaps (missing a floor or sleeping area) can persist even when the user believes they are compliant.
      - ISR is slightly lower than for physical-safety.risk because the preparedness framing includes the user's ability to respond effectively once warned – which depends on factors (mobility, household composition, egress routes) beyond the alarm itself. 85% is conservative and well-supported.
    uar_reasoning: |
      - See physical-safety.risk UAR – same intervention, same adherence profile. UAR of 70% reflects the gap between intention and consistent monthly testing, driven by inertia and absence of feedback when the alarm functions correctly.

resources:
  upfront_cost: 20
  upfront_cost_reasoning: "Assumes the home already has some alarms installed. $20 covers a single replacement alarm if one is missing or expired (basic ionisation units cost $10–15 at hardware retailers). If installing from scratch across a typical home (3–4 alarms), upfront cost rises to $30–60."
  ongoing_cost: 20
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "Annual battery replacement for 3–4 alarms using 9V alkaline batteries costs roughly $10–15. Budget $5–10 for occasional alarm replacement (units expire after 10 years; amortised across the replacement cycle, this adds ~$5/year for a typical home). Total: ~$20/year."
  upfront_time: 0.5
  upfront_time_reasoning: "Initial walkthrough to count alarms, check placement against NFPA 72 coverage requirements, note expiry dates, and identify any gaps or expired units. Approximately 20–30 minutes for a typical home."
  ongoing_time: 0.08
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Monthly test takes approximately 30 seconds per alarm; 3–4 alarms = under 5 minutes per month. Annual battery replacement adds ~15 minutes once per year, averaging under 2 minutes per month. Total ongoing commitment: well under 10 minutes/month."

prerequisites:
  - "A permanent residence (owned or rented) in which you are permitted to install or maintain smoke alarms – tenants should confirm with landlords which maintenance responsibilities sit with them"
  - "Access to alarm test buttons and, where battery-operated units are installed, the ability to safely access them (e.g., via a step ladder for ceiling-mounted units)"
  - "Basic knowledge of the home's floor plan and sleeping areas to verify coverage against NFPA 72 or equivalent national standard"

flagged_domains:
  - domain: "housework"
    rationale: "Alarm testing and battery replacement fit naturally into a structured home maintenance routine, and users who build this habit often extend it to other periodic safety and maintenance checks."
  - domain: "legal-matters"
    rationale: "Landlords in many jurisdictions have a legal duty to provide and maintain working smoke alarms; tenants who understand this requirement are better positioned to enforce it or negotiate compliance."
