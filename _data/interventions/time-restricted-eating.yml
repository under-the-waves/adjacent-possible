name: "Time-Restricted Eating"
what_it_is: |
  Limiting all food consumption to a fixed 8–10 hour daily window (e.g. 10am–6pm), with only water, black coffee, or plain tea outside that window. Creates a caloric deficit through structural restriction of eating opportunities rather than conscious calorie counting or food tracking, making it simpler to sustain than approaches like [calorie tracking](/resources/intervention-database/calorie-tracking).
how_to_do_it: |
  - Choose an eating window that fits your social and work schedule – many people find a 10am–6pm or 11am–7pm window works well, but the specific hours matter less than consistency
  - Start with a 10-hour window for the first 1–2 weeks, then narrow to 8 hours once you have adapted to the initial constraint
  - You may find it easier to skip or delay breakfast than to cut off eating early in the evening, since social meals tend to cluster in the evening – but earlier windows show slightly better metabolic outcomes in research
  - On days when social commitments fall outside your window (a late dinner, an early work breakfast), shift the window rather than abandoning it – flexibility on individual days preserves the overall pattern
success_looks_like: |
  - You eat within your window on most days without conscious effort – the schedule feels like a default rather than a restriction
  - Hunger outside the window diminishes noticeably after 2–3 weeks as your body adapts to the new meal timing
  - You notice modest, sustained weight loss (1–2 kg over the first 2–3 months) without tracking calories or changing what you eat
common_pitfalls: |
  - Compensating by eating larger or more calorie-dense meals during the window, which eliminates the spontaneous caloric deficit that drives the benefit
  - Choosing a window that conflicts with regular social meals (family dinners, work lunches), creating friction that erodes adherence within weeks
  - Gradually widening the window over time without noticing – a strict 8-hour window drifts to 10, then 12, until the constraint is nominal
description: |
  - Limiting all food consumption to a fixed 8-10 hour daily window (e.g. 10am-6pm), with only water, black coffee, or plain tea outside that window; no calorie counting or food tracking required
  - Creates a caloric deficit through structural restriction of eating opportunities rather than conscious energy monitoring; [meta-analytic evidence](https://doi.org/10.1038/s41430-023-01311-w) shows participants spontaneously reduce intake by approximately 400 kcal/day
  - [A 12-month RCT](https://doi.org/10.7326/M23-0052) found TRE without calorie counting produced comparable weight loss to traditional calorie restriction (~4.6 kg vs ~5.4 kg), and [a separate 12-month trial](https://doi.org/10.1056/NEJMoa2114833) confirmed no significant difference between the two approaches
  - Distinguished from calorie counting by its simplicity: one temporal rule replaces constant food logging, which may improve long-term adherence for people who find tracking burdensome
applicable_domains: ["body-image"]

values:
  body-image.fat_loss:
    pbs: 7
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 65th percentile. Delta: 30 percentile points of improvement. [A 12-month RCT](https://doi.org/10.7326/M23-0052) of 8-hour TRE without calorie counting found a mean weight loss of 4.61 kg (~5% body weight), and [a trial in adults with type 2 diabetes](https://jamanetwork.com/journals/jamanetworkopen/fullarticle/2811116) showed 3.56% loss at 6 months – placing the sustained effect at 3 – 5%
      - [The NEJM trial](https://doi.org/10.1056/NEJMoa2114833) (Liu et al. 2022) showed TRE combined with calorie restriction produced ~9% loss at 12 months, but TRE alone – the intervention being scored here – typically yields 3 – 5% without deliberate restriction
      - [A meta-analysis of RCTs](https://doi.org/10.1038/s41430-023-01311-w) confirms participants spontaneously reduce intake by ~400 kcal/day, producing moderate but meaningful weight reduction in successful adherents
      - On the logarithmic anchor, 4% sustained loss maps to 10 + log₂(4/25) = 7.36, rounding to PBS 7
    isr: 65
    isr_reasoning: |
      - [A multicentre RCT](https://www.nature.com/articles/s41591-024-03375-y) found that TRE, regardless of eating window timing, did not reduce visceral adipose tissue compared with usual care, indicating that a meaningful proportion of adherent participants see minimal fat loss
      - The mechanism depends on spontaneous calorie reduction from fewer eating hours, but [evidence on compensatory eating](https://pmc.ncbi.nlm.nih.gov/articles/PMC10111287/) shows some individuals compensate by consuming larger meals during the window, eliminating the deficit entirely
      - [Circadian alignment matters](https://doi.org/10.1001/jamainternmed.2022.3050): early TRE produces somewhat larger effects than late TRE, meaning individual response depends partly on which window is chosen – a source of variation that reduces the overall proportion achieving meaningful results
      - Score of 65 reflects that while the majority of proper adherents do lose some weight, a substantial minority (~30 – 35%) fail to achieve meaningful fat loss due to compensatory intake, suboptimal window timing, or individual metabolic variation
    uar: 55
    confidence: medium
    uar_reasoning: |
      - [A study of TRE adherence](https://doi.org/10.3390/nu15102336) found that adherence across trials ranged from 47% to 95% of days, with substantial variation by study design and population; free-living adherence was notably lower than supervised conditions
      - [A 6-month follow-up study](https://www.nature.com/articles/s41366-025-01968-2) found that only 11.8% of participants met the predefined adherence criterion of 5+ days per week during unsupervised follow-up, despite 86% adherence during the supervised phase
      - [A narrative review](https://pubmed.ncbi.nlm.nih.gov/39707164/) reported mean retention rates of 81-86% in controlled trials, and roughly 63% of participants were still practising some form of TRE 16 months after study completion, though often with a wider eating window than prescribed
      - Score 55 reflects that the simplicity of TRE supports better initial uptake than calorie counting, but social eating constraints, hunger during fasting windows, and gradual window drift reduce sustained long-term adherence to moderate levels

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No equipment, supplements, or programme fees required. The intervention involves changing when existing meals are consumed, not purchasing new products."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring costs. Food expenditure may decrease slightly due to reduced meal frequency, but this is not a reliable or consistent saving."
  upfront_time: 1
  upfront_time_reasoning: "Minimal setup: choosing an eating window that fits one's schedule, adjusting meal timing, and understanding which beverages are permitted during the fasting period."
  ongoing_time: 0
  ongoing_time_period: "week"
  ongoing_time_reasoning: "No additional time investment beyond normal meal preparation. The intervention restructures existing eating rather than adding new activities. Some initial adjustment period may involve brief hunger management, but this does not constitute a time cost."

prerequisites:
  - "No active or history of eating disorders; restrictive eating windows can trigger disordered eating patterns in susceptible individuals"
  - "Medical clearance if taking medications that must be taken with food at specific times (e.g. certain diabetes medications, morning prescriptions)"
  - "A daily schedule that permits consistent meal timing; highly variable shift work or frequent cross-timezone travel may make adherence impractical"
  - "Willingness to navigate social eating situations that fall outside the chosen window (e.g. early breakfasts, late dinners)"
