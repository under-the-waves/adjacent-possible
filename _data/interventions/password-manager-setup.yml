evaluated_at: 2026-04-25
evaluated_by: claude-opus-4-7
name: "Password Manager Setup"
what_it_is: |
  Installing a password manager (e.g. Bitwarden, free; or 1Password, ~$36/year) and migrating all accounts to unique, high-entropy passwords stored in an encrypted vault. The manager handles autofill across browsers and devices, so day-to-day use requires remembering only a single master passphrase. This structurally eliminates credential reuse – the primary vector for account compromise.
how_to_do_it: |
  - Install the app and browser extensions, then set a strong master passphrase – ideally a random four-to-five-word phrase stored on paper in a safe location
  - Migrate accounts gradually: each time you log into a site, generate a new unique password through the manager and save it – most people complete migration within 2–4 weeks of normal browsing
  - Enable breach-alert monitoring so the manager flags accounts exposed in third-party data breaches, prompting you to rotate those passwords promptly
  - Consider enabling two-factor authentication on the password manager account itself for an additional layer of protection
success_looks_like: |
  - Every online account has a unique, randomly generated password that you could not recite from memory – and you never need to
  - Logging in anywhere takes one click or biometric scan rather than a recall-and-type routine
  - When a data breach is reported, you check the manager's alert, rotate one password, and move on – no cascading anxiety about which other accounts share the same credentials
common_pitfalls: |
  - Choosing a weak or memorable master passphrase defeats the purpose – a random multi-word phrase is far more secure than a complex single word with symbol substitutions
  - Installing the manager but never migrating existing accounts, leaving the old reused passwords in place alongside the new tool
  - Forgetting to back up the master passphrase – if lost, recovery is often impossible and the entire vault becomes inaccessible
description: |
  - Install a password manager (e.g. Bitwarden, free; or 1Password, ~$36/year) and import or manually add existing credentials; then generate a unique, high-entropy password for every account going forward
  - The manager stores credentials in an encrypted vault protected by a single master password or passphrase; browser and mobile extensions handle autofill, so day-to-day use requires no memory effort
  - [Research](https://www.security.org/digital-safety/password-manager-annual-report/) shows users with password managers are roughly half as likely to experience credential theft (17% vs 32% of non-users in the past year)
  - Setup takes one afternoon: install the app, configure browser extensions, migrate existing accounts by updating passwords one-by-one as you log in over the following weeks – a staged approach that avoids a single overwhelming session
  - Distinct from browser-built-in password saving: dedicated managers are cross-browser, cross-device, support secure sharing, and provide breach-alert monitoring
applicable_domains: ["digital-safety", "organisation", "systems"]

values:
  digital-safety.security:
    pbs: 8
    isr: 85
    uar: 65
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 75th–80th percentile – all accounts protected by unique, high-entropy passwords, eliminating credential-stuffing exposure across their entire account surface. Delta: ~40–45 percentile points, mapping to a major gain (PBS 8) on the subjective anchor.
      - [Analysis of 19 billion exposed passwords (2024–2025)](https://cinchops.com/password-leak-study-unveils-alarming-2025-trends-94-of-passwords-reused/) found 94% were reused or duplicated; a password manager structurally eliminates this vulnerability by making unique passwords effortless to generate and store.
      - [Security.org 2024 report](https://www.security.org/digital-safety/password-manager-annual-report/) documents users with password managers experiencing identity or credential theft at roughly half the rate of non-users (17% vs 32%), confirming the intervention delivers a major security uplift in practice.
      - Score stops at 8 rather than 10 because a password manager alone does not address phishing, device compromise, or absence of hardware security keys – a complete security posture requires additional measures.
    isr_reasoning: |
      - The mechanism is structurally reliable: once unique passwords are set and stored, credential-stuffing attacks on those accounts are neutralised regardless of breaches at third-party sites – this is a near-certain benefit for accounts that have been migrated.
      - The primary ISR gap is incomplete migration: [Bitwarden's World Password Day survey](https://bitwarden.com/resources/world-password-day-global-survey-full-report/) shows many users adopt a manager but continue reusing passwords for some accounts, meaning the credential-stuffing risk is reduced but not eliminated until migration is thorough.
      - [JumpCloud's password statistics](https://jumpcloud.com/blog/password-statistics-trends) report that 62% of workers still reuse passwords or close variants even when a manager is available, suggesting partial adoption undermines the full ISR – hence 85% rather than 95%+, reflecting that some users never fully migrate their entire account surface.
    uar_reasoning: |
      - [Security.org 2024 data](https://www.security.org/digital-safety/password-manager-annual-report/) shows only 36% of US adults use a password manager despite the tool being widely available and often free, indicating high abandonment or non-adoption post-awareness – reflecting significant drop-off between intent and sustained use.
      - [USENIX SOUPS 2025 longitudinal study](https://www.usenix.org/system/files/soups2025-cabarcos.pdf) found usability friction – particularly master password forgetting, cross-device sync issues, and extension conflicts – are the primary causes of discontinuation; these barriers are real even for motivated users.
      - [Emerald Publishing adoption study (2023)](https://www.emerald.com/insight/content/doi/10.1108/ics-09-2023-0156/full/html) identified trust concerns and perceived complexity as persistent adoption barriers; UAR of 65% reflects that once set up properly, most committed users do retain the tool long-term, but the initial setup phase produces meaningful drop-off.

  digital-safety.convenience:
    pbs: 6
    isr: 80
    uar: 65
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 65th–70th percentile – autofill eliminates manual credential entry and password-reset friction, and the cognitive load of remembering passwords across dozens of accounts is removed. Delta: ~30–35 percentile points, mapping to a meaningful gain (PBS 6) on the subjective anchor.
      - The convenience gain is real but bounded: browser autofill (already used by many) covers the simplest cases; the marginal gain of a dedicated manager is mostly in cross-browser/cross-device consistency, secure sharing, and breach alerts – meaningful but not transformative.
      - Score 6 rather than 8 reflects that initial setup and migration introduce a short-term convenience cost (learning the UI, updating passwords across dozens of accounts) that partially offsets the long-run convenience gain in the net assessment.
    isr_reasoning: |
      - For users who fully adopt and migrate, autofill works reliably across all major browsers and mobile platforms – the convenience benefit is near-universal among committed adopters.
      - A minority of users encounter friction with autofill on non-standard login forms, enterprise SSO portals, or apps with unusual authentication flows, which partially erodes the convenience benefit; ISR reflects this gap at 80%.
      - [Security.org 2024 report](https://www.security.org/digital-safety/password-manager-annual-report/) notes that 79% of password manager users report using free tiers (primarily browser-integrated or Bitwarden), suggesting the lower-friction options dominate – this population tends to have smoother autofill experiences, supporting an ISR of 80%.
    uar_reasoning: |
      - See digital-safety.security UAR – same intervention, same adherence profile.

  organisation.speed:
    pbs: 4
    isr: 75
    uar: 65
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 45th–50th percentile – login friction and password-reset interruptions are eliminated, reducing the organisational overhead of accessing tools and accounts. Delta: ~10–15 percentile points, mapping to a modest gain (PBS 4) on the subjective anchor.
      - Password resets and credential-hunting represent a small but recurring source of task-switching and interruption; eliminating these removes a class of friction from daily workflows, but the absolute time saving is modest (estimated minutes per week, not hours).
      - Score 4 rather than higher reflects that password friction is a minor component of overall organisational speed – the dominant gains are in digital-safety.security, and the organisational benefit is secondary and incremental.
    isr_reasoning: |
      - Autofill reliably eliminates credential-lookup time once the vault is populated; the mechanism is direct and deterministic for migrated accounts.
      - ISR is capped at 75% because partial migration (common per the security domain evidence) means some login friction persists; incomplete adoption limits the organisational benefit proportionally.
      - No direct studies measure password manager effects on organisational speed specifically; this score is extrapolated from the convenience and security evidence base, hence low confidence.
    uar_reasoning: |
      - See digital-safety.security UAR – same intervention, same adherence profile.

  systems.simplicity:
    pbs: 5
    isr: 80
    uar: 65
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 55th–60th percentile – a single vault replaces a heterogeneous mix of browser-saved passwords, sticky notes, reused passwords, and mental mnemonics with one unified, auditable system. Delta: ~20–25 percentile points, mapping to a meaningful gain approaching PBS 5–6; conservative score of 5 given the subjective nature.
      - The systems simplification is genuine: one master credential, one interface, one audit log across all accounts – this reduces the surface area of credential management substantially.
      - Score 5 rather than 6 reflects that the vault itself is an additional system to maintain (updates, backup codes, master password management), which partially offsets the simplification gain.
    isr_reasoning: |
      - For users who commit to a single manager and migrate consistently, the simplification benefit is reliable – the mechanism is structurally sound and the tooling is mature.
      - ISR of 80% reflects that some users maintain parallel systems (e.g. browser-saved passwords alongside the manager), which undermines the simplification benefit; full consolidation requires deliberate effort.
      - Evidence is indirect – no studies directly measure systems simplicity as an outcome of password manager adoption; extrapolated from convenience and adoption research.
    uar_reasoning: |
      - See digital-safety.security UAR – same intervention, same adherence profile.

