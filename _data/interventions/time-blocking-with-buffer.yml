prerequisites:
  - "Access to a calendar tool – paper planner, phone, or computer-based – that allows scheduling specific time blocks"
  - "Sufficient autonomy over your daily schedule to actually block time, rather than having every hour assigned by external requests"
  - "Basic ability to estimate how long tasks take – not perfect calibration, but enough to distinguish a 30-minute task from a 3-hour one"

