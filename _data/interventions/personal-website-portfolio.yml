evaluated_at: 2026-04-26
evaluated_by: claude-opus-4-7
name: "Building a Personal Website or Portfolio"
what_it_is: |
  A one-time setup of a simple personal website or portfolio – typically a single domain hosting a homepage, an "about" page, and a curated selection of work, projects, or writing – that functions as a passive professional shopfront. Unlike active networking, the site sits in the background, surfacing whenever someone Googles you, lands on your CV, or follows a link from a talk or article. It compounds in value over years: every client, recruiter, or collaborator who pre-reads the site arrives in conversation already informed about who you are and what you do.
how_to_do_it: |
  - Choose a simple platform matched to your technical comfort: Carrd, Notion-as-website, or a Squarespace single page for non-coders; GitHub Pages, Hugo, or Jekyll for developers comfortable with Markdown and Git
  - Buy a memorable domain (yourname.com is the canonical choice; cost is roughly $10–15/year) and point it at the host
  - Build the minimum viable shopfront in one weekend: a clear one-line description of what you do, a short bio, three to five pieces of representative work or writing with brief context for each, and a way to contact you
  - Schedule a calendar reminder every 6–12 months to refresh the work shown and update your bio – many people build a site once and never return, which slowly degrades its credibility
  - Link the site from your CV, email signature, LinkedIn, and any conference or talk bios so it actually gets traffic; a portfolio with no inbound links sees almost no visits
success_looks_like: |
  - When someone Googles your name, your site is the first or second result and gives them an accurate, current picture of your work in under 60 seconds
  - You get occasional unsolicited inbound enquiries – job leads, speaking invitations, freelance briefs, or coffee chats – from people who pre-read the site before reaching out
  - Updating it is a low-friction quarterly or biannual chore, not a quarterly project, because the underlying structure is simple
common_pitfalls: |
  - Building a beautiful site with no content – the visual chrome ends up being the message, which signals a lack of substance
  - Choosing a heavyweight platform (custom Gatsby build, complex CMS) when a single static page would do, then never updating because every change requires a deploy
  - Pointing nothing at the site – without links from your CV, LinkedIn, talks, and emails, traffic stays near zero and the conversion-to-opportunity pathway never activates
  - Treating it as a finished artefact rather than a living shopfront – sites that show 2019 as the most recent project actively damage credibility per [data on inactive sites](https://www.claytonncwebdesign.com/83-of-websites-are-abandoned-why-ongoing-maintenance-matters-more-than-ever-for-clayton-triangle-businesses/)
description: |
  - A one-time setup of a personal website or portfolio – ranging from a single-page Carrd or Notion site to a fully custom Hugo or Jekyll build – that showcases your work, skills, projects, or writing as a passive professional shopfront
  - Setup typically takes 4–15 hours depending on platform choice; ongoing cost is $10–100/year for domain plus hosting, and updates are intermittent (target every 6–12 months)
  - [Recruiter survey data](https://www.careerbuilder.com/advice/blog/social-media-survey-2017) shows 70% of employers Google candidates and 57% are less likely to interview someone they cannot find online; [a hiring-manager study](https://hover.blog/online-portfolio-site-importance/) found 71% agreed portfolio quality influences hiring decisions, with 86% saying they will visit a portfolio when given the option
  - Most relevant for knowledge workers, freelancers, job seekers, designers, and creators; effects are highly context-dependent and conversion to opportunities is bounded by traffic, which depends on linking the site from your CV, LinkedIn, talks, and other surfaces
  - Distinct from active networking – this is a passive shopfront that works while you sleep, but only for people who already have a reason to look you up
applicable_domains: ["career-planning", "networks", "current-work", "self-awareness"]

values:
  career-planning.advancement:
    pbs: 5
    isr: 35
    uar: 70
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (~1 warm contact in target field, per the linear anchor). After successful adherence with a site that actually attracts traffic, plausibly 2–4 warm contacts emerge over a few years from inbound enquiries that convert. Delta: ~1–3 contacts.
      - The anchor is linear with anchor_max = 50: PBS = 10 + log₂(2/50) = 10 − 4.64 = 5.4, rounding to 5. The site is a passive lead generator, not a relationship-builder; it surfaces opportunities but the contact must still be cultivated through follow-up.
      - [Hiring manager interviews](https://www.themuse.com/advice/can-a-personal-website-help-your-job-search-what-6-hiring-managers-really-think) report cases of "absolutely" hiring someone because of a strong personal site, but these tend to be one-off conversion events rather than broad network expansion.
    isr_reasoning: |
      - Roughly 80% of business websites fall into the "inactive zone" with no meaningful traffic per [analyses of website maintenance](https://www.claytonncwebdesign.com/83-of-websites-are-abandoned-why-ongoing-maintenance-matters-more-than-ever-for-clayton-triangle-businesses/), and conversion to actual opportunities is bounded by visibility.
      - [Freelancer survey data](https://themightymarketer.com/marketing-survey/) suggests websites are typically a credibility-confirming surface rather than a primary lead source – referrals and repeat business dominate, with sites playing a supporting role.
      - ISR of 35%: a meaningful minority of users will see at least one inbound contact materialise from the site over a 2–3 year horizon, but most users in stable corporate roles or with low external visibility see negligible advancement effect.
    uar_reasoning: |
      - This is a one-time setup with intermittent maintenance – the main adherence risk is failing to actually publish the site or letting it stagnate. [Maintenance research](https://www.claytonncwebdesign.com/83-of-websites-are-abandoned-why-ongoing-maintenance-matters-more-than-ever-for-clayton-triangle-businesses/) shows 60% of business sites haven't published new content in over six months.
      - UAR of 70%: most people who start the project complete a basic site, but a meaningful fraction abandon mid-build or never link it from anywhere, neutralising the benefit.
      - The low ongoing demand makes adherence easier than habit-based interventions, but the lack of immediate feedback (months can pass before any inbound enquiry) means motivation to refresh content is weak.

  networks.breadth:
    pbs: 5
    isr: 40
    uar: 70
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence with a site linked from talks, articles, and CV, plausibly reaching the 50th–55th percentile through occasional cold inbound from people in adjacent fields. Delta: ~15–20 percentile points, mapping to around score 5 on the subjective anchor.
      - A personal site lowers the friction for serendipitous connections – a stranger who reads your work can email you directly rather than needing a mutual contact. This expands the surface area for breadth, though depth must still be built through actual conversation.
      - [Hiring manager research](https://hover.blog/online-portfolio-site-importance/) shows 86% will visit a portfolio when given the option, indicating the site does meaningfully expand who can encounter your work.
    isr_reasoning: |
      - The breadth-expansion mechanism only fires when traffic exists. [Website inactivity data](https://www.claytonncwebdesign.com/83-of-websites-are-abandoned-why-ongoing-maintenance-matters-more-than-ever-for-clayton-triangle-businesses/) suggests roughly 80% of personal sites see negligible traffic, so the inbound mechanism activates for a minority.
      - For users who do link the site widely (CV, LinkedIn, talk bios, email signature), the conversion to occasional cold-inbound is reasonably reliable per [recruiter Google-search data](https://www.careerbuilder.com/advice/blog/social-media-survey-2017).
      - ISR of 40%: among users who properly link and maintain the site, roughly 4 in 10 see at least occasional unsolicited contact from new people in their field over a 2-year horizon.
    uar_reasoning: |
      - See career-planning.advancement UAR – same intervention, same adherence profile.

  current-work.engagement:
    pbs: 4
    isr: 50
    uar: 70
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, plausibly reaching the 40th–45th percentile through the modest engagement boost of having a curated public artefact of one's work. Delta: ~5–10 percentile points.
      - The act of selecting and presenting one's best work tends to renew identification with it; many people report a small but real lift in pride and ownership over their professional output after building a portfolio.
      - The engagement effect is bounded – the site does not change the daily texture of the job, only the framing of one's work-in-aggregate. PBS of 4 reflects a modest but real subjective gain rather than a transformation.
    isr_reasoning: |
      - The engagement effect is contingent on the site genuinely reflecting work the user values – for those in roles they find meaningful, curating a portfolio is a positive consolidation; for those in roles they dislike, it can highlight the mismatch and reduce engagement.
      - No direct research on portfolio-building and work engagement; this is extrapolated from the broader [literature on identity-relevant self-presentation](https://www.tandfonline.com/doi/full/10.1080/01972243.2023.2199418) which links professional online presence to perceived legitimacy and pride.
      - ISR of 50%: about half of adherents experience a meaningful (if small) engagement lift; the other half see little change or, in some cases, the site reveals dissatisfaction with current work.
    uar_reasoning: |
      - See career-planning.advancement UAR – same intervention, same adherence profile.

  current-work.rewards:
    pbs: 4
    isr: 35
    uar: 70
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence with a site that surfaces meaningful work to colleagues and external observers, plausibly reaching the 40th–45th percentile. Delta: ~5–10 percentile points.
      - A site that aggregates one's contributions makes them legible to people who would not otherwise see them – manager, skip-level, external collaborators – and this incremental visibility can compound into modest recognition gains.
      - PBS bounded at 4 because the site cannot improve the underlying quality of contributions; it only improves discoverability of work already done.
    isr_reasoning: |
      - The rewards pathway depends on people actually seeing and reading the site. Per [recruiter survey data](https://www.careerbuilder.com/advice/blog/social-media-survey-2017), 70% of employers and 57% of hiring managers do search for candidates online, so the discoverability mechanism is real for hiring contexts.
      - For internal recognition, the conversion is weaker – managers rarely Google their own reports, so the site mainly affects external recognition (job offers, speaking invitations, freelance briefs).
      - ISR of 35%: a minority of adherents see a meaningful rewards bump, concentrated among those whose work translates well to a public artefact (designers, writers, developers, freelancers) and who actively link the site.
    uar_reasoning: |
      - See career-planning.advancement UAR – same intervention, same adherence profile.

  self-awareness.psychological:
    pbs: 4
    isr: 60
    uar: 70
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, plausibly reaching the 40th–45th percentile through the clarifying exercise of articulating who you are and what you do for a public audience. Delta: ~5–10 percentile points.
      - Writing a one-line description of your work, choosing which projects represent you, and crafting a bio forces a kind of explicit self-modelling that many people otherwise avoid – it surfaces ambivalences about identity and direction.
      - The effect is bounded and one-off – the clarity gain happens primarily during the build, not during ongoing maintenance. PBS of 4 reflects a modest but genuine self-knowledge benefit.
    isr_reasoning: |
      - The clarifying mechanism is fairly reliable when users genuinely engage with the writing – choosing what to include and exclude is itself a values exercise.
      - However, many users default to generic templates and vague self-descriptions, bypassing the reflective benefit entirely; the mechanism only activates when the user writes their own copy thoughtfully.
      - ISR of 60%: a majority of users who complete the build experience some clarity gain, though the depth varies considerably with how seriously they take the exercise.
    uar_reasoning: |
      - See career-planning.advancement UAR – same intervention, same adherence profile.

resources:
  upfront_cost: 15
  upfront_cost_reasoning: "Domain registration ($10–15/year for the first year). Free hosting is widely available via GitHub Pages, Netlify, Cloudflare Pages, or the free tier of Carrd. Optional paid platforms (Squarespace at $16/month, custom themes at $30–60) are not required to begin effectively."
  ongoing_cost: 15
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "Domain renewal ($10–15/year). Hosting on GitHub Pages, Netlify free tier, or Cloudflare Pages remains $0. Users who choose hosted platforms (Squarespace, Webflow) will pay $100–200/year, but the lowest-cost viable option is just the domain."
  upfront_time: 6
  upfront_time_reasoning: "A basic single-page site on Carrd or GitHub Pages with a bio, three or four work samples, and contact info can be assembled in 4–8 hours including domain setup, content drafting, and linking from CV and LinkedIn. Custom builds (Hugo, Jekyll, Gatsby) can extend to 15+ hours."
  ongoing_time: 1
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Roughly 1 hour per month averaged over the year, concentrated in 1–2 refresh sessions of 4–6 hours every 6–12 months. Most months require nothing."

prerequisites:
  - "Basic computer literacy and ability to follow a tutorial – no coding required for Carrd or Notion-as-website paths"
  - "A small body of work, projects, writing, or skills worth showcasing – the site has nothing to display without content"
  - "Access to a payment method for domain registration (typically $10–15/year via Namecheap, Cloudflare, or Google Domains)"

flagged_domains:
  - domain: "communication"
    rationale: "Articulating one's work for a public audience builds written communication skills, particularly the discipline of compressing complex work into short, scannable summaries."
  - domain: "life-purpose"
    rationale: "The exercise of curating a public version of one's work surfaces questions about direction and what one wants to be known for, contributing modestly to clarity of purpose."
