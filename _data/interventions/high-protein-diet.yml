evaluated_at: 2026-03-23
evaluated_by: claude-opus-4-7
name: "High-Protein Diet"
what_it_is: |
  Eating around 100–150g of protein a day – the higher end if you are heavier or strength-training – spread across three or four meals of roughly 25–30g each. Protein sources are the usual suspects: lean meats, fish, eggs, dairy, lentils and other legumes, plus whey powder if you need a top-up. The reasons it works: protein keeps you full longer, costs more energy to digest than carbs or fat, and protects muscle when you are losing weight – so you lose more fat and less muscle than on a typical lower-protein diet. Pairs naturally with [Functional Training](/resources/intervention-database/functional-training) or [Progressive Strength Training](/resources/intervention-database/progressive-strength-training) if you want to build muscle as well.
how_to_do_it: |
  - Work out a daily target. A practical starting point for most people is 1.6 grams of protein per kilogram of bodyweight, or roughly 100g a day for someone around 70kg, 130g for someone around 80kg. Spread it across three or four meals of at least 25–30g each, instead of loading one meal.
  - When you plan a meal, pick the protein first and build the rest of the plate around it. Much simpler than trying to add protein to existing meals after the fact.
  - Batch-cook protein at the start of the week (grilled chicken, boiled eggs, cooked lentils) so a high-protein option is always available without daily cooking.
  - A food-tracking app can help for the first two or three weeks to calibrate your sense of portion sizes. Most people can then eyeball 30g of protein and stop tracking.
success_looks_like: |
  - Hunger between meals drops noticeably. You feel satisfied for three to four hours after eating, instead of reaching for a snack within ninety minutes.
  - Body shape changes visibly over eight to twelve weeks, even if the scale has not moved much – clothes fit differently. You are losing fat while keeping muscle.
  - Protein-rich meals become your defaults. Your go-to breakfast, lunch, and dinner all hit 25g or more without you having to think about it.
common_pitfalls: |
  - Leaning on protein shakes and bars at the expense of whole foods. Whole foods carry vitamins, minerals, and fibre that supplements miss, and they keep you full for longer per calorie.
  - Assuming high protein alone produces fat loss. Higher protein makes a calorie deficit easier to maintain, but you still need the deficit. If you eat more calories than you burn, the protein helps protect muscle but does not produce weight loss on its own.
  - Letting cost become a barrier. Protein-rich foods cost more per calorie than starches. Without budget-friendly choices (eggs, tinned fish, frozen chicken, lentils, beans), the approach gets unsustainable fast.
description: |
  - Daily protein intake of 1.2–2.2 grams per kilogram of bodyweight (roughly 100–150g for most adults), centred on lean meats, fish, eggs, dairy, legumes, and whey, with at least 25–30g per meal.
  - Three reinforcing mechanisms: protein costs roughly 20–30% of its energy to digest (carbs cost only 5–10%), it makes you fuller per calorie, and it protects muscle when you are eating less – which keeps your metabolism higher than it would be on a standard-protein diet.
  - [Meta-analysis of 24 trials](https://doi.org/10.3945/ajcn.112.044321) confirms that calorie-restricted high-protein diets produce more fat loss and better muscle retention than standard-protein diets at the same total calorie intake.
  - The body composition advantage – a better ratio of fat lost to muscle lost – is what makes this distinct from generic dieting. [Review evidence](https://doi.org/10.3945/ajcn.114.084038) suggests the fullness effect reduces voluntary calorie intake by around 441 kcal a day, making a deficit easier to stick to.
applicable_domains: ["body-image"]

values:
  body-image.fat_loss:
    pbs: 8
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 70th – 80th percentile on sustained fat loss outcomes. Delta: ~40 percentile points of improvement. [A 12-month RCT](https://pmc.ncbi.nlm.nih.gov/articles/PMC7539343/) comparing 1.6 g/kg/day protein versus 0.8 g/kg/day found the high-protein group lost 8.2 kg (~8 – 9% body weight) at 4 months; with some regain by 12 months, sustained loss sits at approximately 5 – 7%
      - [An RCT of adherent subgroups](https://pmc.ncbi.nlm.nih.gov/articles/PMC5644969/) found that participants who maintained >75% compliance with a high-protein prescription achieved 9.5% weight loss versus 5.8% for standard protein, confirming that successful adherents reach 5 – 10%
      - [A meta-analysis of 24 RCTs](https://doi.org/10.3945/ajcn.112.044321) shows high-protein groups achieve greater fat mass loss (0.87 kg more) with better lean mass retention (0.43 kg) – the effective fat loss for successful adherents is somewhat larger than scale weight suggests
      - On the logarithmic anchor, 6% sustained loss maps to 10 + log₂(6/25) = 7.94, rounding to PBS 8
    isr: 70
    isr_reasoning: |
      - High protein alone without a caloric deficit produces minimal weight change; the mechanism relies on satiety-driven spontaneous calorie reduction, which [review evidence](https://doi.org/10.3945/ajcn.114.084038) estimates at ~441 kcal/day – meaningful but not guaranteed to produce a deficit in all individuals
      - [Clinical evidence](https://pmc.ncbi.nlm.nih.gov/articles/PMC7539343/) shows that improvements in weight were detected only in those who adhered to the prescribed higher-protein regimen, whereas those who did not adhere showed no marked improvements – indicating the mechanism has a compliance threshold below which it fails
      - [A systematic review of 74 RCTs](https://pubmed.ncbi.nlm.nih.gov/22510792/) shows consistent directional benefits across populations, but heterogeneity between trials is substantial depending on whether a deliberate caloric deficit was also imposed – without one, response rates drop considerably
      - Score of 70 reflects that the underlying mechanisms (thermic effect, satiety, lean mass preservation) are well-characterised and reliable, but fat loss still depends on achieving an energy deficit, which high protein facilitates but does not guarantee
    uar: 40
    confidence: high
    uar_reasoning: |
      - [Long-term efficacy reviews](https://pubmed.ncbi.nlm.nih.gov/22411369/) find that prescribed protein intake differences between groups erode substantially over time; in studies targeting a 10%+ energy difference, actual achieved difference was only 2 – 5% after 6 months to 3 years
      - [RCT data](https://pmc.ncbi.nlm.nih.gov/articles/PMC7539343/) shows dropout rates of 30 – 55% across dietary intervention trials, with the high-protein group retaining slightly better (36% dropout vs 55% for standard protein in one 12-month study), likely due to greater satiety
      - Practical barriers include higher grocery costs (protein-rich foods cost more per calorie than carbohydrate staples), meal planning burden, social dining constraints, and taste monotony; [consumer surveys](https://www.empower.com/the-currency/life/protein-spending-research) show 52% report noticeably increased grocery spending when prioritising protein
      - Scored at 40% reflecting that roughly 4 in 10 people who attempt a sustained high-protein approach maintain meaningful adherence beyond 12 months, accounting for partial compliance and the self-selection effect in motivated populations

dose_response:
  metric: daily_protein_intake
  metric_label: "Daily protein intake in g/kg bodyweight"
  metric_help: "Average daily protein intake relative to bodyweight (g/kg), sustained across most days of the week. Variable intake (high one day, low the next) counts as the weekly average rather than the high point."
  scored_at_tier: 3

  tiers:
    - level: 0
      label: "Standard intake"
      criterion: "Under 1.0 g/kg/day on average (typical Western diet for someone not focused on protein)"
    - level: 1
      label: "Moderate"
      criterion: "1.0–1.3 g/kg/day sustained, with one or two meals hitting ~25g protein"
    - level: 2
      label: "Higher"
      criterion: "1.3–1.6 g/kg/day sustained, with most meals hitting 25g+ protein"
    - level: 3
      label: "High-protein"
      criterion: "1.6+ g/kg/day sustained (roughly 100g+ for a 70kg adult), spread across three to four meals of 25–30g each"

  value_templates:
    body-image.fat_loss: threshold

  rationale: |
    - Tier criteria anchor on the [meta-analysis dose-response evidence](https://doi.org/10.3945/ajcn.112.044321): the body-composition advantage (more fat lost, more lean mass retained) appears reliably at ~1.6 g/kg/day with at least 25–30g per meal for maximal muscle protein synthesis stimulation. The 1.0 g/kg threshold is roughly the minimum at which any protein-related satiety effect appears.
    - `threshold` for body-image.fat_loss because the muscle-protein-synthesis mechanism has a known biological minimum (~20–25g per meal to maximally stimulate MPS) and the body-composition advantage over standard-protein diets only emerges at ~1.6 g/kg/day per the [Wycherley meta-analysis](https://doi.org/10.3945/ajcn.112.044321). Below tier 2, the intervention provides little benefit beyond a generic calorie deficit; the distinctive fat-loss-with-lean-mass-retention pattern that justifies PBS 8 is a tier-3 outcome.

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No equipment or programme fees required. Optional purchases (food scale, meal prep containers, protein powder starter supply) could add $30 – 60 but are not strictly necessary."
  ongoing_cost: 40
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Incremental grocery cost of shifting from standard to high-protein diet. Lean meats, fish, and dairy cost more per calorie than grains and starches. Estimated at $8 – 12/week above baseline food spending, using budget sources such as chicken, eggs, canned tuna, and whey protein."
  upfront_time: 3
  upfront_time_reasoning: "Learning protein content of common foods, calculating personal protein targets, and planning initial meal templates. Most people can get oriented within 2 – 4 hours using free online resources."
  ongoing_time: 2
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Additional meal preparation time (batch cooking protein sources, portioning meals) and food tracking. High-protein meals often require more cooking than convenience carbohydrate-based options. Estimated at 15 – 20 minutes per day above baseline."

prerequisites:
  - "No kidney disease or other medical contraindication to increased protein intake (consult a primary care doctor if uncertain)"
  - "Access to affordable protein sources (grocery store with fresh or frozen meats, eggs, dairy, legumes, or protein supplements)"
  - "Basic nutrition literacy: ability to read food labels, estimate portion sizes, and track approximate daily protein intake"
  - "Cooking facilities and willingness to prepare meals, as high-protein convenience foods are limited and expensive"
