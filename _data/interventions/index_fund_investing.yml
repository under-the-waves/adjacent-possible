name: "Index Fund Investing"
description: "Regularly investing in broad-market index funds (such as global equity trackers, S&P 500 trackers, or total world funds) through a low-cost investment platform. The strategy involves consistent contributions via pound-cost averaging, minimal trading, and a long time horizon of 10+ years. SPIVA data consistently shows that 92-95% of actively managed funds fail to beat their benchmark index over 15 years, making passive index investing the evidence-backed default for retail investors. Historical annualised returns for global equity indices average 7-10% nominal (5-7% real) over multi-decade periods, though with significant short-term volatility."
applicable_domains: ["investing"]

values:
  investing.returns:
    pbs: 8
    pbs_reasoning: "Index fund investing delivers market-rate returns, which over long periods (20+ years) represent substantial wealth creation. Historical data shows global equity indices returning 7-10% annualised nominal returns. SPIVA research demonstrates that passive indexing outperforms 92-95% of active managers over 15 years, making it the highest-probability path to strong long-term returns available to retail investors. A PBS of 8 reflects that this is one of the most impactful things a typical person can do for investment returns -- only higher-risk strategies or exceptional skill could score higher."
    isr: 80
    isr_reasoning: "Over sufficiently long time horizons (15+ years), equity index funds have historically delivered positive real returns with high reliability. However, shorter timeframes introduce meaningful uncertainty -- the S&P 500 has experienced drawdowns of 30-50% that took 2-7 years to recover from. The ISR of 80 reflects high long-term reliability tempered by genuine short-to-medium-term uncertainty that affects many investors' actual experience."
    uar: 65
    uar_reasoning: "Index fund adherence is moderate. While the strategy is simple, behavioural challenges are substantial: Dalbar's annual studies consistently show the average equity fund investor underperforms the market by 3-4% annually due to buying high and selling low. During the 2008-09 crash, significant numbers of retail investors sold at or near the bottom. Vanguard estimates behavioural coaching alone is worth ~2% per year, implying that without it, many investors deviate from buy-and-hold. A UAR of 65 reflects that while many persist, a meaningful minority capitulate during drawdowns or chase performance."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "returns_level"
    anchor_description: "Optimal risk-adjusted investment returns consistently achieved over long time horizons"

  investing.risk:
    pbs: 5
    pbs_reasoning: "Index fund investing provides meaningful risk management through broad diversification across hundreds or thousands of securities, eliminating single-stock risk entirely. However, it does not address market-level risk -- a global index fund still experiences full drawdowns during crashes. The strategy is specifically designed to accept market risk in exchange for market returns, rather than actively managing downside exposure. A PBS of 5 reflects genuine but bounded risk management benefit."
    isr: 85
    isr_reasoning: "The diversification benefit of index funds is mathematically reliable and well-documented -- holding a broad index eliminates idiosyncratic risk with near-certainty. However, the strategy provides no protection against systematic market drawdowns (30-50% declines), which means the risk management is partial. The ISR of 85 reflects high reliability for the specific risk it addresses (concentration risk) tempered by the risks it deliberately accepts."
    uar: 70
    uar_reasoning: "Most index fund investors maintain their diversified position passively, which means the risk management benefit persists through inertia. However, during severe drawdowns some investors abandon the strategy entirely, converting paper losses into real ones. The UAR of 70 reflects that the majority sustain the risk management benefit but a meaningful minority capitulate during precisely the periods when diversification matters most."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "risk_level"
    anchor_description: "Comprehensive portfolio risk management with minimised downside exposure across all market conditions"

  investing.independence:
    pbs: 7
    pbs_reasoning: "Index fund investing is one of the most reliable paths to financial independence for retail investors. The combination of market-rate returns (7-10% nominal), low costs, and tax efficiency through ISAs and SIPPs compounds effectively toward FI milestones. For someone targeting a specific freedom number, passive indexing provides the highest-probability route to reaching it. A PBS of 7 reflects that this is a powerful FI-building intervention, though it does not address savings rate or spending -- only the investment returns component of the FI equation."
    isr: 75
    isr_reasoning: "Over sufficiently long time horizons (15+ years), equity index funds have historically delivered positive real returns that compound toward FI targets with high reliability. However, the timeline to FI depends heavily on savings rate and starting point, and sequence-of-returns risk can significantly affect when FI is actually achieved. The ISR of 75 reflects high directional reliability tempered by genuine uncertainty about timing."
    uar: 60
    uar_reasoning: "Maintaining a consistent index fund strategy oriented toward FI is genuinely difficult over the 10-20 year timescales typically required. Many investors lose focus on their FI target, redirect funds to consumption, or abandon the strategy during drawdowns. The UAR of 60 reflects that while a majority persist, the long timeframes involved mean a substantial minority deviate from their FI-oriented investment plan."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "independence_level"
    anchor_description: "Sufficient invested wealth to make paid employment entirely optional, with sustainable withdrawal rates across market conditions"

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "Opening an investment account (stocks and shares ISA, SIPP, or general investment account) is free with most UK platforms. No minimum investment is required on many platforms (e.g., Vanguard UK minimum is £100 lump sum or £25/month). The money invested is an asset transfer, not a cost."
  ongoing_cost: 5
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Platform fees typically range from 0.15-0.45% of assets annually (e.g., Vanguard UK charges 0.15%, iWeb charges a flat annual fee). Fund OCFs (Ongoing Charges Figures) for index trackers are typically 0.05-0.25%. On a £10,000 portfolio, total annual costs would be approximately £20-70, or roughly £2-6 per month. The £5/month estimate assumes a moderate portfolio size."
  upfront_time: 5
  upfront_time_reasoning: "Approximately 3-5 hours to research platforms, understand different account types (ISA vs SIPP vs GIA), select an appropriate fund or funds, open accounts, complete identity verification, and set up initial contributions. This includes time spent on basic financial education to understand the strategy."
  ongoing_time: 1
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Minimal ongoing time required for a passive strategy. Approximately 30-60 minutes per month to review portfolio performance, ensure contributions are processing, and rebalance if needed (most platforms offer automatic rebalancing). Annual tasks include ISA allowance management and tax-year planning."

prerequisites:
  - "Emergency fund of at least 3 months' essential expenses in an accessible savings account before investing"
  - "Stable income with disposable income available after essential expenses and emergency savings"
  - "Investment time horizon of at least 5 years, ideally 10+ years, for the money being invested"
  - "Basic understanding of investment risk, including the possibility of short-term losses of 30-50% during market downturns"
  - "Access to a UK investment platform and eligibility to open a stocks and shares ISA or other investment account"
