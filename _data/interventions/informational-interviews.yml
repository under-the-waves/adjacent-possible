name: "Informational Interviews"
description: "Structured conversations with professionals in fields or roles you are curious about, conducted to gather career intelligence rather than to ask for a job. Each interview typically lasts 20-30 minutes and covers the person's career path, daily responsibilities, industry trends, and advice for someone considering the field. A programme of 2-4 interviews per month over several months exposes you to a wide range of career possibilities, builds a professional network organically, and surfaces opportunities that never appear on job boards. Research by Kanar (2023) found that informational interviews significantly increase networking self-efficacy, and career services literature consistently identifies them as one of the highest-value activities for career exploration and positioning."
applicable_domains: ["career-planning"]

values:
  career-planning.clarity:
    pbs: 8
    pbs_reasoning: |
      - [Kanar (2023)](https://doi.org/10.1177/10690727221150185) demonstrated significant gains in networking self-efficacy and career clarity among students who completed informational interviews across two studies (n=90 and n=72).
      - Each conversation exposes the interviewer to real career trajectories, day-to-day realities, and industry-specific opportunities invisible through desk research alone. A programme of 10-15 interviews can move someone from vague aspiration to concrete, informed direction – approaching but not guaranteeing the anchor's score 10 of full confidence in a well-researched path.
      - [Crosby (2010)](https://doi.org/10.1002/j.2161-0045.2010.tb00035.x) found that experiential career exploration activities (including informational interviews) produced larger gains in career decidedness than purely self-directed research methods.
    isr: 85
    isr_reasoning: |
      - The mechanism is highly reliable: direct conversation with a practitioner almost always yields useful directional information. [Kanar (2023)](https://doi.org/10.1177/10690727221150185) showed consistent gains across both study samples.
      - The main risk factor is interview quality – poorly prepared questions or mismatched interviewees reduce value – but even mediocre interviews typically surface at least one useful insight about a field or role.
      - Career services data from [NACE surveys](https://www.naceweb.org/career-development/best-practices/) consistently report that students who complete informational interviews rate them as highly valuable, suggesting that the activity reliably delivers on its core promise when executed.
    uar: 55
    uar_reasoning: |
      - Career services professionals consistently report that fewer than half of students who learn about informational interviewing go on to conduct them regularly, per [NACE annual survey data](https://www.naceweb.org/career-development/best-practices/).
      - The primary barriers are social discomfort of reaching out to strangers, difficulty scheduling, and premature satisfaction after a small sample – all well-documented in [Wanberg, Kanfer & Banas (2000)](https://doi.org/10.1111/j.1744-6570.2000.tb00206.x) on job search behaviour and sustained effort.
      - The intervention requires ongoing initiative without external accountability structures, and the social effort compounds with each new outreach. [Kreemers et al. (2022)](https://doi.org/10.1016/j.jvb.2022.103781) found that proactive career behaviours decline sharply without structural support.

  career-planning.advancement:
    pbs: 8
    pbs_reasoning: |
      - A sustained programme of 2-4 interviews per month over 6-12 months generates 12-48 conversations. Even conservatively, converting half to warm contacts yields 6-24 contacts – landing squarely in the score 8 range (12-13 contacts) on the linear anchor, with successful practitioners exceeding this.
      - [UC Berkeley Extension career resources](https://extension.berkeley.edu/professional-development/career-management/) note that 70-80% of jobs are filled through networking rather than public postings, and informational interviews are the primary mechanism for building such networks from scratch.
      - Each conversation creates a qualitatively different connection from cold applications or LinkedIn requests – someone who knows your name, interests, and initiative, and who is likely to respond to future contact per [Granovetter's (1973)](https://doi.org/10.1086/225469) weak ties theory.
    isr: 85
    isr_reasoning: |
      - The network-building mechanism is well-established: showing genuine interest in someone's career creates goodwill and a memorable interaction. [Casciaro, Gino & Kouchaki (2014)](https://doi.org/10.1177/0001839214554990) found that relationship-building through authentic professional curiosity is perceived positively by both parties.
      - Research on professional networking consistently shows that people are willing to help those who have invested time in understanding their field, provided the interviewer follows up appropriately.
      - The success rate for converting informational interviews into useful professional relationships is high because the format inherently creates reciprocity and rapport – the interviewee feels valued and the interviewer demonstrates initiative.
    uar: 55
    uar_reasoning: |
      - Same adherence challenges as clarity: social effort of reaching out, scheduling, and following up is the primary barrier, per [Wanberg et al. (2000)](https://doi.org/10.1111/j.1744-6570.2000.tb00206.x).
      - Network-building benefits require sustained effort over months – a handful of interviews rarely builds enough density to generate opportunities. Many people stop before reaching the critical mass of contacts needed for meaningful career positioning.
      - [Van Hoye et al. (2009)](https://doi.org/10.1037/a0014975) found that networking intensity predicts outcomes but that most job seekers reduce networking effort over time, especially when early conversations do not produce immediate leads.

  career-planning.security:
    pbs: 5
    pbs_reasoning: |
      - Informational interviews contribute to career resilience indirectly by diversifying understanding of available options and building a broader professional network. On the subjective anchor (10 = highly adaptable with multiple viable options), this moves the needle modestly – awareness of alternatives is valuable but does not itself create portable skills or financial buffers.
      - [Fugate, Kinicki & Ashforth (2004)](https://doi.org/10.1016/j.jvb.2003.10.005) define employability as a psycho-social construct including career identity, personal adaptability, and social/human capital – informational interviews primarily develop the first and third components.
      - The resilience benefit is secondary to clarity and advancement – interviews primarily inform and connect rather than directly building the cross-domain competencies that drive true career security.
    isr: 85
    isr_reasoning: |
      - The resilience mechanism – broader awareness of options and a wider network to activate during career disruption – is reliable when enough interviews have been conducted across sufficiently diverse fields.
      - [Kossek, Roberts, Fisher & Demarr (1998)](https://doi.org/10.1177/014920639802400302) found that employees with broader professional networks reported greater career resilience and lower anxiety about job loss.
      - People who have explored multiple fields through informational interviews consistently report feeling less trapped and more confident about their ability to pivot, though this self-reported confidence has limited empirical validation as a predictor of actual career recovery speed.
    uar: 55
    uar_reasoning: |
      - Resilience-building through informational interviews requires the same sustained effort as clarity and advancement, with the added challenge that benefits are latent – value may not surface until a career crisis occurs.
      - Without immediate payoff, many people deprioritise this activity in favour of more urgent career tasks. [Klehe et al. (2011)](https://doi.org/10.1037/a0024914) found that proactive career behaviours are most common during active job search, not during stable employment when resilience-building would be most strategic.
      - The motivational challenge is compounded by the difficulty of conducting interviews across diverse fields (rather than concentrating on a single target area), which is necessary for the security benefit but feels less focused and productive.

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "Informational interviews are free. They are typically conducted over coffee (which you might buy, but this is optional and negligible) or via video call. No equipment, courses, or subscriptions are required to begin."
  ongoing_cost: 15
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Occasional coffee purchases when meeting in person, estimated at 2-3 coffees per month at approximately 5 GBP each. Video calls are free. No other recurring costs."
  upfront_time: 3
  upfront_time_reasoning: "Initial time to research target fields and roles, identify potential interviewees through LinkedIn or professional networks, craft an outreach template, and prepare a core set of interview questions. Most of this can be done in a single focused session."
  ongoing_time: 6
  ongoing_time_period: "month"
  ongoing_time_reasoning: "2-4 interviews per month, each requiring approximately 30 minutes of preparation, 30 minutes for the interview itself, and 15 minutes for follow-up notes and thank-you messages. Total of approximately 1.5 hours per interview, or 3-6 hours per month depending on frequency."

prerequisites:
  - "Basic professional communication skills for email outreach and in-person or video conversation"
  - "Access to LinkedIn or other professional networks for identifying potential interviewees"
  - "Enough career self-awareness to formulate meaningful questions about fields of interest"
