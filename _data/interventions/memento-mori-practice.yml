      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 55th–60th percentile – sustained mortality contemplation correlates with greater gratitude, prosocial orientation, and reported life satisfaction in non-clinical samples. Delta: ~20–25 percentile points.
