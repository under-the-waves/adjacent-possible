      - [Research on end-of-life reflection](https://pubmed.ncbi.nlm.nih.gov/16977425/) and [Vail et al. (2012)](https://journals.sagepub.com/doi/10.1177/1088868312440046) both support the link between mortality salience handled contemplatively and increased experienced meaning in everyday activity – the construct this value measures.
