  upfront_cost_reasoning: "The WeCroak app costs roughly $1 one-off, free alternatives exist (custom phone reminders, journal-based variants), and the Stoic and Buddhist variants require no purchase. A journal (~$5–10) is optional but not required to begin."
  ongoing_cost: 0
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "No recurring costs. The practice runs on free or one-off-cost tools and self-directed time."
  upfront_time: 1
  upfront_time_reasoning: "Approximately 30–60 minutes to choose a format, install or set up the chosen tool, and read a brief introductory text on the intended frame (Stoic, Buddhist, or contemporary) so the practice does not collapse into bare mortality salience."
  ongoing_time: 0.5
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Roughly 20–30 minutes per week: cumulative pauses on app reminders (a few minutes total), or one weekly journaling session of 15–20 minutes, or a monthly longer contemplation amortised across weeks. The minimum effective dose is contact with the contemplation several times per week."
prerequisites:
  - "No active acute grief, recent bereavement, or untreated death-anxiety disorder; sustained mortality contemplation interacts unpredictably with active mortality-related distress and should be undertaken with professional support in those contexts"
  - "Sufficient stability of mood and functioning to sit with confronting material; users with active suicidal ideation, severe depression, or unprocessed trauma should consult a clinician before starting"
  - "Baseline familiarity with at least one contemplative or reflective practice (journaling, meditation, structured prayer, or similar) – the intervention works through contemplation rather than exposure, and prior contemplative experience improves the chance of converting reminders into meaningful pauses"

