  - "Physical capability to lift roughly 15kg (a spare tyre) and to crouch beside the vehicle"
  - "Access to a flat surface and basic tool storage (boot, garage, or shed)"
  - "Ability to read the owner's manual and recognise when a problem exceeds DIY scope – distinguishing a slow puncture from sidewall damage, or a flat battery from a failing alternator"

