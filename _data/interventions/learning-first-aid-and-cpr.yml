  upfront_cost_reasoning: "American Red Cross and AHA Heartsaver First Aid CPR/AED courses are typically $70–$100 for a combined in-person certification. No equipment needs to be purchased."
  ongoing_cost: 80
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "Recertification is recommended every two years (~$70–$100 per recertification), averaging ~$40–$50 per year. Optional: free or low-cost refresher apps can supplement between formal recertifications at no cost. Conservative estimate uses ~$80/year to account for periodic recertification."
  upfront_time: 8
  upfront_time_reasoning: "Standard combined first aid and CPR/AED certification courses run approximately 7–9 hours including skill stations and assessment."
  ongoing_time: 0.5
  ongoing_time_period: "year"
  ongoing_time_reasoning: "Recertification every two years (~8 hours, or ~4 hours/year amortised). Semi-annual brief refreshers of 20–30 minutes each add a further ~1 hour/year."

prerequisites:
  - "Physical ability to kneel and perform sustained chest compressions for at least 2 minutes – modified instruction is available for those with physical limitations, but some upper-body function is required for effective CPR"
  - "Access to an in-person certified course with manikin practice (online-only courses are insufficient for practical skill acquisition)"
  - "Basic English comprehension or availability of a course in the user's language, as the assessment component is conducted verbally or in writing"

