  upfront_cost: 0
  upfront_cost_reasoning: "No materials, subscriptions, or services required. The practice is behavioural; optional reading on family-systems theory or assertiveness is freely available online."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring costs. Some users elect therapy to support the work, but this is not required for the intervention itself."
  upfront_time: 2
  upfront_time_reasoning: "Approximately two hours to map the existing pattern, decide calendar-level limits, identify predictable flashpoints, and draft and rehearse short scripts for the most likely scenarios."
  ongoing_time: 0.5
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Roughly 20 – 30 minutes per week on average – more before anticipated interactions (preparation, partner alignment), little to none during quieter periods. The cost is concentrated around contact, not continuous."

prerequisites:
  - "An ongoing relationship with the extended family member or members in question – the intervention reshapes existing contact rather than initiating new contact"
  - "Sufficient physical and financial independence from the family member to make limit-setting safe – users who are housing-, employment-, or care-dependent on a relative face risks the protocol cannot address"
  - "Basic capacity to tolerate short-term conflict without disproportionate distress – not comfort, but enough self-regulation to hold a position through predictable pushback"

flagged_domains:
  - domain: "children"
    rationale: "Parents who limit grandparent involvement on parenting choices, screen time, food, or discipline protect their parenting decisions from being chronically overridden, which improves both child outcomes and the parent's capacity to parent confidently."
