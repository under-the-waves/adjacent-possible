name: "Automated Savings"
description: "Setting up automatic transfers from current accounts to savings accounts on a fixed schedule, typically aligned with payday. This includes configuring standing orders, direct debits into ISAs or savings accounts, and using employer-based salary sacrifice schemes where available. The core principle is removing the decision point from each savings event, leveraging default bias and status quo effects documented extensively in behavioural economics. Research from Thaler and Benartzi's Save More Tomorrow programme and subsequent studies show that auto-enrolment raises participation from ~37% to ~94%, with remarkably high persistence rates due to the 'set and forget' nature of automated systems."
applicable_domains: ["saving"]

values:
  saving.security:
    pbs: 7
    pbs_reasoning: "Automated savings directly builds an emergency fund and financial buffer, which is the foundation of financial security. Research shows auto-enrolled savers accumulate 50-80% more in savings over 5 years compared to those relying on manual transfers. Building even 3-6 months of expenses as a buffer reduces financial stress by ~40% (CFPB Financial Well-Being Scale studies). Each PBS point represents roughly doubling of impact: a score of 7 reflects a substantial, life-changing improvement in financial security for most people starting from a low savings base."
    isr: 95
    isr_reasoning: "The mechanism is almost trivially reliable when implemented -- money moves automatically with no human decision required at each instance. The evidence base from 401(k) auto-enrolment research (Madrian & Shea 2001, Chetty et al. 2014) consistently shows near-universal effectiveness. The only failure mode is insufficient income to cover the transfers, which is a prerequisite issue rather than an intervention failure."
    uar: 92
    uar_reasoning: "Automated savings has among the highest adherence rates of any financial intervention precisely because adherence is the default. Vanguard's 2024 How America Saves report shows 94% participation persistence for auto-enrolled plans. Opt-out rates are typically only 5-10% in the first year and decline further over time. The status quo bias that usually works against good financial behaviour here works in its favour."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "security_level"
    anchor_description: "Complete financial security with fully funded emergency reserves and protection against income disruption"

  saving.growth:
    pbs: 5
    pbs_reasoning: "Automated savings contributes to wealth accumulation but the growth rate depends heavily on where the money is directed. In basic savings accounts with low interest rates, real growth after inflation is minimal. The primary contribution is consistent capital accumulation rather than compounding growth. A score of 5 reflects meaningful but moderate impact -- the habit of consistent saving is the foundation for growth, but the intervention alone does not optimise returns."
    isr: 90
    isr_reasoning: "The accumulation mechanism is highly reliable -- regular deposits will build capital predictably. However, the growth component (interest, returns) is subject to market conditions and the specific savings vehicle chosen. For basic savings accounts, the nominal growth is reliable but real returns may be near zero in high-inflation environments."
    uar: 92
    uar_reasoning: "Same adherence dynamics as saving.security -- automation removes the decision point, and status quo bias maintains the behaviour. Slightly higher than security because growth-oriented savers who see their balance increasing receive positive reinforcement."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "growth_level"
    anchor_description: "Optimal long-term wealth accumulation through disciplined saving and compound growth"

  saving.liquidity:
    pbs: 6
    pbs_reasoning: "Automated savings directly improves liquidity by consistently building accessible cash reserves. When directed to instant-access accounts, the intervention ensures a growing pool of funds available without penalties or delays. However, the liquidity benefit depends on where the automation directs funds -- transfers to locked-in vehicles like pensions or fixed-term accounts may increase total savings whilst reducing liquidity. A PBS of 6 reflects a strong positive impact on liquidity when configured for accessible accounts, tempered by the possibility of automation into less liquid vehicles."
    isr: 90
    isr_reasoning: "The mechanism for building liquid savings through automation is highly reliable -- regular transfers to accessible accounts predictably increase available funds. The main risk to liquidity is if the saver later moves accumulated funds into locked-in products, but the automation itself reliably builds an accessible buffer."
    uar: 90
    uar_reasoning: "Liquidity-focused savers benefit strongly from automation because accessible savings feel less 'locked away' than pension contributions or fixed-term deposits. The instant-access nature of the savings reduces the psychological friction that causes some people to cancel automated transfers. The UAR of 90 reflects that automation into liquid accounts is exceptionally sticky."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "liquidity_level"
    anchor_description: "Fully accessible savings with no penalties, lock-in periods, or delays when funds are needed"

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "Setting up standing orders and direct debits is free with all UK current accounts. No financial products need to be purchased. If opening a new savings account or ISA, this is also free."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "The savings themselves are not a cost -- they are a transfer of assets from one account to another. There are no fees for maintaining standing orders or basic savings accounts in the UK. The money saved remains the individual's asset."
  upfront_time: 2
  upfront_time_reasoning: "Approximately 1-2 hours to review income and expenses, determine an appropriate savings rate, open any necessary accounts (savings account, ISA), and configure standing orders or direct debits. May take slightly longer if setting up salary sacrifice through an employer."
  ongoing_time: 0.5
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Minimal ongoing time required -- perhaps 15-30 minutes per month to review balances, ensure transfers are processing correctly, and adjust amounts if income or expenses change. The entire point of automation is to minimise ongoing time investment."

prerequisites:
  - "Stable income sufficient to cover essential expenses with a margin available for saving"
  - "A current account with online banking and the ability to set up standing orders or direct debits"
  - "Basic understanding of available savings vehicles (instant access accounts, ISAs, workplace pensions) and their trade-offs"
  - "Willingness to commit to a specific savings amount or percentage of income, even if initially small"
