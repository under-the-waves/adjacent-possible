prompt_sha: bcfbcf8
name: "Yoga"
what_it_is: |
  Regular practice of physical postures (asanas), breathing techniques (pranayama), and mindful attention, typically across 2–4 sessions per week of 30–90 minutes. Common styles range from gentle (Yin, restorative Hatha) through balanced (Iyengar) to physically demanding (Vinyasa, Ashtanga, power). The integration of movement, breath, and present-moment attention distinguishes yoga from both pure strength or aerobic training and from seated [Meditation](/resources/intervention-database/meditation).
how_to_do_it: |
  - Try 2–3 different styles before committing – style match is one of the strongest predictors of both enjoyment and long-term adherence; a Vinyasa class and a Yin class are almost different activities
  - Many people find that starting with a beginner class series, instructor-led video, or app builds better foundational habits than self-directed practice, since alignment cues and breath pacing are hard to self-teach
  - You may find that anchoring practice to a consistent time slot (early morning for energy and routine, evening for wind-down) helps the habit stick; 20–30 minute home sessions on non-class days maintain momentum
  - Treat the breathwork as load-bearing rather than ornamental – the slow, extended-exhale breathing is what drives much of yoga's stress-reduction effect, and it is easy to neglect when concentrating on postures
success_looks_like: |
  - You notice meaningful gains in flexibility and balance within 3–4 weeks and can hold poses that were initially inaccessible
  - The breath pattern starts to influence how you handle stress outside sessions – slower, longer exhales emerge automatically in tense moments
  - You can run a satisfying 20–30 minute session on your own when needed, without relying solely on scheduled classes or videos
common_pitfalls: |
  - Choosing a style that does not match your temperament (e.g. restorative yoga when you want physical challenge, or power yoga when you want stress relief) and concluding that yoga is not for you
  - Pushing into pain to achieve photogenic postures – yoga injuries cluster in shoulders, lower back, hamstrings, and wrists, and are most common when ego overrides bodily feedback
  - Treating yoga as purely physical exercise and skipping the breath and attention elements, which strips out the mechanisms responsible for most of the mental-health benefits
description: |
  - Regular yoga practice combines physical postures, breathwork, and mindful attention across 2–4 sessions per week of 30–90 minutes, with styles ranging from gentle (Yin, restorative Hatha) to physically demanding (Vinyasa, Ashtanga, power)
  - [Meta-analytic evidence](https://doi.org/10.1177/2047487314523132) shows yoga reduces cardiovascular risk factors (systolic blood pressure by roughly 5 mmHg, plus modest reductions in lipids, glucose, and weight), with benefits comparable to other moderate exercise
  - [A noninferiority RCT](https://www.acpjournals.org/doi/10.7326/M16-2579) found a 12-week manualised yoga programme produced equivalent improvements to physical therapy for chronic low back pain, with effects sustained at one year
  - [Anxiety meta-analyses](https://onlinelibrary.wiley.com/doi/10.1002/da.22762) report small-to-moderate effect sizes (SMD ≈ −0.43 vs no treatment) for elevated, non-clinical anxiety, alongside modest depression effects
  - [A review of 168 yoga RCTs](https://doi.org/10.1371/journal.pone.0159665) found a dropout rate of only 11.4% – exceptionally low for an exercise intervention – making yoga one of the more adherence-friendly active practices
applicable_domains: ["fitness", "body-image", "mental-health", "mindfulness", "sleep"]

values:
  fitness.health:
    pbs: 6
    isr: 70
    uar: 70
    confidence: high
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~55th percentile after sustained practice. Delta: ~20 percentile points, mapping to roughly 1 year of additional healthy lifespan on the 15-year anchor.
      - [Cramer et al. 2014](https://doi.org/10.1177/2047487314523132) meta-analysis of 37 RCTs found yoga reduced systolic blood pressure by ~5 mmHg, diastolic by ~5 mmHg, plus modest reductions in lipids, body weight, and HbA1c – a cardiovascular risk profile comparable to walking or light aerobic exercise.
      - On the log anchor, 1 year ≈ 10 + log₂(1/15) = 6.1, rounding to 6. Score is held below pure aerobic/resistance training because yoga delivers a weaker cardiovascular and bone-density stimulus, even though it adds flexibility and stress-pathway gains the others lack ([Lauche et al. 2016](https://doi.org/10.1016/j.ypmed.2015.10.003)).
    isr_reasoning: |
      - Across [the Cramer 2014 meta-analysis](https://doi.org/10.1177/2047487314523132), the majority of adherent participants showed measurable cardiometabolic improvement, with consistent direction of effect across blood pressure, lipid, and glycaemic outcomes.
      - Flexibility and chronic-pain improvements are especially reliable: [a Cochrane review of yoga for low back pain](https://doi.org/10.1002/14651858.CD010671.pub2) found small-to-moderate function and pain benefits with high consistency across trials.
      - The remaining ~30% of non-responders cluster among those practising at low intensity, in styles mismatched to the outcome (e.g. Yin for blood pressure), or with health conditions yoga's stimulus is too gentle to meaningfully shift.
    uar_reasoning: |
      - [Cramer et al. 2016](https://doi.org/10.1371/journal.pone.0159665), pooling 168 RCTs, found a yoga-group dropout rate of only 11.4% – substantially better than the ~50% benchmark for general exercise interventions.
      - Trials longer than 12 weeks showed modestly higher dropout (15.2%), and class attendance among completers averaged 77% – still strong by exercise-research standards.
      - Real-world adherence is supported by low injury risk relative to intensity, the home-practice option with apps and YouTube classes, and the dual physical-plus-stress-relief reinforcement loop that survives bad-mood days when pure exercise often does not.

  fitness.performance:
    pbs: 5
    isr: 70
    uar: 65
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~50th percentile on a general fitness test battery. Delta: ~15 percentile points, dominated by flexibility, balance, core stability, and bodyweight muscular endurance rather than maximal strength or VO2max.
      - [A review of yoga and physical fitness](https://doi.org/10.1089/acm.2009.0044) shows reliable gains in flexibility, balance, and muscular endurance in previously sedentary populations, with smaller and inconsistent effects on cardiorespiratory fitness and maximal strength.
      - The fitness anchor maps performance to percentile rank on a general test; yoga moves a sedentary person clearly above their starting point, but the bodyweight-only loading caps where it can take them. Score 5 sits between "average" (6) and "well below average" (4) on the anchor and reflects a meaningful but bounded improvement.
    isr_reasoning: |
      - Flexibility and balance improvements are among the most reliable findings in the yoga literature, with ~70–80% of adherent participants showing measurable gains in goniometric and balance tests ([Roland et al. 2011](https://doi.org/10.1177/1559827611423348)).
      - Strength and cardiovascular adaptations are less reliable: [a meta-analysis of yoga vs other exercise](https://pubmed.ncbi.nlm.nih.gov/26561529/) found yoga underperformed structured aerobic and resistance training on those outcomes.
      - Performance ISR is most consistent when yoga complements another modality; as a standalone, response rate drops because the stimulus is style-dependent and often sub-threshold for strength gains.
    uar_reasoning: |
      - See fitness.health UAR – same intervention, same adherence profile, with a small downward adjustment because performance-focused practitioners are more likely to defect to weights or running when progress on those metrics stalls ([Cramer et al. 2016](https://doi.org/10.1371/journal.pone.0159665)).

  fitness.enjoyment:
    pbs: 7
    isr: 75
    uar: 70
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (below-average enjoyment of physical activity). Endpoint: ~70th–75th percentile for those who find a style they like. Delta: ~35–40 points – a major gain on the subjective anchor.
      - The integration of movement, breath, and attention gives yoga a distinctive intrinsic-reward profile: practitioners commonly describe sessions as restorative rather than depleting, which is unusual for physical activity.
      - Held at 7 rather than 8: yoga lacks the play, novelty, and adventure dimensions of outdoor sport, climbing, or team activities, and the long flat tail of people who find it boring or uncomfortably spiritual is real.
    isr_reasoning: |
      - The exceptionally low 11.4% RCT dropout rate ([Cramer et al. 2016](https://doi.org/10.1371/journal.pone.0159665)) is itself indirect evidence of high enjoyment reliability: participants who do not enjoy an exercise modality generally leave.
      - Style mismatch is the main failure mode – someone wanting intensity placed in restorative practice, or vice versa, often concludes "yoga is not for me" rather than "this style is not for me" ([Ross & Thomas 2010](https://doi.org/10.1089/acm.2009.0044)).
      - Roughly 75% of adherent practitioners report genuine enjoyment rather than mere tolerance; most non-enjoyers self-select out within the first month.
    uar_reasoning: |
      - See fitness.health UAR. Enjoyment-driven practitioners cluster on the higher end of that adherence distribution: high subjective enjoyment is the strongest single predictor of exercise persistence ([Rhodes & Kates 2015](https://doi.org/10.1007/s12160-015-9704-5)).

  body-image.fat_loss:
    pbs: 5
    isr: 30
    uar: 55
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~45th–50th percentile. Delta: ~10–15 points, equivalent to roughly 1–1.5% body weight sustained loss for those who respond.
      - [A systematic review of 30 trials](https://doi.org/10.1016/j.ypmed.2016.03.013) (n ≈ 2,173) found yoga produced a ~3.5 kg weight reduction vs usual care in overweight and obese subgroups, but no significant effect in the overall population.
      - On the log anchor, 1.5% sustained loss ≈ 10 + log₂(1.5/25) = 5.9, rounding to 6 in optimistic conditions and 5 once the indirect mechanism (calorie burn is modest at 150–400 kcal/hour, so most of the effect runs through stress, sleep, and mindful eating) is taken into account.
    isr_reasoning: |
      - Energy expenditure for typical class styles is too low to produce a meaningful deficit on its own; the [Thind 2017 meta-analysis](https://doi.org/10.1016/j.ypmed.2016.03.013) found no significant weight effect in the overall population, with significant effects confined to overweight or obese subgroups practising consistently for 6+ months.
      - Style heterogeneity is a major source of variability: vigorous Vinyasa or Ashtanga classes plausibly help, while Yin or restorative styles produce essentially no caloric stimulus.
      - Roughly 30% of consistent yoga practitioners see meaningful body-composition change without concurrent dietary work, with the remainder either weight-stable or showing changes too small to read above measurement noise.
    uar_reasoning: |
      - Yoga's overall adherence is strong, but weight-loss-motivated practitioners specifically tend to defect when results are slow ([Cramer et al. 2016](https://doi.org/10.1371/journal.pone.0159665)); UAR of 55 sits below the general fitness.health figure to reflect this.
      - Many of those who stay successfully shift to broader wellbeing motivations, which is why UAR does not collapse further – the practice retains them even when weight goals slip.
      - The slow rate of body-composition feedback (months, not weeks) is a known reinforcement weakness compared with structured strength or calorie-tracking interventions.

  mental-health.stability:
    pbs: 6
    isr: 65
    uar: 70
    confidence: high
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~55th–65th percentile. Delta: ~25 percentile points – moving from "frequent distress" toward "occasional distress that resolves quickly" on the subjective anchor.
      - [Cramer et al. 2018 anxiety meta-analysis](https://onlinelibrary.wiley.com/doi/10.1002/da.22762) found small effects vs no treatment (SMD = −0.43) and large effects vs active comparators (SMD = −0.86) for elevated, non-clinical anxiety, alongside modest depression effects (SMD ≈ −0.35).
      - Stability PBS is held one point above pure [Meditation](/resources/intervention-database/meditation) (which scores 5 here) because yoga adds a somatic stress-inoculation pathway and pranayama – [slow breathing reliably activates parasympathetic tone](https://pmc.ncbi.nlm.nih.gov/articles/PMC6137615/) – on top of the attentional element.
    isr_reasoning: |
      - The Cramer 2018 meta-analysis specifically reports null findings for DSM-diagnosed anxiety disorders, indicating the effect is more reliable for elevated subclinical symptoms than for clinical populations.
      - Style and dose matter: [vigorous Hatha and Vinyasa trials](https://doi.org/10.1371/journal.pone.0204925) show stronger anxiolytic effects than gentle styles, suggesting style mismatch reduces the response rate.
      - Roughly 60–70% of adherent practitioners with elevated baseline distress report meaningful symptom reduction; non-responders are typically those whose distress stems from situational stressors or trauma not amenable to somatic-attentional practice.
    uar_reasoning: |
      - See fitness.health UAR – same intervention, same adherence profile. The mental-health-motivated subgroup tends to persist particularly well because the in-session relief is immediate and reinforces practice.

  mental-health.resilience:
    pbs: 5
    isr: 55
    uar: 70
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~50th percentile. Delta: ~15 percentile points – modest gain in handling everyday stressors on the subjective anchor.
      - Yoga trains equanimity through sustained physical discomfort (held postures), controlled breathing under exertion, and attentional return after lapses; this resembles low-intensity stress-inoculation training.
      - Held below [Meditation](/resources/intervention-database/meditation)'s resilience score (6): meditation targets the underlying acceptance and non-reactivity skill more directly, while yoga's resilience benefit is partly carried by mediated changes (better baseline arousal, better sleep) rather than by direct training of the recovery skill.
    isr_reasoning: |
      - The pathway is indirect – physical practice must build parasympathetic tone and equanimity, which then must transfer to real-world stressor recovery; each link introduces variability ([Pascoe et al. 2017](https://doi.org/10.1016/j.psyneuen.2017.08.008)).
      - Restorative and gentle styles likely under-deliver on the discomfort-tolerance ingredient most relevant to resilience, while vigorous styles deliver it more reliably; the average across styles dilutes the effect.
      - An estimated 50–60% of regular practitioners develop noticeably improved stress recovery; the remainder enjoy in-session calm without the transfer to real-world adversity.
    uar_reasoning: |
      - See fitness.health UAR.

  mental-health.flourishing:
    pbs: 4
    isr: 50
    uar: 70
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~45th percentile. Delta: ~10 percentile points – a modest gain on the flourishing anchor.
      - Yoga can produce flow during demanding styles ([Csikszentmihalyi explicitly identified Hatha yoga as a flow exemplar](https://psycnet.apa.org/record/1990-98262-000)) and adds a contemplative dimension uncommon in regular exercise.
      - PBS is held to 4 because flourishing gains in the yoga literature are smaller and less consistent than symptom-reduction effects, and the typical 2–4 sessions per week of practice is well below the doses associated with substantial wellbeing change in [contemplative dose-response work](https://pmc.ncbi.nlm.nih.gov/articles/PMC12336962/).
    isr_reasoning: |
      - Effect sizes for positive affect and life satisfaction in yoga RCTs are smaller and noisier than for anxiety symptom reduction; many trials report null effects on the wellbeing scales they include.
      - Flow requires challenge–skill balance, which is not reliably present in gentle home practice or beginner classes – reducing the proportion who experience the deeper flourishing benefit.
      - Roughly half of adherent practitioners report enhanced life satisfaction and positive affect; the rest experience yoga as functional (stress relief, flexibility) without it shifting their broader sense of meaning.
    uar_reasoning: |
      - See fitness.health UAR.

  mindfulness.clarity:
    pbs: 5
    isr: 55
    uar: 70
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (no formal practice). Endpoint: ~50th–55th percentile (~10–15 minutes of effective daily mindful attention via yoga sessions plus carry-over). Delta: ~15–20 points.
      - The mindfulness anchor is keyed to minutes of daily mindful attention. Two to four yoga sessions per week of ~45 minutes, with maybe half of session-time spent in genuinely attentive states, averages to roughly 10–15 mindful minutes per day – matching anchor score 6 of "10-15 minutes most days; some present-moment awareness during routine activities".
      - Held one point below the apparent anchor match, and below standalone [Meditation](/resources/intervention-database/meditation), because the physical component genuinely dilutes attentional density – the "minute of mindfulness while balancing in tree pose" trains a different and less transferable skill than the "minute of mindfulness watching the breath" of seated practice.
    isr_reasoning: |
      - The attentional benefits of yoga are real but smaller than those of equivalent time spent in seated meditation; head-to-head comparisons are scarce, but [reviews of contemplative attention training](https://pmc.ncbi.nlm.nih.gov/articles/PMC10902202/) show stronger effects for practices with more attentional density per minute.
      - Reliability depends heavily on the teacher's emphasis on breath and attention vs alignment and aesthetics; many studio and YouTube classes drift toward the latter.
      - Roughly half of adherent yoga practitioners develop mindfulness skills that transfer outside the mat; the remainder experience the practice as physical with mental quiet during sessions but limited carry-over.
    uar_reasoning: |
      - See fitness.health UAR. Yoga's adherence advantage over seated meditation (UAR 70 vs ~40 for meditation) is the main reason its mindfulness EBS is competitive despite lower per-minute density – more people actually do it for years.

  mindfulness.emotional:
    pbs: 5
    isr: 60
    uar: 70
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~50th–55th percentile. Delta: ~15–20 percentile points – moving toward "meaningful gain in emotional wellbeing from mindfulness practice" on the subjective anchor.
      - This domain captures the equanimity- and reactivity-related slice of mindfulness benefits, distinct from the symptom-reduction framing of mental-health.stability. Yoga reliably reduces moment-to-moment emotional reactivity in trial data via combined breath, attention, and somatic awareness.
      - Score 5 sits between "modest" (4) and "meaningful" (6) gains and reflects that yoga delivers a clear benefit here, even if seated practice may deliver a larger one per hour spent.
    isr_reasoning: |
      - The combined breath-and-attention mechanism is mechanistically robust: [slow-breathing meta-analysis](https://pmc.ncbi.nlm.nih.gov/articles/PMC6137615/) shows reliable HRV and parasympathetic effects, and [yoga RCTs](https://onlinelibrary.wiley.com/doi/10.1002/da.22762) show consistent direction of effect on anxiety-related reactivity measures.
      - Across yoga styles, response rate is fairly even because almost every style includes some breathwork and attentional cueing, even if intensity varies.
      - Approximately 60% of adherent practitioners report a noticeable shift in emotional reactivity; non-responders cluster among those whose teachers de-emphasise breath and attention or who skip those segments at home.
    uar_reasoning: |
      - See fitness.health UAR.

  sleep.comfort_experience:
    pbs: 5
    isr: 55
    uar: 70
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~50th percentile. Delta: ~15 percentile points on the subjective sleep-comfort anchor – a "modest-to-meaningful" gain in how restorative and pleasant sleep feels.
      - Yoga reduces pre-sleep arousal and rumination via parasympathetic activation and lower cortisol, which directly improves the felt quality of falling asleep even when objective sleep architecture changes little.
      - [A secondary analysis of the Saper 2017 trial](https://link.springer.com/article/10.1007/s11606-019-05329-4) found yoga improved self-reported sleep quality in adults with chronic low back pain, supporting the subjective-comfort pathway specifically.
    isr_reasoning: |
      - Sleep-quality improvements with yoga are plausibly mediated by stress reduction rather than direct sleep mechanisms; for those whose poor sleep is anxiety- or arousal-driven, the effect is fairly reliable.
      - For sleep problems driven by other causes (apnoea, circadian misalignment, pain unrelated to musculoskeletal tension), the benefit is much smaller or absent.
      - Roughly half of adherent yoga practitioners with poor baseline sleep report meaningful improvement in subjective sleep quality, with the rest unchanged.
    uar_reasoning: |
      - See fitness.health UAR. The sleep benefit emerges as a side effect of normal practice rather than requiring extra effort, so adherence is shared with the primary domains.

resources:
  upfront_cost: 30
  upfront_cost_reasoning: "A basic yoga mat ($20–30) is the only essential purchase. Comfortable existing clothing suffices. Optional blocks, straps, and bolsters ($20–40 total) help in some poses but are not required for beginners; many practitioners begin with no mat at all on carpet or a towel."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Yoga can be practised entirely free using YouTube channels (e.g. Yoga with Adriene), free apps, or self-directed practice. Optional studio drop-ins ($10–25 per class) or memberships ($50–150/month) accelerate skill development but are not prerequisites for benefits."
  upfront_time: 2
  upfront_time_reasoning: "Learning basic postures, breathing techniques, and class structure takes 1–2 hours via a beginner video series or introductory class. Yoga has one of the lowest barriers to entry among physical activities – meaningful practice can begin in the first session with guided instruction."
  ongoing_time: 3
  ongoing_time_period: "week"
  ongoing_time_reasoning: "A minimum effective dose for the physical and stress-pathway benefits is roughly 2–4 sessions per week of 30–60 minutes each, totalling about 3 hours weekly. Shorter daily sessions (15–20 minutes) maintain flexibility and stress-management gains but deliver less of the cardiometabolic benefit."

prerequisites:
  - "Sufficient mobility to get down to and up from the floor without assistance, or willingness to use chair-yoga modifications"
  - "Access to a quiet practice space large enough to extend arms and legs fully in all directions"
  - "Awareness of any musculoskeletal limitations (especially shoulders, lower back, hips, knees, wrists) so postures can be modified appropriately"

flagged_domains:
  - domain: "cognitive-skills.focus"
    rationale: "Sustained pose-holding combined with breath focus provides modest attentional training that may transfer to focus tasks; effect sizes likely small and indirect."
  - domain: "physical-safety.risk"
    rationale: "Improved balance and proprioception plausibly reduce some everyday injury risks, but the [SAGE 2025 trial](https://www.thelancet.com/journals/lanhl/article/PIIS2666-7568(25)00068-6/fulltext) found higher fall rates in an online Iyengar programme vs seated control in older adults, so the net safety effect is uncertain and style-dependent."
