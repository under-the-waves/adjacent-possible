name: "Yoga"
description: |
  - Combining physical postures (asanas), breathing techniques (pranayama), and meditation elements across 3-5 sessions per week of 30-75 minutes each, with styles ranging from gentle (yin, hatha) to physically demanding (ashtanga, vinyasa, power yoga)
  - Develops flexibility, balance, core stability, body awareness, and stress resilience, with noticeable improvements emerging within 2-4 weeks and significant benefits over 2-3 months of consistent practice
  - [Meta-analytic evidence](https://doi.org/10.1177/2047487314523132) shows yoga significantly reduces cardiovascular risk factors including blood pressure, blood lipids, and blood glucose, while [comparative research](https://doi.org/10.1089/acm.2009.0044) finds stress reduction effects that lower cortisol and inflammatory markers
  - Can be practised at home with minimal equipment (a mat and comfortable clothing) or in studio classes with instruction, contributing to [exceptionally low dropout rates](https://doi.org/10.1371/journal.pone.0159665) of around 11% across 168 trials
applicable_domains: ["fitness", "body-image"]

values:
  fitness.health:
    pbs: 6
    pbs_reasoning: |
      - Meta-analyses demonstrate yoga significantly reduces cardiovascular disease risk factors including blood pressure (systolic reduction of 5-10 mmHg), blood lipids, blood glucose, and body weight, corresponding to roughly 1 year of additional healthy life on the linear anchor ([Cramer et al. 2014, Eur J Prev Cardiol](https://doi.org/10.1177/2047487314523132))
      - Yoga improves flexibility, balance (reducing fall risk in elderly), chronic pain outcomes, and immune function markers; stress reduction effects lower cortisol and inflammatory markers ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))
      - Score 6 rather than 7: yoga provides lower cardiovascular stimulus than aerobic exercise and limited stimulus for bone density or muscular strength, placing it at the 1-year anchor rather than 3-4 years; health benefits are meaningful but modest compared to vigorous exercise ([Lauche et al. 2015, Prev Med](https://doi.org/10.1016/j.ypmed.2015.10.003))
    isr: 75
    isr_reasoning: |
      - Evidence base is substantial but heterogeneous due to wide variety of yoga styles, intensities, and study populations; meta-analyses note moderate quality of RCTs with small sample sizes as a limitation ([Cramer et al. 2014, Eur J Prev Cardiol](https://doi.org/10.1177/2047487314523132))
      - Health benefits for stress reduction and flexibility are highly reliable; cardiovascular risk factor improvements are consistently demonstrated but effect sizes are smaller than dedicated aerobic or resistance training ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))
      - Some high-profile findings (e.g. 81% CVD mortality reduction in one meditation study) are outliers that should be interpreted cautiously and inflate naive success rate estimates ([Lauche et al. 2015, Prev Med](https://doi.org/10.1016/j.ypmed.2015.10.003))
    uar: 70
    uar_reasoning: |
      - Yoga has notably high adherence rates: a meta-analysis of 168 RCTs found only 11.4% dropout from yoga groups, substantially better than the 50% general exercise benchmark ([Cramer et al. 2016, PLoS ONE](https://doi.org/10.1371/journal.pone.0159665))
      - For programmes longer than 12 weeks, dropout increased to 15.2% but remained well below other exercise interventions; class attendance among completers averages 77% ([Cramer et al. 2016, PLoS ONE](https://doi.org/10.1371/journal.pone.0159665))
      - Accessibility of home practice, low physical barrier, stress relief benefits, and meditative enjoyment all contribute to strong retention across demographics ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))

  fitness.performance:
    pbs: 5
    pbs_reasoning: |
      - Yoga develops flexibility, balance, coordination, and body awareness to a high degree, with core stability improvements benefiting posture and movement quality, but provides limited maximal strength, explosive power, or cardiovascular endurance development ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))
      - Studies show significant improvements in muscular endurance and flexibility in previously sedentary populations, but performance ceiling is limited to bodyweight capacities, placing dedicated practitioners around the 6th-15th percentile on general fitness tests ([Hagins et al. 2007, J Altern Complement Med](https://doi.org/10.1089/acm.2006.6355))
      - Score 5 reflects performance between the 6th percentile (score 6) and 2nd percentile (score 4): yoga's primary performance contribution is as a complementary practice for mobility and recovery rather than a standalone performance intervention ([Hagins et al. 2007, J Altern Complement Med](https://doi.org/10.1089/acm.2006.6355))
    isr: 75
    isr_reasoning: |
      - Flexibility and balance improvements from yoga are highly reliable and well-documented across populations and styles; core stability gains are consistent ([Hagins et al. 2007, J Altern Complement Med](https://doi.org/10.1089/acm.2006.6355))
      - Strength and power adaptations are limited to bodyweight capacities and less predictable than structured resistance training ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))
      - Performance benefits are most reliable when yoga serves a complementary role rather than as the primary training modality ([Lauche et al. 2015, Prev Med](https://doi.org/10.1016/j.ypmed.2015.10.003))
    uar: 65
    uar_reasoning: |
      - Performance-focused yoga practitioners have moderate-to-good retention as they experience steady improvement in flexibility and movement quality ([Cramer et al. 2016, PLoS ONE](https://doi.org/10.1371/journal.pone.0159665))
      - Those seeking significant strength or cardiovascular gains may become frustrated with yoga's limitations in these areas and supplement or replace it with more targeted training ([Rhodes et al. 2017, Br J Sports Med](https://doi.org/10.1136/bjsports-2015-095948))
      - The meditative and stress-management benefits provide secondary motivation that supports retention even when performance goals are modest ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))

  fitness.enjoyment:
    pbs: 8
    pbs_reasoning: |
      - Yoga offers a distinctive enjoyment profile: the integration of physical movement with breathwork and mindfulness creates a contemplative, almost ritualistic quality that feels rewarding beyond the physical effort itself, with progressive posture mastery providing clear skill progression
      - Adaptability is a major enjoyment strength: practice can be gentle or intense, solo or social, at home or in a studio, and integrated with personal philosophical or spiritual interests, meaning practitioners can tailor the experience to what they find most satisfying
      - Score 8 (highly enjoyable) rather than 9: the multi-layered satisfaction of body, breath, and mind is genuinely compelling, but yoga lacks the adventure, exploration, and adrenaline dimensions that push outdoor and problem-solving activities to a 9
    isr: 80
    isr_reasoning: |
      - Yoga's exceptionally low dropout rate in RCTs (11.4% across 168 trials) is among the best in exercise research, and enjoyment is consistently cited as a primary reason for continuation ([Cramer et al. 2016, PLoS ONE](https://doi.org/10.1371/journal.pone.0159665))
      - Enjoyment reliability depends significantly on style match and instructor quality: practitioners in styles mismatched to their preferences (e.g. someone wanting intensity placed in restorative yoga, or vice versa) report lower satisfaction, but the wide range of available styles means most people can find a good fit ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))
      - A minority find yoga boring, too slow, or uncomfortably spiritual, but this group is small enough that approximately 80% of those who practise regularly report genuine enjoyment rather than mere tolerance ([Cramer et al. 2018, Cochrane Database](https://doi.org/10.1002/14651858.CD012563.pub2))
    uar: 70
    uar_reasoning: |
      - Yoga's high enjoyment translates to strong long-term adherence; the 11.4% RCT dropout rate and 77% class attendance among completers are among the best in exercise intervention research ([Cramer et al. 2016, PLoS ONE](https://doi.org/10.1371/journal.pone.0159665))
      - Low injury risk, scalable difficulty, home practice option, and stress-relief benefits create multiple reinforcement pathways sustaining engagement ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))
      - The meditative and contemplative dimensions provide meaning beyond physical fitness that deepens commitment over time ([Cramer et al. 2018, Cochrane Database](https://doi.org/10.1002/14651858.CD012563.pub2))

  body-image.fat_loss:
    pbs: 4
    pbs_reasoning: |
      - [A systematic review of 30 trials](https://doi.org/10.1016/j.ypmed.2016.03.013) (n = 2,173; Thind et al. 2017) found that in overweight/obese subgroups, yoga reduced body weight by approximately 3.5 kg versus usual care – roughly 1 – 2% of body weight sustained over 12+ months
      - Yoga's caloric expenditure is modest (150 – 400 kcal/hour depending on style), meaning any weight loss among successful practitioners likely operates partly through stress-mediated cortisol reduction and improved eating behaviours rather than direct energy expenditure ([Caldwell et al. 2022, Obes Sci Pract](https://doi.org/10.1002/osp4.552))
      - In normal-weight populations, yoga produces negligible weight change; the 1 – 2% effect is confined to overweight/obese individuals practising consistently for 6+ months ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))
      - PBS 4 aligns with the 0.4% anchor: even among successful adherents, yoga's direct fat loss effect is small, sitting between the 0.1% (score 2) and 1.5% (score 6) anchors
    isr: 35
    isr_reasoning: |
      - Yoga's caloric burn is too low (150 – 400 kcal/hour) to create a meaningful energy deficit for most practitioners; weight loss depends on indirect pathways (stress reduction, mindful eating) that are inconsistent across individuals ([Caldwell et al. 2022, Obes Sci Pract](https://doi.org/10.1002/osp4.552))
      - The Thind et al. (2017) meta-analysis found no significant weight loss effect in the overall population – only in the overweight/obese subgroup, suggesting the majority of yoga practitioners see no meaningful fat loss ([Thind et al. 2017, Prev Med](https://doi.org/10.1016/j.ypmed.2016.03.013))
      - Weight loss effects are highly inconsistent across yoga styles: vigorous styles (vinyasa, power yoga) likely produce larger effects than gentle styles (yin, restorative), but few studies compare styles head-to-head, and most community yoga classes are not at vigorous intensity ([Ross & Thomas 2010, J Altern Complement Med](https://doi.org/10.1089/acm.2009.0044))
      - Estimated 30 – 40% meaningful response rate: most consistent yoga practitioners do not lose meaningful weight, as the energy expenditure is simply too low to drive fat loss without concurrent dietary change
    uar: 55
    uar_reasoning: |
      - Yoga has exceptionally low dropout rates (11.4% across 168 RCTs), suggesting strong general adherence, but weight loss-specific motivation may wane when results are modest ([Cramer et al. 2016, PLoS ONE](https://doi.org/10.1371/journal.pone.0159665))
      - Practitioners who begin yoga primarily for weight loss may shift to other modalities offering faster results, though those who stay often find broader wellbeing benefits that sustain practice ([Caldwell et al. 2022, Obes Sci Pract](https://doi.org/10.1002/osp4.552))
      - The accessibility of home practice and low injury risk support continued engagement, but the slow pace of weight change limits reinforcement for weight-focused practitioners ([Cramer et al. 2016, PLoS ONE](https://doi.org/10.1371/journal.pone.0159665))

resources:
  upfront_cost: 50
  upfront_cost_reasoning: "Yoga mat ($30-50) and comfortable stretchy clothing ($20). No specialised equipment required. Many practitioners begin with no mat at all, using carpet or a towel. Optional blocks, straps, and bolsters ($20-40) enhance practice but are not essential for beginners."
  ongoing_cost: 30
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Optional studio membership or class packages ($50-150/month for regular studio attendance). However, yoga can be practised entirely free at home using YouTube channels, free apps, or self-directed practice, reducing ongoing cost to zero. A moderate estimate assumes a mix of occasional studio classes and home practice."
  upfront_time: 2
  upfront_time_reasoning: "Learning basic postures, breathing techniques, and practice structure. An introductory class or beginner video series covers the essentials in 1-2 hours. Yoga has one of the lowest barriers to entry among physical activities, as practice can begin immediately with guided instruction."
  ongoing_time: 4
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Three to five sessions of 30-60 minutes per week. Shorter sessions (15-20 minutes) can be effective for stress management and flexibility maintenance, but 30+ minute sessions are recommended for meaningful physical and psychological benefits. Home practice eliminates travel time, improving time efficiency."

prerequisites:
  - "Sufficient mobility to get down to and up from the floor without assistance, or access to chair yoga modifications"
  - "Access to a quiet practice space with enough room to extend arms and legs fully in all directions"
  - "Willingness to engage with breathwork and mindfulness elements that accompany physical postures"
  - "Awareness of any musculoskeletal limitations that may require pose modifications, particularly for spinal, hip, or shoulder conditions"
