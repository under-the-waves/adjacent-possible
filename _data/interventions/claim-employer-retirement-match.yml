evaluated_at: 2026-05-04
evaluated_by: claude-opus-4-7
name: "Claim Employer Retirement Match"
what_it_is: |
  Setting your workplace retirement contribution to at least the level required to capture the full employer match. Employers commonly match 50–100% of employee contributions up to 3–6% of salary; failing to hit the match threshold leaves what is effectively a guaranteed 50–100% return on the marginal dollar on the table. The action is one-time: a 5–15-minute change in the workplace retirement plan portal raises the contribution percentage to the match threshold and the higher rate persists indefinitely. Carved out as a Quick Win from [tax-advantaged retirement account maximisation](/resources/intervention-database/retirement-account-maximisation), where capturing the match is identified as the single highest-leverage retirement-saving action.
how_to_do_it: |
  - Find your employer's match formula in the benefits portal or HR-provided summary plan description: typical formulas are "50% match on the first 6% of salary" or "100% match on the first 3%" – the specific match percentage and cap matter
  - Log into the retirement-plan portal and set your contribution percentage to at least the cap; if cash flow allows, set it higher (the additional contributions are tax-advantaged but unmatched)
  - Verify on your next payslip that the deducted contribution and employer match line items match what you expected; institutional payroll errors are rare but easy to catch immediately
  - Re-check after every salary raise: many plans contribute a fixed percentage rather than a fixed dollar amount, so the contribution scales automatically, but auto-escalation features can sometimes lapse with payroll changes
success_looks_like: |
  - Your workplace retirement contribution is at or above the match-cap percentage every pay period
  - The full employer match appears on each payslip as a separate line item
  - When you receive a salary raise, you immediately confirm the contribution is still capturing the full match
common_pitfalls: |
  - Leaving the contribution at the auto-enrolment default (often 3%) when the match cap is higher (often 5–6%) – common because auto-enrolment defaults rarely match the match cap exactly
  - Contributing in irregular lump sums rather than steady per-payslip percentages; some employer plans only match contributions on a per-payslip basis, so front-loading the year can lose the match on later periods
  - Stopping contributions to capture cash flow during a tight month and forgetting to restart; even one missed pay period costs the match for that period permanently
description: |
  - Setting your workplace retirement contribution to at least the employer-match cap; the marginal contribution captures a 50–100% immediate return that compounds for the rest of working life
  - [Vanguard's How America Saves (2024)](https://institutional.vanguard.com/content/dam/inst/iig-transformation/has/2024/pdf/has-insights/how-america-saves-report-2024.pdf) finds that a meaningful share of plan participants contribute below the match cap, leaving substantial guaranteed return on the table
  - The action is one-time and lives in the workplace retirement portal; the change persists unless the user actively reduces contributions
  - Distinct from broader retirement maximisation in scope: this is specifically the action of capturing the match, isolated as a fast Quick Win because of its outsized leverage
applicable_domains: ["investing", "saving"]

values:
  saving.growth:
    pbs: 7
    isr: 95
    uar: 85
    confidence: high
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Capturing the full match (typically 3–6% of salary in employer contributions on top of the user's own 3–6%) raises the user's effective gross savings rate by a substantial fraction. Endpoint: roughly the 65th–70th percentile.
      - PBS 7 reflects a major gain on the savings-rate anchor – the match is "free money" that effectively doubles the user's retirement contribution at the marginal margin. The change is durable because contributions persist as a percentage rather than a dollar amount.
      - Score not at PBS 8+ because the action only captures the match (not full retirement maximisation), and the absolute size depends on the employer's match formula.
    isr_reasoning: |
      - The match is contractually delivered by the employer once the contribution is set; ISR is near-deterministic. Failure modes are rare (payroll errors, vesting schedules that delay match availability) and quickly correctable.
    uar_reasoning: |
      - One-time setup with no ongoing user effort once configured. UAR of 85% reflects users who, having decided to act, complete the contribution change in a single session.
      - The remaining 15% captures users who set the contribution to a lower-than-match level (intending to "start small" and increase later) and never get around to raising it.

  investing.growth:
    pbs: 6
    isr: 95
    uar: 85
    confidence: high
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. The match-capture compounds in tax-advantaged retirement accounts for decades. On the long-term-wealth anchor, the user reaches roughly the 60th–70th percentile.
      - PBS 6 reflects a meaningful gain in long-term wealth from a one-time setup action; the gain compounds with all the standard market-return arguments for tax-advantaged retirement saving. Score below PBS 7 because the user still needs to direct the contributions sensibly (most plans default to a target-date fund, which is sufficient).
    isr_reasoning: |
      - See saving.growth ISR – same mechanism.
    uar_reasoning: |
      - See saving.growth UAR – same intervention, same adherence profile.

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No cost. The contribution change is free to make in the workplace retirement portal."
  ongoing_cost: 0
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "No ongoing cost beyond the contribution itself, which is a transfer of the user's own assets into their tax-advantaged retirement account. The employer's match is additional money on top, not a cost."
  upfront_time: 0.25
  upfront_time_reasoning: "About 10–15 minutes to find the employer's match formula in the benefits portal, log into the retirement plan, and update the contribution percentage. May take longer if the user needs to verify their match formula by reading the summary plan description."
  ongoing_time: 0.05
  ongoing_time_period: "year"
  ongoing_time_reasoning: "Roughly 5–10 minutes per year to verify on a payslip that the match continues to appear correctly, plus a re-check after each salary change."

prerequisites:
  - "Employment with an employer that offers a retirement-plan match (most US employers with 401(k) plans, most UK employers with auto-enrolment pensions, equivalent systems in other countries)"
  - "Sufficient cash flow to afford the user's matched contribution – typically 3–6% of salary; if cash flow doesn't permit this, the prerequisite isn't met until cash flow allows it"
