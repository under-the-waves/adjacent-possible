  upfront_cost_reasoning: "Free apps (Loop Habit Tracker on Android, iOS Reminders, Notion templates, Google Sheets) are sufficient. Paid apps such as Streaks ($5 one-off) or Habitica (free with optional subscription) add polish but no documented effectiveness advantage."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring cost required. Premium tiers of paid apps run roughly $3–5 per month but are optional."
  upfront_time: 1
  upfront_time_reasoning: "Approximately one hour to choose an app, install it, define three to five target habits as binary daily checks, and decide on the daily logging time and anchor."
  ongoing_time: 0.25
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Roughly 1–2 minutes per day to log, plus a 5–10 minute weekly review of the calendar to spot patterns. Total of approximately 15 minutes per week at a sustainable cadence."

prerequisites:
  - "A smartphone, tablet, or computer with the chosen tracking app installed; if using paper, a dedicated logbook in a fixed location"
  - "Identification of three to five specific, binary, daily habits to track – the user must know which behaviours they want to reinforce before the app can help"
  - "Basic comfort with daily app interaction; users who avoid notification-driven apps may prefer a paper or spreadsheet equivalent"

