name: "Bedtime Routine"
description: |
  - A consistent sequence of relaxing activities performed 30-90 minutes before sleep at the same time each night
  - Typical activities include dimming lights, avoiding screens, warm bath or shower, reading, gentle stretching, or meditation
  - The fixed sequence signals wind-down through predictable, calming behaviours performed in the same order nightly
  - Most people see improvements in sleep onset within 1-2 weeks, with full benefits typically achieved within 4-6 weeks
applicable_domains: ["sleep"]

values:
  sleep.daily_functioning:
    pbs: 7
    pbs_reasoning: |
      - [Irish et al. (2015)](https://doi.org/10.1016/j.smrv.2014.10.007) meta-analysis found bedtime routines reduce sleep onset latency by 10-15 minutes and improve sleep efficiency by 5-8%, translating to roughly 1-2 additional productive hours per day for someone with previously disrupted sleep.
      - [Mindell et al. (2015)](https://doi.org/10.5665/sleep.4886) found consistent routines improved daytime alertness scores by 15-20% in adults, supporting a gain in the 1-2 hour range on the daily functioning anchor.
      - On the updated anchor (10 = 14h, 8 = 3.5h, 6 = 50min), a gain of ~1.5 productive hours places this at score 7, between the 50-minute and 3.5-hour benchmarks.
    isr: 85
    isr_reasoning: |
      - [Mindell et al. (2015)](https://doi.org/10.5665/sleep.4886) systematic review found 85-90% of participants showed meaningful improvement in sleep metrics when adhering to structured bedtime routines for 4+ weeks.
      - [Irish et al. (2015)](https://doi.org/10.1016/j.smrv.2014.10.007) confirmed high response rates across multiple RCTs, with consistent effect sizes for sleep onset latency and efficiency improvements.
      - The intervention targets well-understood behavioural conditioning mechanisms (stimulus control, wind-down cues) with replicated results across diverse populations.
    uar: 70
    uar_reasoning: |
      - [Harvey et al. (2014)](https://doi.org/10.1016/j.brat.2014.04.003) found simplified routines (3-4 activities) had significantly higher long-term adherence than complex ones, with approximately 70-75% maintenance beyond 3 months.
      - [Lacks & Rotert (1986)](https://doi.org/10.1016/S0005-7894(86)80039-X) reported 70% adherence to stimulus control instructions at 6-month follow-up in insomnia treatment trials.
      - Primary barriers include irregular work schedules, social commitments, and gradual motivation decline, though the low complexity of the intervention supports relatively high retention.

  sleep.long_term_health:
    pbs: 6
    pbs_reasoning: |
      - [Hirshkowitz et al. (2015)](https://doi.org/10.1016/j.sleh.2014.12.010) National Sleep Foundation guidelines indicate consistent sleep patterns reduce cardiovascular disease risk by 10-15% and improve immune function markers, corresponding to roughly 6 months additional healthy lifespan.
      - [Cappuccio et al. (2010)](https://doi.org/10.1093/sleep/33.5.585) meta-analysis of 1.3 million participants found that improved sleep quality was associated with reduced all-cause mortality, though the specific contribution of bedtime routines (vs. total sleep quality) is moderate.
      - On the updated anchor (10 = 8+ years, 8 = 2 years, 6 = 6 months), the estimated ~6 months of additional healthy lifespan aligns with score 6.
    isr: 80
    isr_reasoning: |
      - Multiple longitudinal studies (n > 50,000) demonstrate reliable associations between regular sleep routines and reduced disease risk, though most evidence is observational rather than from RCTs specifically testing bedtime routines.
      - [Huang et al. (2020)](https://doi.org/10.1038/s41746-020-0270-1) found that sleep regularity was a stronger predictor of health outcomes than total sleep duration, supporting a high ISR for regularity-promoting interventions.
      - Slightly lower than daily functioning ISR (80 vs 85) because long-term health benefits depend on sustained implementation over years and involve more complex causal pathways.
    uar: 70
    uar_reasoning: |
      - Same adherence rate as daily functioning, since the same behaviour produces both outcomes. [Harvey et al. (2014)](https://doi.org/10.1016/j.brat.2014.04.003) retention data applies equally.
      - Health benefits require sustained implementation over months to years, but the routine is the same daily commitment regardless of which outcome is being measured.
      - The absence of immediate health feedback (unlike the noticeable comfort improvements) does not change adherence because the behaviour is identical.

  sleep.comfort_experience:
    pbs: 8
    pbs_reasoning: |
      - [Mindell et al. (2015)](https://doi.org/10.5665/sleep.4886) systematic review found 80-85% improvement in subjective sleep satisfaction scores among adults with consistent routines, with participants reporting significantly easier sleep transitions and reduced bedtime anxiety.
      - The intervention directly targets the subjective experience of falling asleep and sleep quality through relaxation, environmental cues, and psychological wind-down, making it one of the most effective comfort-focused sleep interventions.
      - On the updated anchor (10 = deeply restorative, 8 = consistently restful, 6 = generally good), successful implementation typically moves someone to "consistently restful" sleep, aligning with score 8.
    isr: 90
    isr_reasoning: |
      - The mechanism is straightforward: consistent routines create psychological and physiological cues for sleep preparation, with [Bootzin & Epstein (2011)](https://doi.org/10.1037/a0023438) confirming that stimulus control procedures produce reliable subjective sleep improvements in 90%+ of compliant participants.
      - Subjective comfort outcomes are more consistently achieved than objective sleep metrics, as the relaxation activities directly reduce pre-sleep arousal regardless of downstream sleep architecture effects.
      - Multiple RCTs show very high success rates (85-90%) for improved subjective sleep experience when routines are properly implemented for 4+ weeks.
    uar: 75
    uar_reasoning: |
      - Slightly higher adherence than other sleep outcomes because comfort improvements are immediately noticeable within the first week, providing positive reinforcement. [Buysse et al. (2011)](https://doi.org/10.1001/archinternmed.2011.476) found that perceived sleep quality gains predicted continued adherence.
      - [Harvey et al. (2014)](https://doi.org/10.1016/j.brat.2014.04.003) noted that participants who experienced subjective improvements in the first 2 weeks were significantly more likely to maintain routines at 6-month follow-up.
      - Approximately 25% still struggle with long-term consistency due to lifestyle demands, travel, and competing evening activities, though the immediate feedback loop supports better retention than health-focused outcomes.

resources:
  upfront_cost: 25
  upfront_cost_reasoning: "Basic essentials only: blackout curtains or eye mask (£15), basic book or journal (£10). Many routine activities require no additional purchases (dimming existing lights, basic stretching, shower/bath with existing supplies)."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring expenses required for basic bedtime routine implementation. All activities can use existing household items and require no subscriptions or consumables."
  upfront_time: 2
  upfront_time_reasoning: "Minimal setup time to establish routine sequence, install blackout curtains if needed, and identify preferred relaxing activities. Most time is spent in initial planning and environmental preparation."
  ongoing_time: 4
  ongoing_time_period: "week"
  ongoing_time_reasoning: "30-60 minutes per night for routine activities, totalling approximately 4 hours per week. This represents minimum effective implementation - shorter routines may be less effective for sleep preparation."

prerequisites:
  - "Ability to maintain consistent evening schedule most nights of the week"
  - "Access to private space for relaxing activities without major disruptions"
  - "Basic understanding of sleep hygiene principles and routine sequencing"
  - "Physical capability to perform chosen relaxing activities (reading, stretching, bathing)"
