prompt_sha: bcfbcf8
name: "Bedtime Routine"
what_it_is: |
  A consistent 30–60 minute pre-sleep ritual performed in the same order every night – typically dimming household lights, cutting off screens, light reading or stretching, hygiene routine, and going to bed at the same time. The focus is the routine itself as a behavioural cue for sleep onset, distinct from sleep hygiene generally. Complements [Blue Light Blocking](/resources/intervention-database/blue-light-blocking) and [Breathing Techniques](/resources/intervention-database/breathing-techniques) but operates through stimulus control rather than any single physiological lever.
how_to_do_it: |
  - Pick 3–4 simple activities and perform them in a fixed sequence every night – simplicity is what makes the routine sustainable
  - Anchor the routine to a fixed start time rather than a fixed bedtime; the wind-down period itself is what trains the sleep signal
  - Include at least one genuinely enjoyable activity (light reading, a warm drink, gentle music) so the routine feels like a reward
  - Dim household lights as the first step; sub-20 lux exposure in the hour before bed produces measurable circadian benefit per [field studies on home lighting](https://pmc.ncbi.nlm.nih.gov/articles/PMC4053688/)
success_looks_like: |
  - You feel noticeably drowsy by the end of the routine on most nights, rather than lying in bed waiting for sleep to arrive
  - Sleep onset becomes faster and more predictable – falling asleep within 15–20 minutes of lights-out on most nights
  - The sequence becomes automatic within roughly 2 months, in line with [habit formation research](https://pmc.ncbi.nlm.nih.gov/articles/PMC11641623/) showing a median of 59 days to peak automaticity
common_pitfalls: |
  - Building an overly ambitious routine (seven steps, 90 minutes) that feels burdensome and is abandoned within two weeks – start with 3 steps and 30 minutes
  - Performing the routine inconsistently – doing it on weeknights but skipping weekends – which prevents both the conditioning effect and the regularity benefit (sleep regularity is a stronger mortality predictor than duration per [Windred et al. (2024)](https://pmc.ncbi.nlm.nih.gov/articles/PMC10782501/))
  - Including screen-based activities (scrolling, television) inside the routine, which raises melanopic irradiance and delays melatonin onset per [Brown et al. (2023)](https://www.nature.com/articles/s42003-023-04598-4)
description: |
  - A fixed 30–60 minute sequence of wind-down activities performed in the same order each night, ending at a consistent bedtime
  - Typical components: dimming lights, screen cut-off, light reading or stretching, hygiene routine, then bed at the same clock time
  - The mechanism is stimulus control – pairing a stable cue chain with sleep onset – not any single physiological intervention; [meta-analytic evidence](https://onlinelibrary.wiley.com/doi/10.1111/jsr.14002) supports stimulus control as an effective single-component therapy for insomnia
  - Subjective improvements typically emerge within 1–2 weeks; full automaticity takes around 2 months per [habit formation research](https://pmc.ncbi.nlm.nih.gov/articles/PMC11641623/)
  - Distinct from sleep hygiene generally: the focus is the predictability of the sequence, not the merits of any individual component
applicable_domains: ["sleep", "mental-health", "cognitive-skills"]

values:
  sleep.daily_functioning:
    pbs: 6
    isr: 65
    uar: 65
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 55th–60th percentile, recovering roughly 45–60 productive minutes per day from faster sleep onset, fewer awakenings, and reduced morning grogginess. Delta: ~20–25 percentile points.
      - PBS = 10 + log₂(0.85/14) = 10 − 4.04 ≈ 6 on the daily-functioning anchor (anchor_max = 14 productive hours). [Sleep regularity research](https://pubmed.ncbi.nlm.nih.gov/33054339/) and [stimulus-control meta-analysis](https://onlinelibrary.wiley.com/doi/10.1111/jsr.14002) support sleep onset latency reductions of 10–15 minutes plus modest improvements in sleep efficiency, which translate to under an hour of additional functional time per day for a typical adult.
      - The previous YAML claimed 1.5 added productive hours mapping to score 7; that overstates what stimulus control alone delivers. Successful adherents see a meaningful but bounded gain – this is a single behavioural lever, not a comprehensive sleep overhaul.
    isr_reasoning: |
      - Among adherent participants, [Verreault et al. (2024) network meta-analysis](https://onlinelibrary.wiley.com/doi/10.1111/jsr.14008) found stimulus control produced significant improvements in sleep onset latency and efficiency, with response rates in the 55–70% range across included RCTs.
      - [Jansson-Fröjmark et al. (2024) meta-analysis](https://onlinelibrary.wiley.com/doi/10.1111/jsr.14002) found stimulus control as a single component is effective but heterogeneous – about a third of compliant users show no clinically meaningful change in objective sleep metrics.
      - ISR set at 65%: better than placebo, well below the 85% in the prior scoring. The pathway is reliable for subjective improvement but objective daily-functioning gains depend on baseline sleep architecture and lifestyle factors the routine alone cannot fix.
    uar_reasoning: |
      - [Adherence reviews](https://pmc.ncbi.nlm.nih.gov/articles/PMC3720832/) report stimulus-control adherence of 40–85% with a central estimate around 65%; main barriers are weekend disruption, social commitments, and discomfort during early implementation.
      - [Habit formation research](https://pmc.ncbi.nlm.nih.gov/articles/PMC11641623/) puts median time-to-automaticity at 59 days, meaning users must sustain effortful adherence for roughly 2 months before the routine self-maintains; many drop out before that point.
      - Simpler 3–4 step routines retain users at the upper end of that range; elaborate multi-component routines fall toward the lower end.

  sleep.long_term_health:
    pbs: 5
    isr: 60
    uar: 65
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 50th–55th percentile, gaining roughly 2–3 months of additional healthy lifespan via improved sleep regularity and modestly better sleep quality. Delta: ~15–20 percentile points.
      - PBS = 10 + log₂(0.21/8) = 10 − 5.25 ≈ 5 on the long-term-health anchor (anchor_max = 8 years). [Windred et al. (2024)](https://pmc.ncbi.nlm.nih.gov/articles/PMC10782501/) found that moving from low to high sleep regularity is associated with up to a 48% lower all-cause mortality hazard, but a bedtime routine moves regularity by a fraction of that range, not the full delta.
      - The prior PBS of 6 (≈6 months of healthy lifespan) overstates the contribution of the routine itself. Most observational mortality benefits attributed to sleep regularity confound with overall lifestyle quality; the isolated effect of adopting a bedtime routine is meaningful but smaller.
    isr_reasoning: |
      - [Sleep regularity and cardiovascular events](https://pubmed.ncbi.nlm.nih.gov/39603689/) shows the dose-response is shallow until SRI exceeds ~77 – a routine helps shift users into the protective zone, but only if adherence is high enough to actually stabilise wake/sleep timing.
      - [Sleep timing systematic review](https://pubmed.ncbi.nlm.nih.gov/33054339/) confirms the regularity–health association across 41 studies and 92,340 participants but notes most evidence is observational; causal attribution to bedtime routines specifically is weaker than for sleep duration interventions.
      - ISR of 60%: lower than daily functioning because the long-term health benefit requires sustained regularity for years and depends on the routine actually anchoring a stable bedtime, not just adding a wind-down sequence.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile. The absence of immediate health feedback does not change adherence because the daily behaviour is identical.

  sleep.comfort_experience:
    pbs: 7
    isr: 80
    uar: 70
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 65th–75th percentile, with subjective sleep transitioning from "below average" to "consistently restful" on most nights. Delta: ~30–40 percentile points.
      - On the subjective anchor (10 = transformative gain, 8 = major gain, 6 = meaningful gain), the experience of falling asleep more easily, lower bedtime anxiety, and a sense of evening boundaries between work and rest is a major but not transformative gain – score 7 sits between meaningful and major.
      - The comfort effect is the strongest of the three sleep value-domains because the routine directly targets the subjective experience of sleep preparation: reduced pre-sleep arousal, environmental cues for relaxation, and the psychological satisfaction of a deliberate end-of-day ritual.
    isr_reasoning: |
      - [Stimulus control meta-analyses](https://onlinelibrary.wiley.com/doi/10.1111/jsr.14002) consistently show subjective sleep quality improves more reliably than objective sleep architecture among compliant users – roughly 75–85% report meaningful subjective improvement.
      - The relaxation activities reduce pre-sleep arousal regardless of downstream sleep architecture effects, which is why subjective comfort is the most reliable benefit.
      - ISR set at 80%: high, but not as high as the prior 90% – a meaningful minority of users feel the routine is performative or fail to find activities that genuinely help them wind down.
    uar_reasoning: |
      - Slightly higher adherence (70 vs 65) because comfort improvements are noticeable within the first week, providing positive reinforcement that sustains the habit. [CBT-I adherence research](https://pmc.ncbi.nlm.nih.gov/articles/PMC5837899/) shows perceived benefit predicts continued adherence.
      - Same baseline barriers as daily functioning – weekend disruption, social commitments, travel – but the immediate feedback loop pulls UAR upward.
      - Approximately 30% still struggle with long-term consistency despite enjoying the experience when they do it.

  mental-health.stability:
    pbs: 4
    isr: 50
    uar: 65
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 40th–50th percentile via improved sleep quality supporting prefrontal–amygdala connectivity essential for emotion regulation. Delta: ~5–15 percentile points.
      - On the subjective anchor (6 = occasional distress resolving quickly, 4 = frequent distress affecting daily functioning, 2 = barely noticeable gain), score 4 reflects a modest but real benefit – sleep quality is one contributor to mood stability, but a bedtime routine alone does not address cognitive, social, or biological drivers of distress.
      - [Palmer et al. (2024) meta-analysis](https://pubmed.ncbi.nlm.nih.gov/38127505/) of 154 studies and 5,717 participants found sleep loss reduces positive affect and impairs emotion regulation; better sleep quality from a routine moves the dial in the opposite direction, but the effect is bounded by how much sleep itself improves.
    isr_reasoning: |
      - The causal pathway is two-step (routine → sleep quality → mood stability), with each step introducing variability. [Sleep–emotion meta-analysis](https://www.apa.org/pubs/journals/releases/bul-bul0000410.pdf) shows mood effects are heterogeneous across sleep loss types.
      - Not all sleep quality gains translate to noticeable mood changes, particularly for users without baseline sleep-related mood disruption.
      - ISR set at 50%: roughly half of adherent users will notice meaningful day-to-day mood stability gains; the rest see sleep improvements that don't propagate to emotional baseline.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile.

  cognitive-skills.lifestyle:
    pbs: 5
    isr: 80
    uar: 65
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile (~1–2 of 5 evidence-based lifestyle practices maintained). The anchor explicitly counts sleep as one of the 5 practices (sleep, exercise, nutrition, stress management, social engagement). Adopting a stable bedtime routine moves a user from "not maintaining sleep practice" to "maintaining sleep practice", a gain of roughly 1 practice. Endpoint: ~50th–55th percentile.
      - PBS = 10 + log₂(1/5) = 10 − 2.32 ≈ 5 on the cognitive-skills.lifestyle anchor (anchor_max = 5 practices).
      - The routine doesn't add other practices, so the gain is bounded at one anchor unit. Score 5 maps cleanly to "1 of 5 practices" on the log scale.
    isr_reasoning: |
      - The mechanical link is direct: maintaining a consistent bedtime routine essentially is the sleep lifestyle practice. ISR of 80% reflects that adherent users mechanically satisfy this anchor – it doesn't require a downstream cognitive outcome.
      - The 20% loss accounts for users whose routine is too inconsistent or too short to count as a maintained daily practice in the spirit of the anchor.
      - No separate mechanism risk here – this is a definitional alignment, not a probabilistic causal chain.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile.

  cognitive-skills.focus:
    pbs: 4
    isr: 55
    uar: 65
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. The cognitive-skills.focus anchor (anchor_max = 120 minutes of sustained focused work) responds to sleep quality through next-day attention and working memory. Better sleep typically extends sustained-focus capacity by 5–10 minutes for someone starting near baseline. Endpoint: ~40th–45th percentile.
      - PBS = 10 + log₂(7.5/120) = 10 − 4.0 ≈ 4 on the focus anchor.
      - [Whitehall II findings](https://pmc.ncbi.nlm.nih.gov/articles/PMC3079935/) and [sleep-cognition reviews](https://www.sciencedirect.com/science/article/abs/pii/S2352721823002930) confirm the link between consistent sleep and working memory/response inhibition, but the effect attributable to a routine alone (vs full sleep optimisation) is modest.
    isr_reasoning: |
      - The pathway runs routine → sleep quality → next-day focus, with attenuation at each step. Not all sleep quality gains produce noticeable focus improvements, particularly in users whose focus bottleneck is attentional control rather than sleep deprivation.
      - [National Sleep Foundation consensus](https://www.thensf.org/sleep-schedules-sleep-timing-guideline/) supports the regularity–attention link but notes high individual variability in dose-response.
      - ISR of 55%: roughly half of adherent users will notice meaningful focus gains; the remainder see sleep improvements that don't translate to next-day attentional capacity.
    uar_reasoning: |
      - See sleep.daily_functioning UAR – same intervention, same adherence profile.

