  ongoing_cost: 80
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Indoor climbing gym membership $60–120/month depending on location; $80/month is a typical mid-range figure. Day passes ($15–25) are an alternative for less frequent climbers. Shoe resoling every 6–12 months ($40–60, amortised) and chalk replenishment ($5/month) are minor additional costs. Outdoor climbing is essentially free once gear is owned, though travel costs apply."
  upfront_time: 4
  upfront_time_reasoning: "Introductory bouldering session or belay certification course (1–2 hours), and 2–3 initial gym visits to learn basic technique, etiquette, and route-reading conventions. Bouldering has a meaningfully lower entry bar than roped climbing because no rope skills or partner are required."
  ongoing_time: 5
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Two to three sessions of 90–120 minutes per week, including warm-up, climbing with rest, and cool-down. Sessions tend to be longer than gym-based strength training due to mandatory rest between climbs and the social-conversational nature of the activity."

prerequisites:
  - "Sufficient baseline upper-body and grip strength to hang from a bar briefly and perform basic pulling movements without joint pain"
  - "Access to an indoor climbing gym, or an outdoor climbing area with appropriate gear and partners; major cities and many mid-sized towns have at least one bouldering or full-service gym"
  - "No significant active finger, wrist, elbow, or shoulder injuries that would be aggravated by gripping and pulling under bodyweight load"
  - "Willingness to manage acute height-related discomfort and accept minor skin abrasion on hands during the initial learning phase"

