    pbs: 7
    isr: 75
    uar: 50
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~65th percentile. Delta: ~30 percentile points.
      - The graded difficulty system (V-scale, YDS) provides one of the clearest mastery feedback loops in any leisure activity: each grade is a discrete, well-defined accomplishment, with a near-infinite ceiling for progression (elite outdoor climbers continue progressing into their 40s and beyond)
      - The dual physical-cognitive demand means achievement is multi-dimensional: improvements come from strength, technique, route-reading, and fear management, providing several distinct pathways to feel mastery
      - Score 7 reflects climbing's unusually rich achievement profile – well above leisure activities with no measurable progression (e.g., walking) and at least equal to most skill-based hobbies (instruments, chess) for sustained mastery experience
    isr_reasoning: |
      - The grading system makes mastery experience near-automatic for any consistent climber: any week with measurable strength or technique improvement translates to grade progression in a relatively legible way
      - Plateau zones (especially V4–V6 in bouldering, 5.11 in roped climbing) can produce extended periods without measurable progress, but most climbers continue to experience mastery via secondary metrics (volume, style, outdoor projects) during these zones
      - Estimated 70–80% of consistent climbers experience meaningful and sustained sense of accomplishment from the activity
    uar_reasoning: |
      - See fitness.health UAR – same intervention, same adherence profile

  participatory-leisure.adventure:
    pbs: 7
    isr: 70
    uar: 50
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. Endpoint: ~65th percentile. Delta: ~30 percentile points.
      - Outdoor climbing is among the more genuinely adventurous mainstream leisure activities: it involves real consequences (height, falls, weather, route-finding), travel to natural settings, and committing physical and psychological challenge under partial uncertainty
      - Indoor climbing carries less true adventure but retains the novelty element through ever-changing route-setting (most gyms reset routes monthly), so even gym-only climbers experience routine novelty in their training environment
      - Score 7 reflects climbing's standing among the strongest legal adventure-sport options accessible to non-elite practitioners; below white-water expedition or alpine climbing (PBS 8–9) only because the typical practice is gym-based and the consequence level is well-managed
    isr_reasoning: |
      - The outdoor pathway delivers strong adventure benefits reliably to those who progress to it; indoor-only climbers receive a meaningfully smaller adventure dose, splitting the population's experience
      - Survey evidence ([Stelzer et al. 2024](https://pmc.ncbi.nlm.nih.gov/articles/PMC11883046/)) supports climbing's identification as a distinctly novel, challenging activity even among those who do not progress to outdoor settings
      - Estimated 60–75% of regular climbers experience meaningful adventure and novelty gains, with the higher end concentrated among those who climb outdoors at least occasionally
    uar_reasoning: |
      - See fitness.health UAR – same intervention, same adherence profile

