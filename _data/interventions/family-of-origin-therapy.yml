prerequisites:
  - "Access to a therapist with verifiable training in the relevant modality – IFS Institute Level 1+, Schema Therapy Society certification, EMDRIA-approved EMDR training, or Bowen Center training; generalist therapists using the language are not equivalent"
  - "Sufficient psychological stability to tolerate temporary destabilisation in the early months as defences soften; acute crisis states (active suicidality, severe dissociation requiring stabilisation) typically require phase-based treatment with stabilisation work first"
  - "A presenting issue genuinely rooted in family-of-origin material – attachment patterns, intergenerational dynamics, repeated relational templates, childhood trauma; presentations driven primarily by current circumstances or biological factors are better served by CBT or other targeted approaches"
  - "Capacity to commit to a longer treatment arc than CBT – schema therapy trials commonly run 12–24 months, IFS courses 9–18 months; users seeking a brief structured intervention should choose CBT instead"

