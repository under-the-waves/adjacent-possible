prerequisites:
  - "Basic numeracy sufficient to interpret percentages and compare values across products"
  - "Access to packaged food products with nutrition facts panels"
  - "Sufficient reading literacy to decode ingredient lists and panel text"

flagged_domains:
  - domain: "rationality"
    rationale: "Learning to see through front-of-pack health claims and read primary data is a direct application of epistemic hygiene – preferring primary sources over marketing framing."
  - domain: "body-image"
    rationale: "For users pursuing fat loss or muscle gain, label literacy enables accurate tracking of caloric intake and macronutrient ratios."
