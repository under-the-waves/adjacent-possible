  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "Once learned, the skill is applied during normal grocery shopping with no additional cost."
  upfront_time: 3
  upfront_time_reasoning: "Approximately 1 hour to read foundational material, 1 hour to practise on products at home, and 1 hour applying the skill during a full grocery shop."
