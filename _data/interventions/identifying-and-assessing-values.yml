  ongoing_cost: 0
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "The intervention is entirely self-directed using free instruments. Optional costs include a values-focused workbook (~$15–25 one-off) or coaching sessions, but these are not required."
  upfront_time: 2
  upfront_time_reasoning: "Approximately 1–2 hours for the initial elicitation exercise (30–60 minutes for the card sort or survey), the authenticity reflection (30 minutes), and the pairwise trade-off exercise (20–30 minutes)."
  ongoing_time: 1
  ongoing_time_period: "year"
  ongoing_time_reasoning: "The minimum effective ongoing commitment is an annual review of approximately 60 minutes – revisiting the hierarchy, comparing it to the previous year's, and auditing time and spending alignment."

prerequisites:
  - "Basic literacy and ability to engage in written self-reflection – the critical examination phase requires producing short written responses to structured prompts"
  - "Access to a quiet environment for 1–2 hours without interruption – the reflection phases are cognitively demanding"
  - "No history of active psychosis or severe dissociation that would impair structured introspection; individuals in acute mental health crises should complete this work with professional support"
  - "Sufficient life experience to have formed some implicit values hierarchy – typically mid-adolescence or later"

flagged_domains:
  - domain: "mental-health"
    rationale: "Values clarification reduces psychological distress by resolving values-behaviour incongruence, a known source of anxiety and chronic dissatisfaction"
  - domain: "career-planning"
    rationale: "An explicit values hierarchy is a direct input to career decisions, reducing the frequency of values-misaligned job choices"
