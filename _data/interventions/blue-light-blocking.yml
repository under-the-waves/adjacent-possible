name: "Blue Light Blocking"
what_it_is: |
  Reducing exposure to short-wavelength (~400–490nm) light in the 2–3 hours before bed by wearing amber-tinted glasses, enabling screen filters (Night Shift, f.lux), or simply dimming screens and overhead LEDs. The mechanistic case is solid – blue light suppresses melatonin via melanopsin-containing retinal ganglion cells – but in healthy adults the downstream effect on objective sleep is small or null. A [2025 meta-analysis of three crossover RCTs](https://pmc.ncbi.nlm.nih.gov/articles/PMC12668929/) found non-significant changes in sleep onset latency (−4.9 min), total sleep time (+8.8 min), and sleep efficiency (−0.6 pp), and the [2023 Cochrane review](https://www.cochrane.org/about-us/news/blue-light-filtering-spectacles-probably-make-no-difference-eye-strain-eye-health-or-sleep) (17 RCTs) concluded the evidence is inconclusive.
how_to_do_it: |
  - Pick a clear cut-off time (typically 2 hours before target bedtime) and either put on amber-tinted glasses ($15–30) or activate device filters – glasses cover ambient LED lighting too, software does not
  - Combine with dimming overhead lights, since standard LED room lighting suppresses melatonin independently of screens
  - Treat the intervention as a low-cost adjunct to better sleep hygiene (consistent bedtime, dark cool room, reduced evening stimulation), not a substitute – the [2024 Frontiers meta-analysis](https://pmc.ncbi.nlm.nih.gov/articles/PMC12668929/) authors explicitly frame BBGs as a pragmatic adjunct rather than stand-alone therapy
  - Set realistic expectations: people with diagnosed insomnia, delayed sleep phase, or shift-work disruption have the strongest case for benefit; healthy sleepers should expect minimal change
success_looks_like: |
  - You wear the glasses or run filters consistently in the wind-down window without it feeling like a chore
  - If you started with subjective sleep complaints, you notice modestly easier wind-down and earlier drowsiness within 2–4 weeks
  - You have not displaced more impactful sleep behaviours (consistent schedule, screen-free wind-down, caffeine timing) by treating the glasses as the main lever
common_pitfalls: |
  - Treating blue light blocking as a primary sleep intervention; the [Cochrane evidence](https://www.cochrane.org/about-us/news/blue-light-filtering-spectacles-probably-make-no-difference-eye-strain-eye-health-or-sleep) suggests it does little for healthy adults compared to actually reducing evening stimulation
  - Relying on Night Shift or f.lux alone; [observational data](https://pubmed.ncbi.nlm.nih.gov/38461462/) on filter apps found no sustained sleep-quality benefit, and software does nothing about overhead LEDs
  - Buying lightly-tinted "blue light glasses" sold for daytime computer use; for melatonin protection you need lenses that look distinctly orange or amber and block the short-wavelength range
  - Using the glasses while continuing high-arousal screen content – the cognitive stimulation drives wakefulness independently of light wavelength
description: |
  - Wearing amber-tinted glasses, enabling screen filters (Night Shift, f.lux), or reducing screen and LED-light exposure in the 2–3 hours before bed
  - Targets melatonin suppression via melanopsin-containing retinal ganglion cells; the mechanism is well-established but downstream effects on real-world sleep are small
  - In healthy adults, [the most recent meta-analysis](https://pmc.ncbi.nlm.nih.gov/articles/PMC12668929/) found non-significant trends on actigraphic sleep onset, duration, and efficiency; the [2023 Cochrane review](https://www.cochrane.org/about-us/news/blue-light-filtering-spectacles-probably-make-no-difference-eye-strain-eye-health-or-sleep) deemed the evidence inconclusive
  - Larger effects appear in clinical populations (insomnia, delayed sleep phase, shift work) per the [Shechter 2020 meta-analysis](https://academic.oup.com/sleepadvances/article/1/1/zpaa002/5851240); healthy sleepers should expect minimal change
applicable_domains: ["sleep"]

values:
  sleep.daily_functioning:
    pbs: 4
    isr: 30
    uar: 45
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence in a responsive user, plausibly reaching the 40th–45th percentile. Delta: ~5–10 percentile points, equivalent to roughly 10–15 productive minutes per day on the better-sleep days.
      - The [2025 Frontiers meta-analysis](https://pmc.ncbi.nlm.nih.gov/articles/PMC12668929/) of crossover RCTs found a non-significant ~5-minute reduction in sleep onset latency and ~9-minute increase in total sleep time – even taking the central estimates at face value, the daytime productivity gain is small.
      - On the linear anchor (10 = 14h, 8 = 3.5h, 6 = 50min, 4 = 13min), ~10–15 extra minutes of productive capacity sits at score 4, not 6. The previous score of 6 implicitly assumed effect sizes that the strongest current evidence does not support.
    isr_reasoning: |
      - Among adherent participants in the [2025 meta-analysis](https://pmc.ncbi.nlm.nih.gov/articles/PMC12668929/), pooled effects on sleep onset, total sleep time, and efficiency were all statistically non-significant – the modal adherent user does not get a measurable objective benefit.
      - The [2023 Cochrane review](https://www.cochrane.org/about-us/news/blue-light-filtering-spectacles-probably-make-no-difference-eye-strain-eye-health-or-sleep) (17 RCTs) found roughly half of trials showed benefit and half did not, and described overall certainty as limited.
      - Response is concentrated in clinical sub-populations: the [Shechter 2020 meta-analysis](https://academic.oup.com/sleepadvances/article/1/1/zpaa002/5851240) reported "larger combined effect sizes for sleep and/or psychiatric patients compared to healthy patients", consistent with an ISR around 30% in the general adult population.
    uar_reasoning: |
      - Real-world adherence to evening blue-blocking routines is fragile – glasses get forgotten, removed when watching films with others, or set aside as the novelty wears off; software filters tend to be enabled once and then ignored, but do nothing about ambient LEDs.
      - The [2024 Rabiei survey](https://pubmed.ncbi.nlm.nih.gov/38461462/) of smartphone users found only ~10% used blue-light filtering apps regularly while ~80% never used them, suggesting that even the lowest-friction version of this intervention has weak uptake.
      - Glasses add cosmetic and social friction (visible amber tint, colour distortion during evening media), which empirically erodes long-run adherence even among initially-motivated users.

  sleep.comfort_experience:
    pbs: 5
    isr: 50
    uar: 50
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, plausibly reaching the 45th–55th percentile in subjective wind-down comfort. Delta: ~10–20 percentile points – a modest gain in evening sleep experience.
      - Subjective outcomes show larger and more consistent improvements than objective ones: the [Shechter 2020 meta-analysis](https://academic.oup.com/sleepadvances/article/1/1/zpaa002/5851240) reported a large self-report PSQI effect (Hedge's g = −1.25) versus only small effects on actigraphy, suggesting meaningful felt-experience benefit even where objective sleep barely shifts.
      - On the subjective anchor, this maps to a "modest gain in quality of sleep experience" (score 4) for healthy users and a "meaningful gain" (score 6) for those with mild sleep complaints – score 5 reflects the mid-range across users likely to try this.
    isr_reasoning: |
      - Subjective benefit is more reliably reported than objective benefit, but is also vulnerable to placebo and expectation effects – the [Shechter 2020 review](https://academic.oup.com/sleepadvances/article/1/1/zpaa002/5851240) noted the gap between large subjective and small objective effects, which limits how much weight to put on self-report alone.
      - The [2023 Cochrane review](https://www.cochrane.org/about-us/news/blue-light-filtering-spectacles-probably-make-no-difference-eye-strain-eye-health-or-sleep) found subjective sleep-quality outcomes were also inconclusive across 17 RCTs, with substantial study-to-study variability.
      - Roughly half of adherent users report a subjective improvement in evening wind-down across the trial literature; ISR ~50% reflects the mixed picture.
    uar_reasoning: |
      - Subjective comfort gains may provide modest positive reinforcement in the first few weeks, slightly improving adherence relative to outcomes that lack short-term feedback.
      - However, the same practical barriers apply: forgetting glasses, social/cosmetic friction, and reverting to unfiltered screens during evening leisure. The [2024 Rabiei survey](https://pubmed.ncbi.nlm.nih.gov/38461462/) found ~80% never use filters regularly even when freely available.
      - UAR ~50% reflects modestly better stickiness than the productivity-framed use case but still substantial dropout over months.

