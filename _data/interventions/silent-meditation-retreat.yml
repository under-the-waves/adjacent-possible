    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 65th–70th percentile in psychological grounding and felt sense of purpose derived from worldview. Delta: ~30–35 percentile points.
      - Retreats are historically the principal route to direct experiential grounding of worldview claims (about consciousness, self, suffering, transcendence); [phenomenological retreat research](https://link.springer.com/article/10.1007/s12671-016-0554-4) finds frequent reports of strengthened existential grounding post-retreat.
      - Score 7 reflects that the retreat is unusually well-suited to this specific value – it provides experiential evidence that other interventions cannot, even if the metaphysical interpretation remains contested.
    isr_reasoning: |
      - The meaning gain is reasonably reliable because the mechanism (direct experience strengthening felt-sense conviction) operates across most completers regardless of which interpretive framework they apply afterwards.
      - For some retreatants, the experience destabilises rather than grounds existing worldview – a known and not always positive outcome that needs to be set against the typical case.
      - ISR of 65% reflects that most completers experience strengthened existential grounding, while accounting for the minority for whom the retreat is destabilising rather than grounding.
    uar_reasoning: |
      - See mindfulness.spiritual UAR – same intervention, same adherence profile.

resources:
  upfront_cost: 100
  upfront_cost_reasoning: "Vipassana 10-day courses operate on a dana (donation) basis – there is no required course fee, though donations from prior students fund subsequent courses. Travel costs to the retreat centre are typically the main expense and vary substantially by location. Allow $100 minimum for travel, basic comfortable clothing suitable for long sitting, and a meditation cushion if not provided. Zen sesshins and Christian contemplative retreats typically charge $400–$1,200 for room, board, and instruction over 5–7 days, but the donation-based Vipassana option keeps the minimum cost low."
  ongoing_cost: 0
  ongoing_cost_period: "year"
  ongoing_cost_reasoning: "No required ongoing cost. Daily home practice afterwards uses no equipment beyond what one already has. Some practitioners attend a follow-up retreat every 1–2 years, which is recommended but not required."
  upfront_time: 200
  upfront_time_reasoning: "10 days at the retreat (roughly 10 hours of formal practice per day plus structured rest, totalling ~150–170 hours on-site), plus 1–2 days for travel and re-entry, plus 5–10 hours for advance application, logistics, and basic preparation. Conservative total of 200 hours for the full intervention from application to return."
  ongoing_time: 7
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Establishing and maintaining a daily sit of approximately 1 hour following the retreat is the standard recommendation – ~7 hours per week. This is the minimum effective dose to retain retreat gains; without it, most benefits decay within months."

prerequisites:
  - "No history of psychosis, untreated bipolar disorder, severe trauma, or active suicidal ideation – intensive retreats can destabilise these conditions and most centres screen for them on application"
  - "Physical capacity to sit (on a chair, cushion, or floor) for extended periods – not pain-free, but able to cope with significant discomfort over 10 days without injury"
  - "Ability to take 7–12 contiguous days off work or family responsibilities and to be uncontactable during that period"
  - "Access to a residential retreat centre (Vipassana centres exist on every inhabited continent; Zen and Christian contemplative centres are concentrated in higher-income countries)"

flagged_domains:
  - domain: "behaviours"
    rationale: "Reduced reactivity and increased noticing of mental patterns directly supports breaking habitual unwanted behaviours, with retreat-induced equanimity acting as a circuit-breaker for craving and aversion responses."
  - domain: "ethics"
    rationale: "Sustained reflection on conduct, intention, and the experience of others is a core component of most contemplative retreat curricula and frequently produces refined ethical commitments post-retreat."
