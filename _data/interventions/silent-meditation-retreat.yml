      - The retreat's core methodology is exactly the construct this value measures: sustained, non-judgemental attention to internal experience. [Kral et al. (2018) fMRI findings](https://pmc.ncbi.nlm.nih.gov/articles/PMC6193296/) show that long-term retreat practice shifts default-mode and interoceptive network activity in directions consistent with enhanced contemplative-somatic awareness.
      - Score 8 reflects that the retreat directly targets this value at unusually high dose; near-maximum scores require sustained contemplative life rather than a single retreat.
    isr_reasoning: |
      - The mechanism is structurally direct: completing the retreat protocol largely entails developing this skill, making ISR among the highest of any value scored here.
      - [Body-scan and Vipassana technique research](https://pmc.ncbi.nlm.nih.gov/articles/PMC3855679/) consistently finds enhanced interoceptive accuracy and somatic awareness following intensive practice, with effects largest for retreat participants.
      - ISR of 75% reflects that completers reliably develop the targeted skill, with the minority who do not typically being those who failed to follow the technique as taught.
    uar_reasoning: |
      - See mindfulness.spiritual UAR – same intervention, same adherence profile.

  self-awareness.psychological:
    pbs: 7
    isr: 65
    uar: 25
    confidence: medium
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 65th–70th percentile – meaningful insight into mental patterns, triggers, and emotional dynamics that daily life rarely surfaces. Delta: ~30–35 percentile points.
      - The retreat creates conditions under which suppressed material reliably surfaces; participants commonly report identification of specific reactive patterns ("I always shut down when X") that had been operating invisibly. The mechanism is well-described in the [Vipassana outcome literature](https://pubmed.ncbi.nlm.nih.gov/19341981/).
      - Score 7 reflects substantial psychological insight gains, slightly below contemplative-somatic awareness because translating raw observation into coherent psychological self-understanding requires reflective integration that not all retreatants do well.
    isr_reasoning: |
      - The translation from observed pattern to coherent psychological insight is more variable than the raw observation step – some retreatants leave with vivid experiences but no coherent narrative about what they mean.
      - [Chiesa (2010) review](https://pubmed.ncbi.nlm.nih.gov/19341981/) finds consistent reports of self-knowledge gains in retreat samples, though measurement is largely self-report.
      - ISR of 65% reflects that most completers gain genuine psychological insight, with a meaningful minority either losing it without integration practice or misinterpreting retreat experiences in ways that do not yield durable understanding.
    uar_reasoning: |
      - See mindfulness.spiritual UAR – same intervention, same adherence profile.

  mental-health.flourishing:
    pbs: 6
    isr: 55
    uar: 25
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 55th–60th percentile – a meaningful gain in life satisfaction, sense of meaning, and frequency of positive affect, often experienced as a quieter and more grounded baseline. Delta: ~20–25 percentile points.
      - [Khoury et al. (2017) meta-analysis](https://pubmed.ncbi.nlm.nih.gov/28602515/) found pre-post improvements in wellbeing with effect sizes in the moderate-to-large range across retreat samples; [dose-response research](https://pmc.ncbi.nlm.nih.gov/articles/PMC12336962/) suggests retreat-level practice clears the threshold associated with meaningful flourishing gains, which short daily practice often does not.
      - Score 6 reflects a real but bounded effect – flourishing depends on factors beyond contemplative state (relationships, purpose, circumstances) that the retreat does not directly address, and gains decay without integration.
    isr_reasoning: |
      - Flourishing gains are less reliable than insight or attention gains because they depend on the retreatant translating contemplative experience into ongoing life changes – a step many do not complete.
      - [Britton et al. (2021)](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0259533) finds that a non-trivial minority experience worsening rather than improvement on wellbeing measures post-retreat, particularly those with prior trauma or mood disorder.
      - ISR of 55% reflects genuine but conditional flourishing benefits – higher than daily meditation's flourishing ISR because the dose is higher, lower than retreat insight ISR because the causal chain is longer.
    uar_reasoning: |
      - See mindfulness.spiritual UAR – same intervention, same adherence profile.

  value-system.insight:
    pbs: 6
    isr: 60
    uar: 25
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 55th–60th percentile – meaningful clarification of one's own actual values, hierarchies, and trade-offs through sustained quiet observation. Delta: ~20–25 percentile points.
      - The retreat's silence and removal of distraction makes underlying preferences and motivations more visible than they are amid normal life noise; participants commonly report renewed clarity about what they actually want vs what they have been pursuing by default.
      - Score 6 reflects a real but secondary effect – the retreat does not explicitly target values clarification, and the insight comes through the same mechanism as self-knowledge generally rather than as a direct training.
    isr_reasoning: |
      - The values insight benefit is real but variable across retreatants; some leave with vivid clarity about life direction while others process more procedural or emotional material without explicit values-level conclusions.
      - [Phenomenological research on retreatants](https://link.springer.com/article/10.1007/s12671-016-0554-4) finds frequent reports of life-direction reorientation post-retreat, supporting the mechanism.
      - ISR of 60% reflects that more than half of completers experience some values-level clarification, while a substantial minority do not.
    uar_reasoning: |
      - See mindfulness.spiritual UAR – same intervention, same adherence profile.

  worldview.depth:
    pbs: 6
    isr: 60
    uar: 25
    confidence: low
    pbs_reasoning: |
      - Baseline (per values.yml): 35th percentile. After successful adherence, a user could plausibly reach the 55th–60th percentile in depth of understanding within contemplative or philosophical knowledge domains. Delta: ~20–25 percentile points.
      - Sustained direct experience of mental phenomena gives experiential depth to concepts (impermanence, conditioning, self-construction) that academic study alone treats abstractly; this can substantially deepen understanding of contemplative philosophy, psychology, and relevant religious traditions.
      - Score 6 reflects a real but bounded depth gain confined to specific domains where contemplative experience is directly relevant; the retreat does not deepen worldview generally.
    isr_reasoning: |
      - The depth gain depends on the retreatant having or developing some intellectual engagement with the relevant traditions – it is more reliable for those who read or study around the practice.
      - The mechanism is well-documented in contemplative scholarship but understudied empirically as a worldview-depth outcome.
      - ISR of 60% reflects genuine but variable depth gains conditional on intellectual engagement with the practice's framework.
    uar_reasoning: |
      - See mindfulness.spiritual UAR – same intervention, same adherence profile.

