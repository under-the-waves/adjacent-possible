name: "Eliminating Micro-Decisions"
description: "Systematically identifying and removing or automating low-stakes recurring decisions that consume cognitive resources without meaningful returns. This includes establishing default choices for routine matters (meals, clothing, routes, scheduling), creating decision rules for recurring situations ('if X, then always Y'), and batching unavoidable decisions into dedicated time blocks. The intervention draws on decision fatigue research showing that the cumulative cognitive load of many small choices degrades the quality of subsequent important decisions. Implementation involves auditing a typical week for recurring decision points, categorising each as high-stakes or low-stakes, and designing defaults or automation for the low-stakes category. Most practitioners can eliminate 15 - 30 micro-decisions per day within the first 2 - 3 weeks, with the full system stabilising over 4 - 8 weeks."
applicable_domains: ["organisation"]

values:
  organisation.efficiency:
    pbs: 6
    pbs_reasoning: "Eliminating micro-decisions directly targets one of the largest sources of organisational friction: the cumulative time and energy spent on low-value choices. Knowledge workers make an estimated 35,000 decisions per day, many of which are trivial but still consume cognitive resources. By establishing defaults and decision rules, this intervention reclaims both time (fewer deliberation pauses throughout the day) and cognitive energy (reduced executive function depletion). The efficiency gain is substantial but not transformative on its own — it addresses the friction layer rather than the structural layer of personal organisation."
    isr: 55
    isr_reasoning: "The evidence base is mixed. Decision fatigue as a concept has strong theoretical support and some empirical backing — Vohs et al. and Baumeister's ego depletion work established the framework, and practical evidence from figures like Barack Obama and Mark Zuckerberg (who eliminated clothing decisions) popularised the approach. However, recent large-scale studies have challenged the strength of the decision fatigue effect, with a 2025 healthcare study finding no credible evidence for decision fatigue in medical contexts, and a systematic review finding significant effects in only 45% of assessed cases. The intervention's effectiveness likely depends heavily on individual susceptibility to decision fatigue and the baseline number of unnecessary decisions."
    uar: 75
    uar_reasoning: "Once established, micro-decision elimination is highly sticky. Default choices and decision rules require no ongoing willpower to maintain — they operate by removing the need for deliberation rather than adding a new behaviour. The main setup cost is the initial audit and design phase. Adherence is high because the intervention reduces effort rather than adding it. The primary failure mode is scope creep (gradually re-introducing decisions that were previously defaulted) or life changes that invalidate existing defaults. Estimated 70 - 80% sustained at 6 months."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "efficiency_level"
    anchor_description: "Zero wasted time or energy on organisational friction; all systems operate with minimal cognitive overhead"

  organisation.reliability:
    pbs: 5
    pbs_reasoning: "Eliminating micro-decisions moderately improves reliability by reducing the number of points where procrastination, forgetfulness, or poor judgment can occur. When routine matters are handled by defaults rather than active choices, there are fewer opportunities for things to fall through the cracks. Decision rules for recurring situations ('if a meeting has no agenda, decline it') prevent inconsistent responses to similar situations. However, reliability ultimately depends more on capture systems, review practices, and follow-through habits than on decision reduction alone."
    isr: 50
    isr_reasoning: "The link between reduced decision load and improved reliability is theoretically sound but has limited direct empirical support. Most decision fatigue research focuses on decision quality rather than task completion or commitment fulfilment. The reliability benefit is inferred from the mechanism (fewer decision points = fewer failure points) rather than directly measured in studies. The moderate score reflects this inferential gap."
    uar: 75
    uar_reasoning: "Same adherence profile as efficiency — the intervention reduces cognitive load rather than adding it, making sustained adoption relatively easy. Reliability-relevant defaults (e.g., always processing email at set times, always filing documents immediately) tend to be especially sticky because their benefits are immediately visible when commitments stop being missed."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "reliability_level"
    anchor_description: "Zero missed commitments; every obligation tracked and fulfilled with complete consistency"

  organisation.clarity:
    pbs: 4
    pbs_reasoning: "Eliminating micro-decisions provides a modest clarity benefit by reducing cognitive noise and freeing mental bandwidth for higher-order awareness of priorities and commitments. When the mind is not occupied with 'what should I eat for lunch' or 'which route should I take', there is more capacity for strategic thinking about obligations and projects. However, this is an indirect effect — the intervention does not itself create clarity about priorities, projects, or commitments. It clears space for clarity rather than directly producing it."
    isr: 45
    isr_reasoning: "The link between reduced decision load and improved mental clarity is primarily supported by theoretical frameworks (cognitive load theory, ego depletion) rather than direct experimental evidence. Studies on decision fatigue have focused on decision quality and willpower rather than on subjective or objective measures of organisational clarity. The score reflects the plausible but weakly evidenced nature of this connection."
    uar: 75
    uar_reasoning: "Same adherence profile as other organisation values — the intervention is inherently low-maintenance once established, supporting sustained adoption regardless of which specific value dimension it serves."
    anchor_type: "subjective"
    anchor_max: 10
    anchor_unit: "clarity_level"
    anchor_description: "Complete awareness of all commitments, priorities, and obligations with perfect situational awareness"

resources:
  upfront_cost: 0
  upfront_cost_reasoning: "No financial cost required. The intervention is a cognitive restructuring exercise that uses existing infrastructure. Some practitioners invest in tools that support automation (e.g., meal planning apps, capsule wardrobe services), but these are optional enhancements rather than prerequisites."
  ongoing_cost: 0
  ongoing_cost_period: "month"
  ongoing_cost_reasoning: "No recurring financial costs for the core intervention. Optional automation tools (meal kit subscriptions, automated scheduling software) may have associated costs but are not required for the technique itself."
  upfront_time: 3
  upfront_time_reasoning: "Approximately 3 hours for the initial implementation: 1 hour to audit a typical week and catalogue all recurring decisions, 1 hour to categorise decisions as high-stakes vs. low-stakes and design defaults for the low-stakes category, and 1 hour to document decision rules and communicate changes to affected people (e.g., informing household members about meal defaults)."
  ongoing_time: 0.5
  ongoing_time_period: "month"
  ongoing_time_reasoning: "Minimal ongoing maintenance — approximately 30 minutes per month to review whether defaults are still working, adjust for seasonal or life changes, and address any new recurring decisions that have crept in. The whole point of the intervention is to reduce ongoing time expenditure, so maintenance should be light."

prerequisites:
  - "Willingness to audit one full week of decisions, noting every choice point from waking to sleeping, and honestly categorise each as high-value or low-value"
  - "Comfort with 'good enough' solutions for routine matters — the intervention requires accepting that optimising every small decision is counterproductive"
  - "Sufficient life stability that defaults can remain in place for at least 4 - 6 weeks; frequent travel, irregular schedules, or chaotic living situations may undermine the approach"
