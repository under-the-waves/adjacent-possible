  ongoing_cost_reasoning: "No recurring costs. Optional items (books, board games, craft materials) are not required to begin."
  upfront_time: 0.5
  upfront_time_reasoning: "Approximately 30 minutes to choose a recurring time block, add it to the calendar, identify 2–3 alternative activities, and inform household members."
  ongoing_time: 3
  ongoing_time_period: "week"
  ongoing_time_reasoning: "Minimum effective implementation is one 2–3 hour block per week. Time spent within the block is leisure time that would otherwise be spent on screens, so it is substitution rather than addition."

prerequisites:
  - "No specific physical or health requirements; suitable for all ages and fitness levels"
  - "A recurring time slot that is genuinely discretionary – the intervention does not apply to work-required screen use"
  - "Basic awareness of one or two non-screen activities to substitute, to avoid the block collapsing in the first 10 minutes"

