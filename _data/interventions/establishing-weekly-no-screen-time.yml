    rationale: "Screen time reduction produces small-to-medium improvements in depressive symptoms and stress (BMC Medicine 2025 RCT)."
  - domain: "friendship"
    rationale: "Screen-free blocks spent with friends or family displace phone use during shared time, plausibly deepening relationship quality."
  - domain: "cognitive-skills"
    rationale: "Sustained screen-free periods allow attentional recovery and may improve focus and concentration over time."
