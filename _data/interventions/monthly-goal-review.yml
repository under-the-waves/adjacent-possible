name: "Monthly Goal Review"
what_it_is: ""
how_to_do_it: ""
success_looks_like: ""
common_pitfalls: ""
description: |
  - A structured monthly session for reviewing progress against all active goals, evaluating whether each remains worth pursuing, updating timelines and priorities, and planning the next month's focus
  - Follows a consistent format: assess completion status, identify obstacles and enablers, decide whether to continue, modify, or retire each goal, and set concrete next actions for the coming month
  - A [meta-analysis of 138 studies](https://doi.org/10.1037/bul0000025) found that progress monitoring significantly promotes goal attainment (d = 0.40), with physically recording progress and public reporting producing stronger effects
  - Monthly cadence balances regular course correction against review overhead, and is particularly effective when combined with weekly check-ins and calendar blocking to protect the review session from interruption
applicable_domains: ["goals"]

values:
  goals.follow_through:
    pbs: 6
    pbs_reasoning: |
      - The anchor measures % of days with at least one deliberate goal action. Monthly reviews happen once per month, so their effect on daily follow-through is indirect: the review session plans and motivates daily action, but 29 of 30 days depend on self-sustaining momentum between reviews.
      - [Harkin et al. (2016)](https://doi.org/10.1037/bul0000025) meta-analysis (138 studies, N = 19,951) found progress monitoring produces d = 0.40 improvement in goal attainment, with physically recording progress strengthening the effect. Monthly review inherently involves written recording.
      - Score 6 because a successful reviewer might move from ~6% of days with goal action (score 6) to ~15-20%, a meaningful but not dramatic uplift. The monthly cadence creates accountability spikes but cannot sustain daily action the way daily-trigger interventions (e.g., habit stacking) can.
    isr: 70
    isr_reasoning: |
      - [Harkin et al. (2016)](https://doi.org/10.1037/bul0000025) found a reliable positive effect of progress monitoring on goal attainment (d = 0.40, 95% CI [0.32, 0.48]) across 138 studies, one of the most robust findings in the self-regulation literature.
      - [Matthews (2015, Dominican University)](https://www.dominican.edu/dominicannews/study-highlights-strategies-for-achieving-goals) found that writing goals down increases achievement by 42%, and accountability check-ins further boosted success rates.
      - Most evidence examines monitoring frequency generally rather than monthly review specifically, but the mechanisms (written recording, structured reflection) are well-validated. The high score reflects strong evidence for the core mechanism.
    uar: 55
    confidence: medium
    uar_reasoning: |
      - Studies of [GTD and review-based systems](https://doi.org/10.1016/j.chb.2008.12.006) suggest weekly reviews are sustained by roughly 30-40% of practitioners beyond 6 months; monthly reviews likely fare better due to lower frequency burden.
      - The main dropout risk is skipping one month and never resuming. [Rothman (2000)](https://doi.org/10.1037/0278-6133.19.Suppl1.64) found that satisfaction with initial outcomes predicts maintenance, so early months with slow progress increase abandonment risk.
      - Those who pair reviews with calendar blocking and accountability partners show significantly higher retention. Estimated 50-60% sustained at 6 months.

  goals.clarity:
    pbs: 7
    pbs_reasoning: |
      - The anchor measures % of goals completed on time through accurate capacity calibration. Monthly review is one of the most direct interventions for this: it catches timeline drift, identifies where estimates were too aggressive or conservative, and builds a longitudinal record of actual vs planned capacity.
      - [Matthews (2015)](https://www.dominican.edu/dominicannews/study-highlights-strategies-for-achieving-goals) found 42% higher goal achievement from writing goals down, and regular review compounds this by enabling iterative recalibration across months.
      - Score 7 because a successful reviewer could plausibly move from ~6% on-time completion (score 6) to ~25% (score 8) over 6-12 months of calibration. The review process progressively improves estimation accuracy, but monthly cadence may miss fast-moving goals needing weekly recalibration.
    isr: 70
    isr_reasoning: |
      - The [Harkin et al. (2016)](https://doi.org/10.1037/bul0000025) effect size of d = 0.40 is moderate and highly reliable across 138 studies. The mechanism – structured monitoring improves goal attainment – generalises well to structured review practices.
      - Monthly review specifically has less direct experimental evidence than monitoring in general, but the components (written recording, explicit evaluation, timeline adjustment) are each individually well-supported.
      - [Locke & Latham (2002)](https://doi.org/10.1037/0003-066X.57.9.705) goal-setting theory established that feedback loops are essential for goal attainment, and monthly review provides a formal feedback loop. The score reflects strong but slightly indirect evidence.
    uar: 55
    confidence: medium
    uar_reasoning: |
      - Monthly cadence is both an advantage (lower burden than weekly) and a disadvantage (easier to let slide without noticing). [Soman & Cheema (2004)](https://doi.org/10.1509/jmkg.68.1.21.24035) found that longer intervals between review points reduce perceived urgency.
      - Practitioners focused on capacity calibration tend to sustain reviews longer, as they see direct links between reviews and improved goal-setting accuracy. This creates a positive feedback loop for retention.
      - Estimated 50-60% sustained at 6 months, consistent with the follow-through dimension since it is the same practice.

  goals.adaptability:
    pbs: 7
    pbs_reasoning: |
      - The anchor (proactive portfolio management with systematic review and strategic pivots) describes almost exactly what a monthly goal review is. The structured decision point forces explicit evaluation of whether each goal should continue, be modified, or be retired – directly countering both sunk-cost rigidity and impulsive abandonment.
      - [Brandstatter & Rothermund (2002)](https://doi.org/10.1016/S0065-2601(02)80009-2) showed that deliberative mindsets (activated by structured review) improve the quality of goal disengagement decisions, reducing both premature quitting and excessive persistence.
      - Score 7 rather than 8+ because truly proactive portfolio management also requires real-time responsiveness to major changes (job loss, health crisis, unexpected opportunities), which a monthly cadence cannot fully provide. It is systematic but not fully responsive.
    isr: 65
    isr_reasoning: |
      - Organisational behaviour research on [OKR systems](https://doi.org/10.2307/256287) and quarterly business reviews supports the review-and-adjust cycle as an effective flexibility mechanism, though these studies focus on team-level rather than individual goal management.
      - [Harkin et al. (2016)](https://doi.org/10.1037/bul0000025) findings on monitoring generalise to the review-and-adjust cycle, though flexibility as a specific outcome variable has received less direct experimental attention than achievement.
      - The score reflects solid but somewhat more theoretical than empirical evidence for adaptability specifically: the mechanism is well-understood but the outcome variable (strategic flexibility) is less frequently measured.
    uar: 55
    confidence: medium
    uar_reasoning: |
      - Adherence is the same as for other goal review dimensions since it is the same practice. The challenge specific to adaptability is that flexibility requires honest self-assessment about failed or inappropriate goals, which is psychologically uncomfortable.
      - [Arkes & Blumer (1985)](https://doi.org/10.1016/0749-5978(85)90049-4) demonstrated that sunk-cost bias makes people persist with failing goals; monthly reviews must overcome this bias each session, adding psychological friction.
      - Those with growth mindsets and lower sunk-cost sensitivity tend to sustain the practice longer. Estimated 50-60% sustained at 6 months.

